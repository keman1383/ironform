                {(historyForEx.lastSession||historyForEx.personalBest)&&(
                  <div className="mono" style={{fontSize:10,color:"var(--muted)",marginBottom:10,background:"var(--surface2)",borderRadius:6,padding:"7px 10px",display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
                    {historyForEx.lastSession&&<div><span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)"}}>Last  </span><span style={{color:"var(--cream2)"}}>{historyForEx.lastSession.setData?.length>0?historyForEx.lastSession.setData.map((sd,si)=>`S${si+1}:${sd.weight}×${sd.reps}`).join(" "):`${historyForEx.lastSession.weight}×${historyForEx.lastSession.reps}`}</span><span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.lastSession.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>}
                    {historyForEx.personalBest?.weight>0&&<div><span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)"}}>PB  </span><span style={{color:"var(--gold2)",fontWeight:600}}>{historyForEx.personalBest.weight}{ex.unit!=="reps"?ex.unit:""}</span><span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.personalBest.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>}
                  </div>
                )}

                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,justifyContent:"center"}}>
                  <button style={{width:46,height:46,borderRadius:8,border:"1px solid var(--border2)",background:"var(--surface)",color:"var(--gold)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>adjustWeightGlobal(ex.id,-bigInc)}>−{bigInc}</button>
                  <div style={{textAlign:"center",minWidth:80}}>
                    <div className="display" style={{fontSize:44,fontWeight:900,color:"var(--gold)",lineHeight:1}}>{ex.weight}</div>
                    <div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,marginTop:1}}>{ex.unit==="reps"?"BODYWEIGHT":ex.unit.toUpperCase()}</div>
                    {isBarbell&&ex.weight>barbellW&&<div className="mono" style={{fontSize:9,color:"var(--gold2)",marginTop:2,background:"rgba(200,146,42,0.1)",borderRadius:4,padding:"1px 5px"}}>+{((ex.weight-barbellW)/2).toFixed(2).replace(/\.?0+$/,"")} ea side</div>}
                  </div>
                  <button style={{width:46,height:46,borderRadius:8,border:"1px solid var(--border2)",background:"var(--surface)",color:"var(--gold)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>adjustWeightGlobal(ex.id,bigInc)}>+{bigInc}</button>
                </div>
                <div className="mono" style={{fontSize:8,color:"var(--muted)",letterSpacing:2,textAlign:"center",marginBottom:10,textTransform:"uppercase"}}>Base weight · won't change completed sets</div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span className="label" style={{marginBottom:0,fontSize:9}}>Sets — tap to complete</span>
                  <button onClick={()=>{ setActiveWorkout(p=>{ const updEx=p.exercises.map(e=>e.id===ex.id?{...e,sets:e.sets+1}:e); const lastReps=p.setRepsMap?.[ex.id]?.[ex.sets-1]||ex.reps||10; return {...p,exercises:updEx,setRepsMap:{...p.setRepsMap,[ex.id]:[...(p.setRepsMap[ex.id]||[]),lastReps]}}; }); }} style={{background:"rgba(200,146,42,0.1)",border:"1px solid rgba(200,146,42,0.3)",borderRadius:5,padding:"4px 10px",color:"var(--gold2)",fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}}>+ Set</button>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                  {done.map((d,i)=>{
                    const k=`${ex.id}_${i}`, setWeight=perSetData[k]?.weight??ex.weight, setReps=perSetData[k]?.reps??setRepsArr[i];
                    const perSide = isBarbell&&setWeight>barbellW ? ((setWeight-barbellW)/2) : null;
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",borderRadius:8,background:d?"rgba(200,146,42,0.12)":"var(--surface2)",border:d?"1px solid rgba(200,146,42,0.35)":"1px solid var(--border)"}}>
                        <button style={{width:34,height:34,borderRadius:8,border:d?"none":"1px solid var(--border2)",background:d?"var(--gold)":"var(--surface)",color:d?"var(--bg)":"var(--muted)",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",fontWeight:500,flexShrink:0}} onClick={()=>toggleSet(ex.id,i)}>{d?"✓":`S${i+1}`}</button>
                        <div style={{display:"flex",flexDirection:"column",flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:2}}>
                            <button onClick={()=>adjustSetWeight(ex.id,i,-0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:4,width:22,height:30,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>-.25</button>
                            <button onClick={()=>adjustSetWeight(ex.id,i,-bigInc)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:26,height:30,color:"var(--gold)",cursor:"pointer",fontSize:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                            <div style={{textAlign:"center",minWidth:38,flex:1}}><div className="mono" style={{fontSize:13,color:"var(--gold)",fontWeight:500}}>{setWeight}</div><div className="mono" style={{fontSize:7,color:"var(--muted)"}}>{ex.unit!=="reps"?ex.unit:"bw"}</div></div>
                            <button onClick={()=>adjustSetWeight(ex.id,i,bigInc)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:26,height:30,color:"var(--gold)",cursor:"pointer",fontSize:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                            <button onClick={()=>adjustSetWeight(ex.id,i,0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:4,width:22,height:30,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>.25</button>
                          </div>
                          {isBarbell&&perSide!==null&&<div className="mono" style={{fontSize:8,color:"var(--gold2)",marginTop:1,textAlign:"center"}}>+{perSide.toFixed(2).replace(/\.?0+$/,"")} lbs/side</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:3}}>
                          <button onClick={()=>adjustSetReps(ex.id,i,-1)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:30,color:"var(--cream2)",cursor:"pointer",fontSize:13,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                          <div style={{textAlign:"center",minWidth:28}}><div className="mono" style={{fontSize:13,color:"var(--cream)",fontWeight:500}}>{setReps}</div><div className="mono" style={{fontSize:7,color:"var(--muted)"}}>reps</div></div>
                          <button onClick={()=>adjustSetReps(ex.id,i,1)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:30,color:"var(--cream2)",cursor:"pointer",fontSize:13,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <input className="input" style={{fontSize:12,padding:"8px 10px"}} placeholder="Notes..." value={noteFor[ex.id]||""} onChange={e=>setNoteFor(p=>({...p,[ex.id]:e.target.value}))}/>
              </div>

              <div style={{display:"grid",gridTemplateColumns:currentExIdx>0?"1fr 1fr":"1fr",gap:10,alignItems:"stretch"}}>
                {currentExIdx>0&&<button className="btn-outline" style={{width:"100%",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",margin:0}} onClick={()=>setCurrentExIdx(i=>i-1)}>← Prev</button>}
                {!isLast ? (
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    <button style={{background:"var(--surface2)",color:"var(--muted)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:10,letterSpacing:1.2,cursor:"pointer",width:"100%",textTransform:"uppercase"}} onClick={deferCurrentEx}>↩ Come back later</button>
                    <button style={{background:"var(--gold)",color:"var(--bg)",border:"none",borderRadius:8,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:11,letterSpacing:1.5,cursor:"pointer",width:"100%",textTransform:"uppercase"}} onClick={skipToNext}>Skip →</button>
                  </div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    <button style={{background:"rgba(200,146,42,0.15)",color:"var(--muted)",border:"1px solid rgba(200,146,42,0.25)",borderRadius:8,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:10,letterSpacing:1.2,cursor:"pointer",width:"100%",textTransform:"uppercase"}} onClick={()=>finishWorkoutWithState(completedSets)}>{progress>=1?"Finish Workout ✓":`Finish Early (${totalDone}/${totalSets})`}</button>
                    {remainingDeferred.length>0
                      ? <button style={{background:"var(--gold)",color:"var(--bg)",border:"none",borderRadius:8,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:11,letterSpacing:1.5,cursor:"pointer",width:"100%",textTransform:"uppercase"}} onClick={circleBackToDeferred}>Next → ({remainingDeferred.length} to revisit)</button>
                      : <button style={{background:"var(--gold)",color:"var(--bg)",border:"none",borderRadius:8,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:11,letterSpacing:1.5,cursor:"pointer",width:"100%",textTransform:"uppercase"}} onClick={()=>finishWorkoutWithState(completedSets)}>{progress>=1?"Done! ✓":`Finish (${totalDone}/${totalSets})`}</button>
                    }
                  </div>
                )}
              </div>
            </div>

            {swapModal&&(
              <div onClick={()=>setSwapModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#2a1c0c",border:"1px solid var(--border2)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto",padding:20,paddingBottom:40}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span className="label" style={{color:"var(--gold)"}}>Swap Exercise</span><button onClick={()=>setSwapModal(null)} className="btn-ghost" style={{fontSize:22}}>×</button></div>
                  {(()=>{ const currEx=allExercises.find(e=>e.id===swapModal); const sameGroup=allExercises.filter(e=>e.category===currEx?.category&&e.id!==swapModal); return <div><div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>{currEx?.category} exercises</div>{sameGroup.map(ex=>{ const alreadyIn=activeWorkout.exercises.some(e=>e.id===ex.id); return <button key={ex.id} disabled={alreadyIn} onClick={()=>swapExercise(swapModal,ex.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:alreadyIn?"var(--surface)":"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px",marginBottom:6,cursor:alreadyIn?"default":"pointer",opacity:alreadyIn?0.4:1,textAlign:"left"}}><div><div style={{fontSize:14,color:"var(--cream)",fontWeight:500}}>{ex.name}</div><div className="mono" style={{fontSize:9,color:"var(--muted)",marginTop:2,letterSpacing:1}}>{ex.equipmentType||"machine"}</div></div>{alreadyIn&&<span className="mono" style={{fontSize:9,color:"var(--muted)"}}>In workout</span>}</button>; })}{!sameGroup.length&&<div style={{color:"var(--muted)",fontFamily:"'DM Mono',monospace",fontSize:12,textAlign:"center",padding:20}}>No other {currEx?.category} exercises</div>}</div>; })()}
                </div>
              </div>
            )}

            {equipModal&&(
              <div onClick={()=>setEquipModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#2a1c0c",border:"1px solid var(--border2)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,padding:20,paddingBottom:40}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span className="label" style={{color:"var(--gold)"}}>Equipment Type</span><button onClick={()=>setEquipModal(null)} className="btn-ghost" style={{fontSize:22}}>×</button></div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {[["barbell","🏋️ Barbell"],["dumbbell","💪 Dumbbell"],["cable","🔗 Cable"],["assisted","🤝 Assisted"],["machine","⚙️ Machine"],["bodyweight","🧍 BW"]].map(([key,lbl])=>(
                      <button key={key} onClick={()=>setDraftEquip(p=>({...p,equipmentType:key}))} style={{padding:"8px 12px",borderRadius:6,fontSize:12,fontFamily:"'DM Mono',monospace",cursor:"pointer",background:draftEquip.equipmentType===key?"rgba(200,146,42,0.18)":"var(--surface2)",border:draftEquip.equipmentType===key?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",color:draftEquip.equipmentType===key?"var(--gold)":"var(--muted)"}}>{lbl}</button>
                    ))}
                  </div>
                  {draftEquip.equipmentType==="barbell"&&<div style={{marginBottom:16}}><span className="label" style={{marginBottom:6}}>Bar Weight (lbs)</span><input className="input" style={{maxWidth:160}} type="number" value={draftEquip.barbellWeight||45} onChange={e=>setDraftEquip(p=>({...p,barbellWeight:Number(e.target.value)||45}))}/></div>}
                  <div className="mono" style={{fontSize:9,color:"var(--muted)",marginBottom:14,letterSpacing:0.5,lineHeight:1.6}}>
                    {draftEquip.equipmentType==="barbell"&&`Bar: ${draftEquip.barbellWeight||45} lbs · increment → 2.5 lbs`}
                    {draftEquip.equipmentType==="dumbbell"&&"Increment → 5 lbs"}
                    {draftEquip.equipmentType==="assisted"&&"Weight progression reverses (less assist = harder)"}
                  </div>
                  <button onClick={()=>applyEquipChange(equipModal)} style={{background:"var(--gold)",border:"none",borderRadius:8,padding:"13px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:600}}>Apply</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── Summary ──
      if (screen==="summary"&&summaryData) {
        const sd=summaryData, achievedGoals=sd.exercises.flatMap(ex=>ex.matchedGoals||[]), prCount=sd.exercises.filter(e=>e.improved).length;
        const tmpl=WORKOUT_TEMPLATES.find(t=>t.id===sd.templateId);
        const hasMidWorkoutAdds=!!(sd.midWorkoutAddedExIds?.length>0&&tmpl&&sd.midWorkoutAddedExIds.some(id=>allExercises.find(e=>e.id===id)));
        return (
          <div className="app"><Confetti/>{renderModal()}{Toast}
            <div className="content">
              <div className="header"><div className="logo">IRONFORM</div><span className="tag">{sd.templateLabel}</span></div>
              <div className="card-warm" style={{textAlign:"center",padding:28,marginBottom:16}}>
                <div style={{fontSize:48,marginBottom:8}}>{prCount>0?"🏆":"🎯"}</div>
                <div className="display" style={{fontSize:30,color:"var(--gold)",marginBottom:4,fontWeight:900}}>{prCount>0?"You Crushed It!":"Session Complete"}</div>
                <div className="mono" style={{fontSize:11,color:"var(--muted)",letterSpacing:2}}>{new Date(sd.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:18}}>
                  {[{label:"Exercises",value:sd.exercises.length},{label:"Sets Done",value:sd.exercises.reduce((a,e)=>a+e.completedSets,0)},{label:"PRs",value:prCount}].map(stat=>(
                    <div key={stat.label} style={{textAlign:"center"}}>
                      <div className="display" style={{fontSize:26,color:stat.label==="PRs"&&stat.value>0?"var(--green2)":"var(--cream)",lineHeight:1}}>{stat.value}</div>
                      <div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,marginTop:3,textTransform:"uppercase"}}>{stat.label}</div>
                    </div>
                  ))}
                </div>
                {(()=>{ const vol=sd.exercises.reduce((acc,ex)=>{ if(ex.unit==="reps") return acc; return acc+(ex.setData||[]).reduce((a,s)=>(s.weight||0)*(s.reps||0)+a,0); },0); if(!vol) return null; return <div className="mono" style={{marginTop:12,fontSize:11,color:"var(--gold2)",letterSpacing:1}}>Total Volume: {vol.toLocaleString()} lbs</div>; })()}
              </div>
              {hasMidWorkoutAdds&&<div className="card" style={{background:"rgba(74,108,140,0.1)",border:"1px solid rgba(74,108,140,0.35)",marginBottom:10,cursor:"pointer"}} onClick={()=>setModal("addToTemplate")}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div className="mono" style={{fontSize:10,color:"var(--blue2)",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>New Exercises Added</div><div style={{fontSize:13,color:"var(--cream2)"}}>Add {sd.midWorkoutAddedExIds.length===1?"it":"them"} to your {tmpl.label} template?</div></div><span style={{color:"var(--blue2)",fontSize:20}}>›</span></div></div>}
              {achievedGoals.length>0&&<div className="card" style={{background:"rgba(74,124,89,0.12)",border:"1px solid rgba(74,124,89,0.35)",marginBottom:10}}><span className="label" style={{color:"var(--green2)"}}>🎯 Goals Achieved</span>{achievedGoals.map((g,i)=>{ const def=allExercises.find(e=>e.id===g.exId); return <div key={i} className="mono" style={{fontSize:12,color:"var(--green2)",padding:"4px 0",borderBottom:"1px solid rgba(74,124,89,0.2)"}}>✓ {def?.name||g.exId} — {g.targetWeight} lbs</div>; })}</div>}
              <span className="label">Exercise Breakdown</span>
              {sd.exercises.map(ex=>(
                <div key={ex.id} className="card" style={{marginBottom:8,padding:"13px 15px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:15,color:"var(--cream)",marginBottom:3}}>{ex.name}{ex.improved&&<span className="mono" style={{marginLeft:8,fontSize:9,color:"var(--green2)",background:"rgba(74,124,89,0.15)",border:"1px solid rgba(74,124,89,0.3)",borderRadius:3,padding:"2px 5px",letterSpacing:1}}>PR ↑</span>}</div>
                      <div className="mono" style={{fontSize:11,color:"var(--muted)"}}>{ex.unit==="reps"?"Bodyweight":`${ex.weight} ${ex.unit}`} · {ex.completedSets}/{ex.totalSets} sets</div>
                      {ex.note&&<div style={{fontSize:12,color:"var(--cream2)",marginTop:5,fontStyle:"italic",opacity:0.8}}>"{ex.note}"</div>}
                    </div>
                    <div className="mono" style={{fontSize:18,color:ex.completedSets===ex.totalSets?"var(--green2)":"var(--muted)",marginLeft:10}}>{ex.completedSets===ex.totalSets?"✓":"~"}</div>
                  </div>
                </div>
              ))}
              <button className="btn" onClick={()=>setScreen("home")}>Back to Home</button>
              <button className="btn-outline" style={{width:"100%",marginTop:8,textAlign:"center"}} onClick={()=>setScreen("history")}>View History</button>
            </div>
          </div>
        );
      }

      // ── Goals ──
      if (screen==="goals") return (
        <div className="app">{renderModal()}{Toast}
          <div className="content">
            <div className="header"><div className="logo">IRONFORM</div><button className="btn-sm" onClick={()=>setModal("addLiftGoal")}>+ New Goal</button></div>
            <h2 className="display" style={{fontSize:26,color:"var(--cream)",marginBottom:4}}>Lift Goals</h2>
            <p className="mono" style={{color:"var(--muted)",fontSize:12,marginBottom:20,letterSpacing:0.5,lineHeight:1.6}}>Set a target weight for any exercise and track your progress.</p>
            {liftGoals.length===0 ? (
              <div className="card" style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:12}}>🎯</div><div className="mono" style={{color:"var(--muted)",fontSize:14,marginBottom:18,letterSpacing:1}}>No goals set yet</div><button className="btn" onClick={()=>setModal("addLiftGoal")}>Set Your First Goal</button></div>
            ) : liftGoals.map(goal=>{
              const def=allExercises.find(e=>e.id===goal.exId); if(!def) return null;
              const history=getLiftHistory(goal.exId), current=history.length>0?history[history.length-1].weight:null;
              const pct=current?Math.min(100,Math.round((current/goal.targetWeight)*100)):0;
              const achieved=current&&current>=goal.targetWeight;
              return (
                <div key={goal._id} className="card" style={{marginBottom:12,padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:17,color:"var(--cream)",marginBottom:2}}>{def.name}</div>
                      <div className="mono" style={{fontSize:11,color:"var(--muted)"}}>
                        Target: <span style={{color:"var(--gold)"}}>{goal.targetWeight} {def.unit}</span>
                        {current&&<span> · Current: <span style={{color:"var(--cream2)"}}>{current} {def.unit}</span></span>}
                        {(()=>{ const orm=getEffective1RM(oneRepMaxes,workouts,goal.exId); if(!orm) return null; return <span style={{display:"block",marginTop:2}}>Est. 1RM: <span style={{color:"var(--gold2)"}}>{orm.value} {def.unit}</span><span style={{fontSize:9,color:"var(--muted)",marginLeft:4}}>({orm.source==="stored"||orm.source==="stored_expired"?"entered":"calc"})</span></span>; })()}
                      </div>
                    </div>
                    <button onClick={()=>doDelLiftGoal(goal._id)} className="btn-ghost" style={{fontSize:16,lineHeight:1,padding:"0 2px"}}>×</button>

                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase"}}>Progress</span><span className="mono" style={{fontSize:11,color:achieved?"var(--green2)":"var(--gold)"}}>{pct}%{achieved?" — Achieved!":""}</span></div>
                    <div style={{height:6,background:"var(--surface2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:achieved?"var(--green2)":"var(--gold)",borderRadius:3,transition:"width 0.6s ease"}}/></div>
                  </div>
                  {history.length>0 ? <div style={{background:"var(--surface2)",borderRadius:8,padding:"12px 8px 6px",marginBottom:4}}><MiniChart history={history} targetWeight={goal.targetWeight}/></div> : <div className="mono" style={{fontSize:11,color:"var(--muted)",textAlign:"center",padding:"12px 0",letterSpacing:1}}>Complete a workout with {def.name} to start tracking</div>}
                </div>

          </div>
          <NavBar active="goals" setScreen={setScreen}/>
        </div>
      );

      // ── History ──
      if (screen==="history") return (
        <div className="app">{renderModal()}{Toast}
          <div className="content">
            <div className="header"><div className="logo">IRONFORM</div><button className="btn-sm" onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}>+ Log Past</button></div>
            <div style={{display:"flex",gap:0,marginBottom:16,border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
              {[["log","Workout Log"],["calendar","Calendar"]].map(([tab,lbl])=><button key={tab} onClick={()=>setHistoryTab(tab)} className="mono" style={{flex:1,padding:"10px",fontSize:11,letterSpacing:2,textTransform:"uppercase",cursor:"pointer",border:"none",background:historyTab===tab?"rgba(200,146,42,0.18)":"var(--surface)",color:historyTab===tab?"var(--gold)":"var(--muted)"}}>{lbl}</button>)}
            </div>

            {historyTab==="calendar"&&(
              <div>
                <div className="card"><CalendarView workouts={workouts} onSelectDate={setCalSelectedDate} selectedDate={calSelectedDate} calYear={calYear} calMonth={calMonth} setCalYear={setCalYear} setCalMonth={setCalMonth}/></div>

                  const dayWorkouts=workouts.filter(w=>new Date(w.date).toDateString()===calSelectedDate);
                  if(!dayWorkouts.length) return null;

                      {w.exercises?.map((ex,ei)=>{ const hasSetData=ex.setData?.length>0; return <div key={ei} style={{paddingBottom:8,marginBottom:8,borderBottom:"1px solid var(--border)"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:hasSetData?4:0}}><span style={{color:"var(--cream2)",fontWeight:500}}>{ex.name}</span>{!hasSetData&&<span className="mono" style={{fontSize:12,color:"var(--gold2)"}}>{ex.unit==="reps"?`BW × ${ex.reps}`:`${ex.weight}${ex.unit} × ${ex.reps}`}{ex.sets>1?` × ${ex.sets}s`:""}</span>}</div>{hasSetData&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>{ex.setData.map((sd,si)=><span key={si} className="mono" style={{fontSize:10,color:"var(--gold2)",background:"rgba(200,146,42,0.08)",border:"1px solid rgba(200,146,42,0.2)",borderRadius:4,padding:"2px 7px"}}>S{si+1}: {sd.weight}{ex.unit!=="reps"?ex.unit:""} × {sd.reps}</span>)}</div>}{ex.note&&<div style={{fontSize:11,color:"var(--muted)",marginTop:4,fontStyle:"italic"}}>"{ex.note}"</div>}</div>; })}
                    </div>
                  ))}</div>;
                })()}
              </div>
            )}

            {historyTab==="log"&&(workouts.length===0 ? (
              <div className="card" style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:12}}>📋</div><div className="mono" style={{color:"var(--muted)",marginBottom:20,fontSize:12,letterSpacing:1}}>No workouts yet</div><button className="btn" onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}>Import Past Workouts</button></div>
            ) : [...workouts].reverse().map(w=>{
              const wKey=w._id||w.date, expanded=!!expandedWorkouts[wKey];
              return (
                <div key={wKey} className="card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExpandedWorkouts(p=>({...p,[wKey]:!p[wKey]}))}>
                    <div><div style={{fontWeight:700,fontSize:15,color:"var(--cream)"}}>{new Date(w.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}</div><div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{w.exercises?.length} exercises</div></div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {w.templateLabel&&(()=>{ const t=WORKOUT_TEMPLATES.find(x=>x.label===w.templateLabel); return <span className="tag" style={{background:t?t.accentDim:"var(--surface2)",border:`1px solid ${t?t.accentBorder:"var(--border)"}`,color:t?t.accent:"var(--cream2)"}}>{w.templateLabel}</span>; })()}
                      {w.imported&&<span className="tag" style={{background:"rgba(74,108,140,0.12)",border:"1px solid rgba(74,108,140,0.35)",color:"var(--blue2)"}}>Imported</span>}
                      <span style={{color:"var(--muted)",fontSize:18,lineHeight:1}}>{expanded?"▲":"▼"}</span>
                    </div>
                  </div>
                  {expanded&&(
                    <div style={{marginTop:12}}>
                      {w.exercises?.map((ex,ei)=>{
                        const noteKey=`${wKey}_${ex.id}`, hasNote=ex.note?.trim(), hasSetData=ex.setData?.length>0;
                        const isEditingName=editingExName?.wKey===wKey&&editingExName?.exIdx===ei;
                        return (
                          <div key={ex.id||ei}>
                            <div style={{padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:hasSetData?4:0,alignItems:"center"}}>
                                {isEditingName ? (
                                  <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                                    <input className="input" style={{flex:1,padding:"5px 8px",fontSize:13}} value={editingExName.value} autoFocus onChange={e=>setEditingExName(p=>({...p,value:e.target.value}))} onKeyDown={e=>{ if(e.key==="Enter"){const updated={...w,exercises:w.exercises.map((x,xi)=>xi===ei?{...x,name:editingExName.value}:x)};updateWorkoutRecord(updated);setEditingExName(null);showToast("Name updated!");} if(e.key==="Escape") setEditingExName(null); }}/>
                                    <button onClick={()=>{const updated={...w,exercises:w.exercises.map((x,xi)=>xi===ei?{...x,name:editingExName.value}:x)};updateWorkoutRecord(updated);setEditingExName(null);showToast("Name updated!");}} style={{background:"var(--green2)",border:"none",borderRadius:5,padding:"5px 10px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:9,cursor:"pointer"}}>✓</button>
                                    <button onClick={()=>setEditingExName(null)} className="btn-ghost" style={{fontSize:16}}>×</button>

                              </div>
                              {hasSetData&&!isEditingName&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:2}}>{ex.setData.map((sd,si)=><span key={si} className="mono" style={{fontSize:10,color:"var(--gold2)",background:"rgba(200,146,42,0.08)",border:"1px solid rgba(200,146,42,0.2)",borderRadius:4,padding:"2px 7px"}}>S{si+1}: {sd.weight}{ex.unit!=="reps"?ex.unit:""} × {sd.reps}</span>)}</div>}

                          </div>

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
                        {deleteWorkoutConfirm===wKey ? (
                          <div style={{display:"flex",gap:6,alignItems:"center",flex:1}}>
                            <span className="mono" style={{fontSize:10,color:"var(--brick2)"}}>Delete this workout?</span>

                            <button className="btn-sm" onClick={()=>setDeleteWorkoutConfirm(null)}>Cancel</button>
                          </div>

                          </>

                    </div>

                </div>

          </div>
          <NavBar active="history" setScreen={setScreen}/>
        </div>

      // ── Profile ──
      if (screen==="profile") return (
        <div className="app">{renderModal()}{Toast}
          <div className="content">
            <div className="header"><div className="logo">IRONFORM</div></div>
            <div className="card-warm" style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                {authUser.photoURL&&<img src={authUser.photoURL} alt="" style={{width:52,height:52,borderRadius:"50%",border:"2px solid var(--gold)",opacity:0.9}}/>}
                <div>
                  <div className="display" style={{fontSize:20,color:"var(--cream)"}}>{authUser.displayName||"Athlete"}</div>
                  <div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{authUser.email}</div>
                  <div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{workouts.length} sessions logged</div>
                </div>
              </div>
            </div>
            <div className="card" style={{marginBottom:14}}>
              <span className="label">Default Training Goal</span>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
                {Object.entries(GOALS).map(([key,g])=>(
                  <button key={key} onClick={async()=>{await saveProfile({...profile,goal:key});showToast("Goal updated!");}} style={{background:profile?.goal===key?"rgba(200,146,42,0.12)":"var(--surface2)",border:profile?.goal===key?"1px solid rgba(200,146,42,0.45)":"1px solid var(--border)",borderRadius:8,padding:"12px 14px",cursor:"pointer",color:profile?.goal===key?"var(--gold)":"var(--muted)",textAlign:"left",fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:600,color:profile?.goal===key?"var(--cream)":"var(--cream2)"}}>{g.label}</div>
                    {profile?.goal===key&&<span style={{color:"var(--green2)"}}>✓</span>}
                  </button>
                ))}
              </div>
            </div>
            <div className="card" style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span className="label">Custom Exercises ({customExs.length})</span><button className="btn-sm" onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setModal("addExercise");}}>+ New</button></div>
              {customExs.length===0 ? <p className="mono" style={{color:"var(--muted)",fontSize:12,letterSpacing:0.5}}>None yet.</p> : customExs.map(ex=>(
                <div key={ex._fid||ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                  <div><span style={{fontSize:14,color:"var(--cream)"}}>{ex.name}</span><div className="mono" style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{ex.category} · {ex.unit==="reps"?"bodyweight":`${ex.defaultWeight}${ex.unit}`}{ex.equipmentType&&ex.equipmentType!=="machine"&&` · ${ex.equipmentType}`}</div></div>
                </div>
              ))}
            </div>
            <div className="card" style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span className="label">One-Rep Maxes</span><button className="btn-sm" onClick={()=>{const init={};["bench","squat","lat_pulldown"].forEach(id=>{const s=oneRepMaxes.find(r=>r.exId===id);init[id]=s?s.weight:"";});setDraft1RMs(init);setEditing1RMs(true);}}>{editing1RMs?"Cancel":"Edit"}</button></div>
              <p className="mono" style={{color:"var(--muted)",fontSize:10,marginBottom:12,letterSpacing:0.5,lineHeight:1.5}}>Enter your known 1RM. Blank or 15+ days old → Epley formula used instead.</p>
              {[{id:"bench",name:"Bench Press"},{id:"squat",name:"Squat"},{id:"lat_pulldown",name:"Lat Pull Down"}].map(({id,name})=>{
                const stored=oneRepMaxes.find(r=>r.exId===id), calculated=calcEpley1RM(workouts,id), effective=getEffective1RM(oneRepMaxes,workouts,id);

                  <div key={id} style={{padding:"10px 0",borderBottom:"1px solid var(--border)"}}>

                    {stored&&!editing1RMs&&<div className="mono" style={{fontSize:9,color:"var(--muted)",marginTop:2}}>Updated {new Date(stored.updatedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}{(Date.now()-new Date(stored.updatedAt))/86400000>15&&" · Expired, using calc"}</div>}
                    {calculated&&!stored&&<div className="mono" style={{fontSize:9,color:"var(--muted)",marginTop:2}}>Calc from recent lifts: {calculated} lbs</div>}
                  </div>
                );
              })}
              {editing1RMs&&<button className="btn" style={{marginTop:12}} onClick={async()=>{for(const [id,val] of Object.entries(draft1RMs)){if(val&&!isNaN(Number(val))&&Number(val)>0) await doSave1RM(id,Number(val));}setEditing1RMs(false);showToast("1RMs saved!");}}>Save 1RMs</button>}
            </div>
            <button className="btn-outline" style={{width:"100%",marginBottom:10,textAlign:"center"}} onClick={()=>setScreen("exercise_db")}>📋 Exercise Database</button>
            <button className="btn-danger" style={{width:"100%",marginTop:6}} onClick={handleSignOut}>Sign Out</button>
          </div>
          <NavBar active="profile" setScreen={setScreen}/>
        </div>
      );

      // ── Exercise Database ──
      if (screen==="exercise_db") {
        const startEdit=(ex,isBuiltin)=>{ setEditingExDef({ex,isBuiltin}); setDraftExDef({name:ex.name,defaultWeight:ex.defaultWeight,increment:ex.increment,equipmentType:ex.equipmentType||"machine",unit:ex.unit||"lbs",barbellWeight:ex.barbellWeight||45}); };
        const saveEdit=async()=>{
          if(!editingExDef) return; const {ex,isBuiltin}=editingExDef;
          const updated={...ex,...draftExDef,defaultWeight:Number(draftExDef.defaultWeight)||0,increment:Number(draftExDef.increment)||2.5,barbellWeight:Number(draftExDef.barbellWeight)||45};
          if(isBuiltin){ const n={...builtinOverrides,[ex.id]:draftExDef}; setBuiltinOverrides(n); await saveProfile({...profile,builtinExOverrides:n}); }
          else await updateCustomExRecord(updated);
          setEditingExDef(null); setDraftExDef({}); showToast("Exercise updated!");
        };
        return (
          <div className="app">{Toast}
            <div className="content">
              <div className="header"><BackBtn onClick={()=>setScreen("profile")}/><div className="mono" style={{fontSize:11,letterSpacing:3,color:"var(--gold)",textTransform:"uppercase"}}>Exercise Database</div><div style={{width:40}}/></div>
              <p className="mono" style={{fontSize:10,color:"var(--muted)",marginBottom:16,letterSpacing:0.5,lineHeight:1.6}}>Tap any exercise to edit defaults.</p>
              {CATEGORIES.map(cat=>{
                const catExs=allExercises.filter(e=>e.category===cat); if(!catExs.length) return null;
                return (
                  <div key={cat} style={{marginBottom:18}}>
                    <span className="label">{cat}</span>
                    {catExs.map(ex=>{
                      const isBuiltin=!ex.custom, override=isBuiltin?builtinOverrides[ex.id]:null;
                      const displayEx=override?{...ex,...override}:ex, editing=editingExDef?.ex.id===ex.id;
                      return (
                        <div key={ex.id} className="card" style={{marginBottom:6,padding:"12px 14px"}}>
                          {editing ? (
                            <div>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span className="mono" style={{fontSize:9,color:"var(--gold)",textTransform:"uppercase",letterSpacing:2}}>Editing</span><button onClick={()=>setEditingExDef(null)} className="btn-ghost" style={{fontSize:18}}>×</button></div>
                              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                                <div><span className="label">Name</span><input className="input" value={draftExDef.name||""} onChange={e=>setDraftExDef(p=>({...p,name:e.target.value}))} autoCapitalize="words"/></div>
                                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                                  <div><span className="label">Default Weight ({draftExDef.unit||"lbs"})</span><input className="input" type="number" value={draftExDef.defaultWeight||""} onChange={e=>setDraftExDef(p=>({...p,defaultWeight:e.target.value}))}/></div>
                                  <div><span className="label">Increment</span><input className="input" type="number" value={draftExDef.increment||""} onChange={e=>setDraftExDef(p=>({...p,increment:e.target.value}))}/></div>
                                </div>
                                <div><span className="label">Unit</span><div style={{display:"flex",gap:6,marginTop:4}}>{["lbs","kg","reps"].map(u=><button key={u} onClick={()=>setDraftExDef(p=>({...p,unit:u}))} style={{flex:1,padding:"8px",borderRadius:6,fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",background:draftExDef.unit===u?"rgba(200,146,42,0.18)":"var(--surface2)",border:draftExDef.unit===u?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",color:draftExDef.unit===u?"var(--gold)":"var(--muted)"}}>{u}</button>)}</div></div>
                                <div><span className="label">Equipment</span><div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>{[["barbell","🏋️"],["dumbbell","💪"],["cable","🔗"],["assisted","🤝"],["machine","⚙️"],["bodyweight","🧍"]].map(([key,lbl])=><button key={key} onClick={()=>setDraftExDef(p=>({...p,equipmentType:key}))} style={{padding:"7px 10px",borderRadius:6,fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",background:draftExDef.equipmentType===key?"rgba(200,146,42,0.18)":"var(--surface2)",border:draftExDef.equipmentType===key?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",color:draftExDef.equipmentType===key?"var(--gold)":"var(--muted)"}}>{lbl} {key}</button>)}</div></div>
                                {draftExDef.equipmentType==="barbell"&&<div><span className="label">Barbell Weight (lbs)</span><input className="input" type="number" value={draftExDef.barbellWeight||""} onChange={e=>setDraftExDef(p=>({...p,barbellWeight:e.target.value}))}/></div>}
                                <div style={{display:"flex",gap:8,marginTop:4}}>
                                  <button className="btn" style={{flex:1,margin:0}} onClick={saveEdit}>Save</button>
                                  {!isBuiltin&&<button style={{background:"none",border:"1px solid var(--brick)",color:"var(--brick2)",borderRadius:8,padding:"10px 14px",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",flexShrink:0}} onClick={async()=>{await deleteCustomExRecord(ex);setEditingExDef(null);showToast("Exercise deleted");}}>🗑 Delete</button>}
                                </div>
                                {isBuiltin&&override&&<button className="btn-outline" style={{width:"100%",fontSize:11,textAlign:"center",marginTop:8}} onClick={async()=>{const n={...builtinOverrides};delete n[ex.id];setBuiltinOverrides(n);await saveProfile({...profile,builtinExOverrides:n});setEditingExDef(null);showToast("Reset to default");}}>↩ Reset to Default</button>}
                              </div>
                            </div>
                          ) : (
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>startEdit(ex,isBuiltin)}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:6}}>
                                  <span style={{fontSize:14,fontWeight:600,color:"var(--cream)"}}>{displayEx.name}</span>
                                  {override&&<span className="mono" style={{fontSize:8,color:"var(--gold2)",background:"rgba(200,146,42,0.1)",border:"1px solid rgba(200,146,42,0.3)",borderRadius:3,padding:"1px 5px"}}>modified</span>}
                                  {ex.custom&&<span className="mono" style={{fontSize:8,color:"var(--blue2)",background:"rgba(74,108,140,0.1)",border:"1px solid rgba(74,108,140,0.3)",borderRadius:3,padding:"1px 5px"}}>custom</span>}
                                </div>
                                <div className="mono" style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{displayEx.unit==="reps"?"Bodyweight":`${displayEx.defaultWeight}${displayEx.unit}`} · {displayEx.equipmentType||"machine"} · +{displayEx.increment}{displayEx.unit==="reps"?"":displayEx.unit}</div>
                              </div>
                              <span className="mono" style={{color:"var(--border2)",fontSize:12,flexShrink:0,marginLeft:8}}>✎</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
              <button className="btn" style={{marginBottom:20}} onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setScreen("profile");setModal("addExercise");}}>+ Add Custom Exercise</button>
            </div>
          </div>
        );
      }

      // ── Home ──
      const tiles = [
        ...WORKOUT_TEMPLATES.map(tmpl=>{
          const last=[...workouts].reverse().find(w=>w.templateLabel===tmpl.label), days=last?Math.floor((Date.now()-new Date(last.date))/86400000):null;
          return {id:tmpl.id,emoji:tmpl.emoji,label:tmpl.label,sub:days!==null?(days===0?"Today":`${days}d ago`):"Never done",accent:tmpl.accent,accentDim:tmpl.accentDim,accentBorder:tmpl.accentBorder,onClick:()=>{setActiveTmpl(tmpl);setExtraExIds([]);setRemovedExIds([]);setPreviewOrder(null);const sr=GOAL_SETS[profile?.goal||"hypertrophy"];setPreviewSets(sr.sets);setPreviewReps(sr.reps);setScreen("preset_preview");}};
        }),
        {id:"custom",emoji:"⚡",label:"Custom",sub:"Build your own",accent:"#4a6c8c",accentDim:"rgba(74,108,140,0.15)",accentBorder:"rgba(74,108,140,0.45)",onClick:()=>{setCustomExIds([]);setCustomGoal("hypertrophy");setScreen("custom_builder");}},
      ];
      const lastWorkout=workouts[workouts.length-1], daysSinceLast=lastWorkout?Math.floor((Date.now()-new Date(lastWorkout.date))/86400000):null;
      const streak=(()=>{ if(!workouts.length) return 0; let s=0; const dates=new Set(workouts.map(w=>new Date(w.date).toDateString())); const d=new Date(); d.setHours(0,0,0,0); while(dates.has(d.toDateString())){s++;d.setDate(d.getDate()-1);} return s; })();

      return (
        <div className="app">{renderModal()}{Toast}
          <div className="content">
            <div className="header">
              <div className="logo">IRONFORM</div>
              {authUser.photoURL&&<img src={authUser.photoURL} alt="" style={{width:30,height:30,borderRadius:"50%",border:"1px solid var(--border2)",cursor:"pointer",opacity:0.85}} onClick={()=>setScreen("profile")}/>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
              {[{label:"Sessions",value:workouts.length},{label:"Days Rest",value:daysSinceLast===null?"—":daysSinceLast},{label:"Streak",value:streak}].map(stat=>(
                <div key={stat.label} className="card" style={{padding:14,textAlign:"center",marginBottom:0}}>
                  <div className="display" style={{fontSize:24,color:"var(--gold)",lineHeight:1}}>{stat.value}</div>
                  <span className="label" style={{marginBottom:0,marginTop:4,fontSize:8}}>{stat.label}</span>
                </div>
              ))}
            </div>
            <div className="divider"><div className="divider-line"/><span className="mono" style={{fontSize:9,letterSpacing:3,color:"var(--muted)",textTransform:"uppercase"}}>Begin Session</span><div className="divider-line"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {tiles.map(tile=>(
                <button key={tile.id} onClick={tile.onClick} style={{background:tile.accentDim,border:`1px solid ${tile.accentBorder}`,borderRadius:12,padding:"22px 14px",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:7,width:"100%"}}>
                  <span style={{fontSize:30}}>{tile.emoji}</span>
                  <span className="display" style={{fontWeight:700,fontSize:14,color:tile.accent,lineHeight:1.2}}>{tile.label}</span>
                  <span className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase"}}>{tile.sub}</span>
                </button>
              ))}
            </div>
            <div className="divider"><div className="divider-line"/><span className="mono" style={{fontSize:9,letterSpacing:3,color:"var(--muted)",textTransform:"uppercase"}}>Quick Actions</span><div className="divider-line"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              <button className="card" style={{marginBottom:0,cursor:"pointer",textAlign:"center",padding:14,border:"1px solid var(--border)"}} onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}><div style={{fontSize:18,marginBottom:4}}>📥</div><div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase"}}>Log Past</div></button>
              <button className="card" style={{marginBottom:0,cursor:"pointer",textAlign:"center",padding:14,border:"1px solid var(--border)"}} onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setModal("addExercise");}}><div style={{fontSize:18,marginBottom:4}}>➕</div><div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase"}}>New Lift</div></button>
            </div>
            {lastWorkout&&(
              <div className="card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span className="label">Last Session</span><span className="mono" style={{fontSize:11,color:"var(--muted)"}}>{new Date(lastWorkout.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>
                {lastWorkout.exercises?.slice(0,4).map(ex=>(
                  <div key={ex.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
                    <span style={{color:"var(--cream2)"}}>{ex.name}</span>
                    <span className="mono" style={{fontSize:12,color:"var(--gold2)"}}>{ex.unit==="reps"?`BW × ${ex.reps}`:`${ex.weight}${ex.unit} × ${ex.reps}`}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <NavBar active="home" setScreen={setScreen}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
