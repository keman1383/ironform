                <div style={{display:"flex",justifyContent:"center",gap:28,marginTop:20}}>
                  {[{label:"Exercises",value:sd.exercises.length},{label:"Sets Done",value:sd.exercises.reduce((a,e)=>a+e.completedSets,0)},{label:"PRs",value:prCount}].map(stat=>(
                    <div key={stat.label} style={{textAlign:"center"}}>
                      <div className="display" style={{fontSize:28,color:stat.label==="PRs"&&stat.value>0?"var(--forest2)":"var(--gold2)",lineHeight:1}}>{stat.value}</div>
                      <div className="sans" style={{fontSize:7,fontWeight:700,color:"rgba(245,240,232,0.4)",letterSpacing:3,marginTop:4,textTransform:"uppercase"}}>{stat.label}</div>
                    </div>
                  ))}
                </div>
                {(()=>{ const vol=sd.exercises.reduce((acc,ex)=>{ if(ex.unit==="reps"||ex.unit==="secs") return acc; return acc+(ex.setData||[]).reduce((a,s)=>(s.weight||0)*(s.reps||0)+a,0); },0); if(!vol) return null; return <div className="sans" style={{marginTop:12,fontSize:10,fontWeight:700,color:"var(--gold2)",letterSpacing:2,textTransform:"uppercase"}}>Volume: {vol.toLocaleString()} lbs</div>; })()}
              </div>
              <div style={{padding:"10px 20px 20px"}}>
                {hasMidAdds&&<div className="card" style={{borderTop:"3px solid var(--navy)",marginBottom:10,cursor:"pointer"}} onClick={()=>setModal("addToTemplate")}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div className="sans" style={{fontSize:8,fontWeight:700,color:"var(--navy)",letterSpacing:3,textTransform:"uppercase",marginBottom:3}}>New Exercises Added</div><div className="slab" style={{fontSize:13,color:"var(--navy)",fontWeight:500}}>Add {sd.midWorkoutAddedExIds.length===1?"it":"them"} to your {tmpl.label} template?</div></div><span style={{color:"var(--navy)",fontSize:20}}>›</span></div></div>}
                {achieved.length>0&&<div className="card" style={{borderTop:"3px solid var(--forest)",marginBottom:10}}><span className="label" style={{color:"var(--forest)"}}>🎯 Goals Achieved</span>{achieved.map((g,i)=>{ const def=allExercises.find(e=>e.id===g.exId); return <div key={i} className="sans" style={{fontSize:11,fontWeight:700,color:"var(--forest)",padding:"4px 0",borderBottom:"1px solid rgba(45,90,61,0.2)"}}>✓ {def?.name||g.exId} — {g.targetWeight} lbs</div>; })}</div>}
                <Divider label="Exercise Breakdown"/>
                {sd.exercises.map(ex=>(
                  <div key={ex.id} className="card" style={{marginBottom:6,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                          <span className="slab" style={{fontWeight:600,fontSize:14,color:"var(--navy)"}}>{ex.name}</span>
                          {ex.improved&&<span className="tag tag-forest" style={{fontSize:7}}>PR ↑</span>}
                        </div>
                        <div className="sans" style={{fontSize:10,fontWeight:600,color:"var(--muted)",letterSpacing:1}}>{ex.unit==="reps"?"Bodyweight":`${ex.weight} ${ex.unit}`} · {ex.skipped?"Skipped":`${ex.completedSets}/${ex.totalSets} sets`}</div>
                        {ex.note&&<div className="slab" style={{fontSize:12,color:"var(--muted)",marginTop:4,fontStyle:"italic"}}>"{ex.note}"</div>}
                      </div>
                      <span style={{fontSize:16,color:ex.skipped?"var(--muted)":ex.completedSets===ex.totalSets?"var(--forest)":"var(--muted)",marginLeft:10}}>{ex.skipped?"–":ex.completedSets===ex.totalSets?"✓":"~"}</span>
                    </div>
                  </div>
                ))}
                <button className="btn" onClick={()=>setScreen("home")}>Back to Home</button>
                <button className="btn-outline" style={{width:"100%",marginTop:8,textAlign:"center"}} onClick={()=>setScreen("history")}>View History</button>
              </div>
            </div>
          </div>
        );
      }

      // ── Goals ──────────────────────────────────────────────────────────────
      if(screen==="goals") return (
        <div className="app screen">{renderModal()}{Toast}
          <div className="header"><div className="logo">IRON<span>FORM</span></div><button className="btn-sm" onClick={()=>setModal("addLiftGoal")}>+ New Goal</button></div>
          <div className="content">
            <div style={{padding:"16px 20px 0"}}>
              <div className="slab" style={{fontSize:24,fontWeight:600,color:"var(--navy)",marginBottom:4}}>Lift Goals</div>
              <p className="sans" style={{color:"var(--muted)",fontSize:11,fontWeight:600,marginBottom:16,lineHeight:1.6,letterSpacing:0.5}}>Set a target weight for any exercise and track your progress.</p>
            </div>
            <div style={{padding:"0 20px 20px"}}>
              {liftGoals.length===0?(
                <div className="card" style={{textAlign:"center",padding:40}}>
                  <div style={{fontSize:32,marginBottom:12}}>🎯</div>
                  <div className="sans" style={{color:"var(--muted)",fontSize:11,fontWeight:700,marginBottom:18,letterSpacing:2,textTransform:"uppercase"}}>No goals set yet</div>
                  <button className="btn" onClick={()=>setModal("addLiftGoal")}>Set Your First Goal</button>
                </div>
              ):liftGoals.map(goal=>{
                const def=allExercises.find(e=>e.id===goal.exId); if(!def) return null;
                const history=getLiftHistory(goal.exId), current=history.length>0?history[history.length-1].weight:null;
                const pct=current?Math.min(100,Math.round((current/goal.targetWeight)*100)):0;
                const goalAchieved=current&&current>=goal.targetWeight;
                return (
                  <div key={goal._id} className="card" style={{marginBottom:12,padding:0,overflow:"hidden"}}>
                    <div style={{background:"var(--navy)",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div className="slab" style={{fontSize:15,fontWeight:600,color:"var(--cream)"}}>{def.name}</div>
                        <div className="sans" style={{fontSize:8,fontWeight:700,color:"rgba(245,240,232,0.45)",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>Target</div>
                      </div>
                      <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
                        <div className="display" style={{fontSize:18,color:"var(--gold2)"}}>{goal.targetWeight}<span className="sans" style={{fontSize:8,color:"rgba(245,240,232,0.45)",marginLeft:3,letterSpacing:1}}>{def.unit}</span></div>
                        <button onClick={()=>doDelLiftGoal(goal._id)} className="btn-ghost" style={{fontSize:16,lineHeight:1,color:"rgba(245,240,232,0.35)"}}>×</button>
                      </div>
                    </div>
                    <div style={{padding:"14px 14px 16px"}}>
                      <div className="sans" style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginBottom:10,letterSpacing:0.5}}>
                        {current&&<span>Current: <span style={{color:"var(--navy)",fontWeight:700}}>{current} {def.unit}</span></span>}
                        {(()=>{ const orm=getEffective1RM(oneRepMaxes,workouts,goal.exId); if(!orm) return null; return <span style={{marginLeft:10}}>Est. 1RM: <span style={{color:"var(--gold)",fontWeight:700}}>{orm.value} {def.unit}</span></span>; })()}
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span className="label" style={{marginBottom:0,fontSize:7}}>Progress</span>
                        <span className="sans" style={{fontSize:10,fontWeight:700,color:goalAchieved?"var(--forest)":"var(--rust)"}}>{pct}%{goalAchieved?" — Achieved!":""}</span>
                      </div>
                      <div style={{height:6,background:"var(--parchment)",border:"1px solid var(--rule)",overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${pct}%`,background:goalAchieved?"var(--forest)":"var(--rust)",transition:"width 0.6s ease"}}/></div>
                      {history.length>0?<div style={{background:"var(--cream)",border:"1px solid var(--rule)",padding:"10px 8px 6px"}}><MiniChart history={history} targetWeight={goal.targetWeight}/></div>:<div className="sans" style={{fontSize:10,fontWeight:600,color:"var(--muted)",textAlign:"center",padding:"12px 0",letterSpacing:1,textTransform:"uppercase"}}>Complete a workout with {def.name} to start tracking</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <NavBar active="goals" setScreen={setScreen}/>
        </div>
      );

      // ── History ────────────────────────────────────────────────────────────
      if(screen==="history") return (
        <div className="app screen">{renderModal()}{Toast}
          <div className="header"><div className="logo">IRON<span>FORM</span></div><button className="btn-sm" onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}>+ Log Past</button></div>
          <div className="content">
            <div style={{display:"flex",borderBottom:"2px solid var(--rule)",marginBottom:0}}>
              {[["log","Workout Log"],["calendar","Calendar"]].map(([tab,lbl])=><button key={tab} onClick={()=>setHistoryTab(tab)} className="sans" style={{flex:1,padding:"12px 10px",fontSize:9,fontWeight:700,letterSpacing:3,textTransform:"uppercase",cursor:"pointer",border:"none",borderBottom:historyTab===tab?"2px solid var(--rust)":"2px solid transparent",background:"transparent",color:historyTab===tab?"var(--rust)":"var(--muted)",marginBottom:"-2px"}}>{lbl}</button>)}
            </div>
            <div style={{padding:"16px 20px 20px"}}>
              {historyTab==="calendar"&&(
                <div>
                  <div className="card"><CalendarView workouts={workouts} onSelectDate={setCalSelectedDate} selectedDate={calSelectedDate} calYear={calYear} calMonth={calMonth} setCalYear={setCalYear} setCalMonth={setCalMonth}/></div>
                  {calSelectedDate&&(()=>{
                    const dw=workouts.filter(w=>new Date(w.date).toDateString()===calSelectedDate);
                    if(!dw.length) return null;
                    return <div style={{marginTop:8}}>
                      <span className="label" style={{marginBottom:8}}>{new Date(calSelectedDate).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
                      {dw.map((w,wi)=>(
                        <div key={wi} className="card" style={{marginBottom:8,padding:"14px 16px"}}>
                          {w.templateLabel&&<div style={{marginBottom:8}}><span className="tag tag-rust">{w.templateLabel}</span></div>}
                          {w.exercises?.map((ex,ei)=>{ const hsd=ex.setData?.length>0; return <div key={ei} style={{paddingBottom:8,marginBottom:8,borderBottom:"1px solid var(--rule)"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:hsd?4:0}}><span className="slab" style={{color:"var(--navy)",fontWeight:500}}>{ex.name}</span>{!hsd&&<span className="sans" style={{fontSize:11,fontWeight:700,color:"var(--rust)"}}>{ex.unit==="reps"?`BW × ${ex.reps}`:`${ex.weight}${ex.unit} × ${ex.reps}`}{ex.sets>1?` × ${ex.sets}s`:""}</span>}</div>{hsd&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>{ex.setData.map((sd,si)=><span key={si} className="tag tag-rust" style={{fontSize:7}}>S{si+1}: {ex.unit==="secs"?`${sd.reps}s`:`${sd.weight}${ex.unit!=="reps"?ex.unit:""} × ${sd.reps}`}</span>)}</div>}{ex.note&&<div className="slab" style={{fontSize:11,color:"var(--muted)",marginTop:4,fontStyle:"italic"}}>"{ex.note}"</div>}</div>; })}
                        </div>
                      ))}
                    </div>;
                  })()}
                </div>
              )}
              {historyTab==="log"&&(workouts.length===0?(
                <div className="card" style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:12}}>📋</div><div className="sans" style={{color:"var(--muted)",marginBottom:20,fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>No workouts yet</div><button className="btn" onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}>Import Past Workouts</button></div>
              ):[...workouts].reverse().map(w=>{
                const wKey=w._id||w.date, expanded=!!expandedWorkouts[wKey];
                return (
                  <div key={wKey} className="card" style={{marginBottom:8,padding:0,overflow:"hidden"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",padding:"14px 16px",borderLeft:expanded?"3px solid var(--rust)":"3px solid transparent"}} onClick={()=>setExpandedWorkouts(p=>({...p,[wKey]:!p[wKey]}))}>
                      <div>
                        <div className="slab" style={{fontWeight:600,fontSize:14,color:"var(--navy)"}}>{new Date(w.date).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}</div>
                        <div className="sans" style={{fontSize:9,fontWeight:600,color:"var(--muted)",letterSpacing:1,marginTop:2,textTransform:"uppercase"}}>{w.exercises?.length} exercises</div>
                      </div>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        {w.templateLabel&&(()=>{ const tmplColors={"Push Day":"tag-forest","Pull Day":"tag-navy","Leg Day":"tag-rust"}; return <span className={`tag ${tmplColors[w.templateLabel]||""}`}>{w.templateLabel}</span>; })()}
                        {w.imported&&<span className="tag tag-navy">Imported</span>}
                        <span style={{color:"var(--muted)",fontSize:16,lineHeight:1}}>{expanded?"▲":"▼"}</span>
                      </div>
                    </div>
                    {expanded&&(
                      <div style={{padding:"0 16px 14px",borderTop:"1px solid var(--rule)"}}>
                        {w.exercises?.map((ex,ei)=>{
                          const noteKey=`${wKey}_${ex.id}`, hasNote=ex.note?.trim(), hsd=ex.setData?.length>0;
                          const isEN=editingExName?.wKey===wKey&&editingExName?.exIdx===ei;
                          return (
                            <div key={ex.id||ei}>
                              <div style={{padding:"8px 0",borderBottom:"1px solid var(--rule)"}}>
                                {deleteExConfirm?.wKey===wKey&&deleteExConfirm?.exId===ex.id?(
                                  <div style={{display:"flex",gap:6,alignItems:"center",padding:"4px 0"}}>
                                    <span className="sans" style={{fontSize:9,fontWeight:700,color:"var(--rust)",letterSpacing:1,flex:1}}>Remove {ex.name}?</span>
                                    <button className="btn-sm" style={{background:"var(--rust)",color:"var(--cream)",border:"none",borderBottom:"2px solid var(--brown)"}} onClick={async()=>{const u={...w,exercises:w.exercises.filter((_,xi)=>xi!==ei)};await updateWorkoutRecord(u);setDeleteExConfirm(null);showToast("Exercise removed");}}>Remove</button>
                                    <button className="btn-sm" onClick={()=>setDeleteExConfirm(null)}>Cancel</button>
                                  </div>
                                ):(
                                  <>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:hsd?4:0,alignItems:"center"}}>
                                  {isEN?(
                                    <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                                      <input className="input" style={{flex:1,padding:"5px 8px",fontSize:13}} value={editingExName.value} autoFocus onChange={e=>setEditingExName(p=>({...p,value:e.target.value}))} onKeyDown={e=>{ if(e.key==="Enter"){const u={...w,exercises:w.exercises.map((x,xi)=>xi===ei?{...x,name:editingExName.value}:x)};updateWorkoutRecord(u);setEditingExName(null);showToast("Name updated!");} if(e.key==="Escape") setEditingExName(null); }}/>
                                      <button onClick={()=>{const u={...w,exercises:w.exercises.map((x,xi)=>xi===ei?{...x,name:editingExName.value}:x)};updateWorkoutRecord(u);setEditingExName(null);showToast("Name updated!");}} style={{background:"var(--forest)",border:"none",borderBottom:"2px solid #1a3a25",padding:"5px 10px",color:"var(--cream)",fontFamily:"'Josefin Sans',sans-serif",fontSize:8,fontWeight:700,letterSpacing:2,cursor:"pointer",textTransform:"uppercase"}}>✓</button>
                                      <button onClick={()=>setEditingExName(null)} className="btn-ghost" style={{fontSize:16,color:"var(--muted)"}}>×</button>
                                    </div>
                                  ):(
                                    <span style={{color:"var(--navy)",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setEditingExName({wKey,exIdx:ei,value:ex.name})}>
                                      <span className="slab" style={{fontWeight:500}}>{ex.name}</span>
                                      <span className="sans" style={{fontSize:8,color:"var(--rule2)"}}>✎</span>
                                      {hasNote&&<span style={{fontSize:11,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setExpandedExNote(p=>({...p,[noteKey]:!p[noteKey]}));}}>💬</span>}
                                      {ex.skipped&&<span className="tag tag-rust" style={{fontSize:6,letterSpacing:1}}>SKIPPED</span>}
                                    </span>
                                  )}
                                  {!isEN&&!hsd&&<span className="sans" style={{fontSize:11,fontWeight:700,color:"var(--rust)"}}>{ex.unit==="reps"?`BW × ${ex.reps}`:`${ex.weight}${ex.unit} × ${ex.reps}`}{ex.sets>1?` × ${ex.sets}s`:""}</span>}
                                  {!isEN&&<button onClick={()=>setDeleteExConfirm({wKey,exId:ex.id})} className="btn-ghost" style={{fontSize:16,color:"var(--rule2)",marginLeft:4,flexShrink:0}}>×</button>}
                                </div>
                                {hsd&&!isEN&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>{ex.setData.map((sd,si)=><span key={si} className="tag tag-rust" style={{fontSize:7}}>S{si+1}: {ex.unit==="secs"?`${sd.reps}s`:`${sd.weight}${ex.unit!=="reps"?ex.unit:""} × ${sd.reps}`}</span>)}</div>}
                              </>
                                )}
                              </div>
                              {expandedExNote[noteKey]&&hasNote&&<div className="slab" style={{padding:"6px 10px",background:"rgba(184,125,46,0.06)",borderLeft:"2px solid var(--gold)",margin:"4px 0",fontStyle:"italic",fontSize:12,color:"var(--muted)"}}>"{ex.note}"</div>}
                            </div>
                          );
                        })}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
                          {deleteWorkoutConfirm===wKey?(
                            <div style={{display:"flex",gap:6,alignItems:"center",flex:1}}>
                              <span className="sans" style={{fontSize:9,fontWeight:700,color:"var(--rust)",letterSpacing:1}}>Delete this workout?</span>
                              <button className="btn-sm" style={{background:"var(--rust)",color:"var(--cream)",border:"none",borderBottom:"2px solid var(--brown)"}} onClick={async()=>{await deleteWorkoutRecord(w);setDeleteWorkoutConfirm(null);showToast("Workout deleted");}}>Yes, Delete</button>
                              <button className="btn-sm" onClick={()=>setDeleteWorkoutConfirm(null)}>Cancel</button>
                            </div>
                          ):(
                            <>
                              <button className="btn-sm" style={{background:"transparent",border:"1px solid rgba(196,82,42,0.4)",color:"var(--rust)"}} onClick={()=>setDeleteWorkoutConfirm(wKey)}>🗑 Delete</button>
                              <button className="btn-sm" onClick={()=>{setEditingWorkout(w);setModal("editWorkout");}}>✏ Edit</button>
                            </>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              }))}
            </div>
          </div>
          <NavBar active="history" setScreen={setScreen}/>
        </div>
      );

      // ── Profile ────────────────────────────────────────────────────────────
      if(screen==="profile") return (
        <div className="app screen">{renderModal()}{Toast}
          <div className="header"><div className="logo">IRON<span>FORM</span></div></div>
          <div className="content">
            <div style={{background:"var(--navy)",borderBottom:"4px solid var(--rust)",padding:"20px 20px 20px",position:"relative"}}>
              <div style={{position:"absolute",bottom:0,left:0,right:0,height:"3px",background:"var(--gold)",marginBottom:"-7px"}}/>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:56,height:56,background:"var(--forest)",border:"2px solid var(--gold)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>🏋️</div>
                <div>
                  <div className="slab" style={{fontSize:18,fontWeight:600,color:"var(--cream)"}}>{authUser.displayName||"Athlete"}</div>
                  <div className="sans" style={{fontSize:9,fontWeight:600,color:"rgba(245,240,232,0.45)",marginTop:2,letterSpacing:2,textTransform:"uppercase"}}>{authUser.email}</div>
                  <div className="sans" style={{fontSize:9,fontWeight:600,color:"rgba(245,240,232,0.45)",marginTop:2,letterSpacing:2,textTransform:"uppercase"}}>{workouts.length} sessions logged</div>
                </div>
              </div>
            </div>
            <div style={{padding:"16px 20px 20px"}}>
              <div className="card" style={{marginBottom:14,overflow:"hidden"}}>
                <div className="card-header-navy"><span className="sans" style={{fontSize:9,fontWeight:700,letterSpacing:3,color:"rgba(245,240,232,0.6)",textTransform:"uppercase"}}>Default Training Goal</span></div>
                <div style={{padding:"0 0 4px"}}>
                  {Object.entries(GOALS).map(([key,g])=>(
                    <button key={key} onClick={async()=>{await saveProfile({...profile,goal:key});showToast("Goal updated!");}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:profile?.goal===key?"rgba(196,82,42,0.06)":"transparent",borderLeft:profile?.goal===key?"3px solid var(--rust)":"3px solid transparent",borderRight:"none",borderTop:"none",borderBottom:"1px solid var(--rule)",padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
                      <div>
                        <div className="slab" style={{fontWeight:500,fontSize:14,color:profile?.goal===key?"var(--rust)":"var(--navy)"}}>{g.label}</div>
                        <div className="sans" style={{fontSize:9,fontWeight:600,color:"var(--muted)",marginTop:1,letterSpacing:0.5}}>{g.desc}</div>
                      </div>
                      {profile?.goal===key&&<span style={{color:"var(--forest)",fontWeight:700}}>✓</span>}
                    </button>
                  ))}
                </div>
              </div>
              <div className="card" style={{marginBottom:14,overflow:"hidden"}}>
                <div className="card-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="sans" style={{fontSize:9,fontWeight:700,letterSpacing:3,color:"rgba(245,240,232,0.7)",textTransform:"uppercase"}}>Custom Exercises ({customExs.length})</span>
                  <button className="btn-sm" style={{fontSize:8,padding:"4px 10px"}} onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setModal("addExercise");}}>+ New</button>
                </div>
                <div style={{padding:"4px 0 8px"}}>
                  {customExs.length===0?<p className="sans" style={{color:"var(--muted)",fontSize:11,fontWeight:600,padding:"8px 14px",letterSpacing:0.5}}>None yet.</p>:customExs.map(ex=>(
                    <div key={ex._fid||ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:"1px solid var(--rule)"}}>
                      <div><span className="slab" style={{fontSize:14,fontWeight:500,color:"var(--navy)"}}>{ex.name}</span><div className="sans" style={{fontSize:9,fontWeight:600,color:"var(--muted)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>{ex.category} · {ex.unit==="reps"?"bodyweight":`${ex.defaultWeight}${ex.unit}`}</div></div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card" style={{marginBottom:14,overflow:"hidden"}}>
                <div className="card-header-navy" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="sans" style={{fontSize:9,fontWeight:700,letterSpacing:3,color:"rgba(245,240,232,0.6)",textTransform:"uppercase"}}>One-Rep Maxes</span>
                  <button className="btn-sm" style={{fontSize:8,padding:"4px 10px",background:"rgba(245,240,232,0.1)",border:"1px solid rgba(245,240,232,0.2)",color:"rgba(245,240,232,0.6)"}} onClick={()=>{const init={};["bench","squat","lat_pulldown"].forEach(id=>{const s=oneRepMaxes.find(r=>r.exId===id);init[id]=s?s.weight:"";});setDraft1RMs(init);setEditing1RMs(!editing1RMs);}}>{editing1RMs?"Cancel":"Edit"}</button>
                </div>
                <div style={{padding:"4px 0 8px"}}>
                  <p className="sans" style={{color:"var(--muted)",fontSize:9,fontWeight:600,padding:"6px 14px 10px",letterSpacing:0.5,lineHeight:1.6}}>Enter your known 1RM. Blank or 15+ days old → Epley formula used.</p>
                  {[{id:"bench",name:"Bench Press"},{id:"squat",name:"Squat"},{id:"lat_pulldown",name:"Lat Pull Down"}].map(({id,name})=>{
                    const stored=oneRepMaxes.find(r=>r.exId===id), calc=calcEpley1RM(workouts,id), eff=getEffective1RM(oneRepMaxes,workouts,id);
                    return (
                      <div key={id} style={{padding:"10px 14px",borderBottom:"1px solid var(--rule)"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span className="slab" style={{fontSize:14,fontWeight:500,color:"var(--navy)"}}>{name}</span>
                          <div style={{textAlign:"right"}}>
                            {eff?<div className="display" style={{fontSize:15,color:"var(--navy)"}}>{eff.value} lbs</div>:<div className="sans" style={{fontSize:10,fontWeight:600,color:"var(--muted)"}}>No data</div>}
                            {eff&&<div className="sans" style={{fontSize:8,fontWeight:600,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase"}}>{eff.source==="stored"?"Entered":eff.source==="stored_expired"?"Entered (expired)":"Epley calc"}</div>}
                          </div>
                        </div>
                        {editing1RMs&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}><input className="input" style={{flex:1,padding:"8px 12px",fontSize:13}} type="number" placeholder="Enter lbs" value={draft1RMs[id]||""} onChange={e=>setDraft1RMs(p=>({...p,[id]:e.target.value}))}/>{stored&&<button onClick={async()=>{await doDel1RM(id);showToast("1RM cleared");}} className="btn-ghost" style={{color:"var(--rust)",fontSize:16}}>×</button>}</div>}
                        {stored&&!editing1RMs&&<div className="sans" style={{fontSize:8,fontWeight:600,color:"var(--muted)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>Updated {new Date(stored.updatedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}{(Date.now()-new Date(stored.updatedAt))/86400000>15&&" · Expired, using calc"}</div>}
                        {calc&&!stored&&<div className="sans" style={{fontSize:8,fontWeight:600,color:"var(--muted)",marginTop:2,letterSpacing:0.5}}>Calc from recent lifts: {calc} lbs</div>}
                      </div>
                    );
                  })}
                  {editing1RMs&&<div style={{padding:"10px 14px 4px"}}><button className="btn" style={{marginTop:0}} onClick={async()=>{for(const [id,val] of Object.entries(draft1RMs)){if(val&&!isNaN(Number(val))&&Number(val)>0) await doSave1RM(id,Number(val));}setEditing1RMs(false);showToast("1RMs saved!");}}>Save 1RMs</button></div>}
                </div>
              </div>
              <button className="btn-outline" style={{width:"100%",marginBottom:10,textAlign:"center",display:"block"}} onClick={()=>setScreen("exercise_db")}>📋 Exercise Database ›</button>
              <button className="btn-danger" style={{width:"100%",marginTop:6,textAlign:"center",display:"block",padding:"13px"}} onClick={handleSignOut}>Sign Out</button>
            </div>
          </div>
          <NavBar active="profile" setScreen={setScreen}/>
        </div>
      );

      // ── Exercise Database ──────────────────────────────────────────────────
      if(screen==="exercise_db"){
        const startEdit=(ex,isBuiltin)=>{ setEditingExDef({ex,isBuiltin}); setDraftExDef({name:ex.name,defaultWeight:ex.defaultWeight,increment:ex.increment,equipmentType:ex.equipmentType||"machine",unit:ex.unit||"lbs",barbellWeight:ex.barbellWeight||45}); };
        const saveEdit=async()=>{ if(!editingExDef) return; const {ex,isBuiltin}=editingExDef; const updated={...ex,...draftExDef,defaultWeight:Number(draftExDef.defaultWeight)||0,increment:Number(draftExDef.increment)||2.5,barbellWeight:Number(draftExDef.barbellWeight)||45}; if(isBuiltin){ const n={...builtinOverrides,[ex.id]:draftExDef}; setBuiltinOverrides(n); await saveProfile({...profile,builtinExOverrides:n}); } else await updateCustomExRecord(updated); setEditingExDef(null); setDraftExDef({}); showToast("Exercise updated!"); };
        return (
          <div className="app screen">{Toast}
            <div className="header"><div className="logo">IRON<span>FORM</span></div></div>
            <div className="content">
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px 0"}}>
                <BackBtn onClick={()=>setScreen("profile")} label="Profile"/>
                <span className="sans" style={{fontSize:10,fontWeight:700,letterSpacing:3,color:"var(--navy)",textTransform:"uppercase"}}>Exercise Database</span>
              </div>
              <div style={{padding:"0 20px 20px"}}>
                <p className="sans" style={{color:"var(--muted)",fontSize:10,fontWeight:600,marginBottom:16,letterSpacing:0.5,lineHeight:1.6}}>Tap any exercise to edit defaults.</p>
                {CATEGORIES.map(cat=>{ const catExs=allExercises.filter(e=>e.category===cat); if(!catExs.length) return null; return (
                  <div key={cat} style={{marginBottom:18}}>
                    <Divider label={cat}/>
                    {catExs.map(ex=>{ const isBuiltin=!ex.custom, override=isBuiltin?builtinOverrides[ex.id]:null, displayEx=override?{...ex,...override}:ex, editing=editingExDef?.ex.id===ex.id; return (
                      <div key={ex.id} className="card" style={{marginBottom:5,padding:"10px 12px"}}>
                        {editing?(
                          <div>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span className="sans" style={{fontSize:8,fontWeight:700,color:"var(--rust)",textTransform:"uppercase",letterSpacing:3}}>Editing</span><button onClick={()=>setEditingExDef(null)} className="btn-ghost" style={{fontSize:18,color:"var(--muted)"}}>×</button></div>
                            <div style={{display:"flex",flexDirection:"column",gap:10}}>
                              <div><span className="label">Name</span><input className="input" value={draftExDef.name||""} onChange={e=>setDraftExDef(p=>({...p,name:e.target.value}))} autoCapitalize="words"/></div>
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                                <div><span className="label">Default Weight</span><input className="input" type="number" value={draftExDef.defaultWeight||""} onChange={e=>setDraftExDef(p=>({...p,defaultWeight:e.target.value}))}/></div>
                                <div><span className="label">Increment</span><input className="input" type="number" value={draftExDef.increment||""} onChange={e=>setDraftExDef(p=>({...p,increment:e.target.value}))}/></div>
                              </div>
                              <div><span className="label">Unit</span><div style={{display:"flex",gap:5,marginTop:4}}>{["lbs","kg","reps"].map(u=><button key={u} onClick={()=>setDraftExDef(p=>({...p,unit:u}))} style={{flex:1,padding:"8px",fontSize:10,fontFamily:"'Josefin Sans',sans-serif",fontWeight:700,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",background:draftExDef.unit===u?"rgba(196,82,42,0.08)":"var(--cream2)",border:draftExDef.unit===u?"1px solid rgba(196,82,42,0.5)":"1px solid var(--rule)",color:draftExDef.unit===u?"var(--rust)":"var(--muted)"}}>{u}</button>)}</div></div>
                              <div><span className="label">Equipment</span><div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>{[["barbell","🏋️"],["dumbbell","💪"],["cable","🔗"],["assisted","🤝"],["machine","⚙️"],["bodyweight","🧍"]].map(([key,lbl])=><button key={key} onClick={()=>setDraftExDef(p=>({...p,equipmentType:key}))} style={{padding:"6px 9px",fontSize:9,fontFamily:"'Josefin Sans',sans-serif",fontWeight:700,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",background:draftExDef.equipmentType===key?"rgba(196,82,42,0.08)":"var(--cream2)",border:draftExDef.equipmentType===key?"1px solid rgba(196,82,42,0.5)":"1px solid var(--rule)",color:draftExDef.equipmentType===key?"var(--rust)":"var(--muted)"}}>{lbl} {key}</button>)}</div></div>
                              {draftExDef.equipmentType==="barbell"&&<div><span className="label">Barbell Weight (lbs)</span><input className="input" type="number" value={draftExDef.barbellWeight||""} onChange={e=>setDraftExDef(p=>({...p,barbellWeight:e.target.value}))}/></div>}
                              <div style={{display:"flex",gap:8,marginTop:4}}>
                                <button className="btn" style={{flex:1,margin:0}} onClick={saveEdit}>Save</button>
                                {!isBuiltin&&<button className="btn-danger" style={{flexShrink:0,padding:"10px 14px"}} onClick={async()=>{await deleteCustomExRecord(ex);setEditingExDef(null);showToast("Deleted");}}>🗑 Delete</button>}
                              </div>
                              {isBuiltin&&override&&<button className="btn-outline" style={{width:"100%",fontSize:9,textAlign:"center",marginTop:8}} onClick={async()=>{const n={...builtinOverrides};delete n[ex.id];setBuiltinOverrides(n);await saveProfile({...profile,builtinExOverrides:n});setEditingExDef(null);showToast("Reset to default");}}>↩ Reset to Default</button>}
                            </div>
                          </div>
                        ):(
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>startEdit(ex,isBuiltin)}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <span className="slab" style={{fontSize:14,fontWeight:500,color:"var(--navy)"}}>{displayEx.name}</span>
                                {override&&<span className="tag tag-gold" style={{fontSize:6}}>modified</span>}
                                {ex.custom&&<span className="tag tag-navy" style={{fontSize:6}}>custom</span>}
                              </div>
                              <div className="sans" style={{fontSize:9,fontWeight:600,color:"var(--muted)",marginTop:2,letterSpacing:0.5}}>{displayEx.unit==="reps"?"Bodyweight":`${displayEx.defaultWeight}${displayEx.unit}`} · {displayEx.equipmentType||"machine"} · +{displayEx.increment}{displayEx.unit==="reps"?"":displayEx.unit}</div>
                            </div>
                            <span className="sans" style={{color:"var(--rule2)",fontSize:12,flexShrink:0,marginLeft:8}}>✎</span>
                          </div>
                        )}
                      </div>
                    ); })}
                  </div>
                ); })}
                <button className="btn" style={{marginBottom:20}} onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setScreen("profile");setModal("addExercise");}}>+ Add Custom Exercise</button>
              </div>
            </div>
          </div>
        );
      }

      // ── Home ───────────────────────────────────────────────────────────────
      const tiles=[
        ...WORKOUT_TEMPLATES.map(tmpl=>{ const last=[...workouts].reverse().find(w=>w.templateLabel===tmpl.label), days=last?Math.floor((Date.now()-new Date(last.date))/86400000):null; return {id:tmpl.id,emoji:tmpl.emoji,label:tmpl.label,sub:days!==null?(days===0?"Today":`${days}d ago`):"Never done",topColor:tmpl.topColor,onClick:()=>{setActiveTmpl(tmpl);setExtraExIds([]);setRemovedExIds([]);setPreviewOrder(null);const sr=GOAL_SETS[profile?.goal||"hypertrophy"];setPreviewSets(sr.sets);setPreviewReps(sr.reps);setScreen("preset_preview");}}; }),
        {id:"custom",emoji:"⚡",label:"Custom",sub:"Build your own",topColor:"var(--gold)",onClick:()=>{setCustomExIds([]);setCustomGoal("hypertrophy");setScreen("custom_builder");}},
      ];
      const lastWorkout=workouts[workouts.length-1], daysSinceLast=lastWorkout?Math.floor((Date.now()-new Date(lastWorkout.date))/86400000):null;
      const streak=(()=>{ if(!workouts.length) return 0; let s=0; const dates=new Set(workouts.map(w=>new Date(w.date).toDateString())); const d=new Date(); d.setHours(0,0,0,0); while(dates.has(d.toDateString())){s++;d.setDate(d.getDate()-1);} return s; })();
      const greeting=(()=>{ const h=new Date().getHours(); if(h<12) return "Good Morning"; if(h<17) return "Good Afternoon"; return "Good Evening"; })();

      return (
        <div className="app screen">{renderModal()}{Toast}
          <div className="header">
            <div className="logo">IRON<span>FORM</span></div>
            {authUser.photoURL&&<img src={authUser.photoURL} alt="" style={{width:30,height:30,border:"2px solid var(--gold)",cursor:"pointer",opacity:0.9}} onClick={()=>setScreen("profile")}/>}
          </div>
          {/* Hero Stats Band */}
          <div style={{background:"var(--navy)",borderBottom:"4px solid var(--rust)",padding:"18px 20px 20px",position:"relative"}}>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:"3px",background:"var(--gold)",marginBottom:"-7px"}}/>
            <div className="sans" style={{fontSize:9,fontWeight:700,letterSpacing:4,color:"var(--gold2)",textTransform:"uppercase",marginBottom:4}}>{greeting}</div>
            <div className="slab" style={{fontSize:14,fontStyle:"italic",color:"rgba(245,240,232,0.5)",marginBottom:16}}>Ready to train, {authUser.displayName?.split(" ")[0]||"Athlete"}</div>
            <div style={{display:"flex",gap:0}}>
              {[{label:"Sessions",value:workouts.length},{label:"Days Rest",value:daysSinceLast===null?"—":daysSinceLast},{label:"Streak",value:streak}].map((stat,i)=>(
                <div key={stat.label} style={{flex:1,textAlign:"center",borderLeft:i>0?"1px solid rgba(245,240,232,0.1)":"none",paddingTop:4}}>
                  <div className="display" style={{fontSize:28,color:"var(--gold2)",lineHeight:1}}>{stat.value}</div>
                  <div className="sans" style={{fontSize:7,fontWeight:700,letterSpacing:3,color:"rgba(245,240,232,0.35)",marginTop:5,textTransform:"uppercase"}}>{stat.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{padding:"16px 20px 20px"}}>
            <Divider label="Begin Session"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {tiles.map(tile=>(
                <button key={tile.id} onClick={tile.onClick} className="tile" style={{borderTopColor:tile.topColor}}>
                  <span style={{fontSize:28}}>{tile.emoji}</span>
                  <span className="slab" style={{fontWeight:600,fontSize:14,color:"var(--navy)",lineHeight:1.2}}>{tile.label}</span>
                  <span className="sans" style={{fontSize:8,fontWeight:700,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase"}}>{tile.sub}</span>
                </button>
              ))}
            </div>
            <Divider label="Quick Actions"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              <button className="card" style={{cursor:"pointer",textAlign:"center",padding:14,marginBottom:0,border:"1px solid var(--rule)"}} onClick={()=>{setPastDate("");setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]);setModal("logPastWorkout");}}><div style={{fontSize:18,marginBottom:4}}>📥</div><div className="sans" style={{fontSize:8,fontWeight:700,color:"var(--muted)",letterSpacing:3,textTransform:"uppercase"}}>Log Past</div></button>
              <button className="card" style={{cursor:"pointer",textAlign:"center",padding:14,marginBottom:0,border:"1px solid var(--rule)"}} onClick={()=>{setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});setModal("addExercise");}}><div style={{fontSize:18,marginBottom:4}}>➕</div><div className="sans" style={{fontSize:8,fontWeight:700,color:"var(--muted)",letterSpacing:3,textTransform:"uppercase"}}>New Lift</div></button>
            </div>
            {lastWorkout&&(
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                <div className="card-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="sans" style={{fontSize:8,fontWeight:700,letterSpacing:3,color:"rgba(245,240,232,0.7)",textTransform:"uppercase"}}>Last Session</span>
                  <span className="sans" style={{fontSize:9,fontWeight:700,color:"rgba(245,240,232,0.45)",letterSpacing:1}}>{new Date(lastWorkout.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                </div>
                <div style={{padding:"4px 0 8px"}}>
                  {lastWorkout.exercises?.slice(0,4).map(ex=>(
                    <div key={ex.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 14px",borderBottom:"1px solid var(--rule)"}}>
                      <span className="slab" style={{fontSize:13,fontWeight:500,color:"var(--navy)"}}>{ex.name}</span>
                      <span className="sans" style={{fontSize:11,fontWeight:700,color:"var(--rust)",letterSpacing:0.5}}>{ex.unit==="reps"?`BW × ${ex.reps}`:`${ex.weight}${ex.unit} × ${ex.reps}`}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <NavBar active="home" setScreen={setScreen}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
