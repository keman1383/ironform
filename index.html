function safeProgressWeight(current,goal,weeksSince,unit){
  if(goal==="maintain") return current;
  const factor=Math.pow(GOALS[goal].increment,weeksSince||1);
  const proposed=Math.round((current*factor)/2.5)*2.5;
  const maxInc=({lbs:10,reps:2}[unit]||5)*(weeksSince||1);
  return Math.min(proposed,current+maxInc);
}

function projectGoalDate(history,targetWeight){
  if(history.length<2) return null;
  const t0=new Date(history[0].date).getTime();
  const tNow=Date.now();
  const xs=history.map(h=>(new Date(h.date).getTime()-t0)/86400000);
  const ys=history.map(h=>h.weight);
  const n=xs.length,sx=xs.reduce((a,x)=>a+x,0),sy=ys.reduce((a,y)=>a+y,0);
  const sxy=xs.reduce((a,x,i)=>a+x*ys[i],0),sxx=xs.reduce((a,x)=>a+x*x,0);
  const denom=n*sxx-sx*sx;
  if(Math.abs(denom)<0.001) return null;
  const slope=(n*sxy-sx*sy)/denom;
  if(slope<=0) return null;
  const intercept=(sy-slope*sx)/n;
  const daysNeeded=(targetWeight-intercept)/slope;
  const targetDate=new Date(t0+daysNeeded*86400000);
  if(targetDate<new Date()) return "already achieved!";
  return targetDate;
}

function calcEpley1RM(workoutsArr,exId){
  for(let i=workoutsArr.length-1;i>=0;i--){
    const ex=workoutsArr[i].exercises?.find(e=>e.id===exId);
    if(!ex) continue;
    if(ex.setData&&ex.setData.length>0){
      const candidates=ex.setData.filter(s=>s.reps>=1&&s.weight>0);
      if(candidates.length>0){
        const best=candidates.reduce((a,b)=>{
          const a1=a.reps===1?a.weight:a.weight*(1+a.reps/30);
          const b1=b.reps===1?b.weight:b.weight*(1+b.reps/30);
          return b1>a1?b:a;
        });
        return best.reps===1?best.weight:Math.round(best.weight*(1+best.reps/30)*10)/10;
      }
    } else if(ex.reps>=1&&ex.weight>0){
      return ex.reps===1?ex.weight:Math.round(ex.weight*(1+ex.reps/30)*10)/10;
    }
  }
  return null;
}

function getEffective1RM(oneRepMaxes,workoutsArr,exId){
  const stored=oneRepMaxes.find(r=>r.exId===exId);
  if(stored){const d=(Date.now()-new Date(stored.updatedAt))/86400000;if(d<=15) return {value:stored.weight,source:"stored"};}
  const calc=calcEpley1RM(workoutsArr,exId);
  if(calc) return {value:calc,source:"calculated"};
  if(stored) return {value:stored.weight,source:"stored_expired"};
  return null;
}

function Confetti(){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const colors=["#c4522a","#d49840","#f5f0e8","#2d5a3d","#3d7a52","#1e3050","#b87d2e","#d46840"];
    const particles=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*100,w:8+Math.random()*8,h:4+Math.random()*6,color:colors[Math.floor(Math.random()*colors.length)],rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*8,vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,alpha:1}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height); let alive=false;
      particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;if(p.y>canvas.height*0.7)p.alpha=Math.max(0,p.alpha-0.02);if(p.alpha>0)alive=true;ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
      if(alive) raf=requestAnimationFrame(draw);
    };
    draw(); return()=>cancelAnimationFrame(raf);
  },[]);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:998}}/>;
}

function MiniChart({history,targetWeight,width=300,height=120}){
  const [tooltip,setTooltip]=useState(null);
  if(history.length<1) return <div style={{color:"var(--muted)",fontSize:12,textAlign:"center",padding:20}}>No data yet</div>;
  const t0=new Date(history[0].date).getTime(),tNow=Date.now();
  const projDate=history.length>=2?projectGoalDate(history,targetWeight):null;
  const tEnd=projDate&&projDate instanceof Date?Math.max(projDate.getTime(),tNow+7*86400000):tNow+30*86400000;
  const allW=[...history.map(h=>h.weight),targetWeight];
  const minW=Math.min(...allW)*0.95,maxW=Math.max(...allW)*1.02;
  const tx=t=>(t-t0)/(tEnd-t0)*width,ty=w=>height-(w-minW)/(maxW-minW)*height;
  const pts=history.map(h=>`${tx(new Date(h.date).getTime())},${ty(h.weight)}`).join(" ");
  const lastH=history[history.length-1];
  const projLine=projDate&&projDate instanceof Date?`M${tx(new Date(lastH.date).getTime())},${ty(lastH.weight)} L${tx(projDate.getTime())},${ty(targetWeight)}`:null;
  return(
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height,overflow:"visible"}}>
        <line x1="0" y1={ty(targetWeight)} x2={width} y2={ty(targetWeight)} stroke="var(--forest2)" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>
        <text x={width-2} y={ty(targetWeight)-4} textAnchor="end" fontSize="9" fill="var(--forest2)" fontFamily="Josefin Sans,sans-serif">{targetWeight} lbs</text>
        {history.length>1&&<polyline points={pts} fill="none" stroke="var(--rust)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
        {projLine&&<path d={projLine} fill="none" stroke="var(--gold2)" strokeWidth="1.5" strokeDasharray="5,4" opacity="0.7"/>}
        {history.map((h,i)=>{const cx=tx(new Date(h.date).getTime()),cy=ty(h.weight);return(<g key={i} style={{cursor:"pointer"}} onClick={()=>setTooltip(tooltip&&tooltip.i===i?null:{i,date:h.date,weight:h.weight,cx,cy})}><circle cx={cx} cy={cy} r="8" fill="transparent"/><circle cx={cx} cy={cy} r={tooltip&&tooltip.i===i?"5":"3.5"} fill={tooltip&&tooltip.i===i?"var(--gold2)":"var(--gold)"} stroke="var(--bg)" strokeWidth="1.5"/></g>);})}
        <line x1={tx(tNow)} y1="0" x2={tx(tNow)} y2={height} stroke="var(--muted)" strokeWidth="0.5" opacity="0.3"/>
      </svg>
      {tooltip&&<div style={{position:"absolute",top:Math.max(0,tooltip.cy-50),left:Math.min(width*0.7,tooltip.cx),background:"var(--navy)",border:"1px solid var(--rule)",borderRadius:0,padding:"6px 10px",fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"#f5f0e8",zIndex:10,pointerEvents:"none",whiteSpace:"nowrap"}}><div style={{color:"var(--gold2)"}}>{tooltip.weight} lbs</div><div style={{color:"rgba(245,240,232,0.55)"}}>{new Date(tooltip.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div></div>}
    </div>
  );
}

function CalendarView({workouts,onSelectDate,selectedDate,calYear,calMonth,setCalYear,setCalMonth}){
  const workoutDateMap=new Map();
  workouts.forEach(w=>{const ds=new Date(w.date).toDateString();if(!workoutDateMap.has(ds))workoutDateMap.set(ds,[]);workoutDateMap.get(ds).push(w);});
  const firstDay=new Date(calYear,calMonth,1).getDay(),daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const monthName=new Date(calYear,calMonth).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const prevMonth=()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);};
  const nextMonth=()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);};
  return(
    <div style={{marginTop:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",color:"var(--rust)",cursor:"pointer",fontSize:20}}>‹</button>
        <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,letterSpacing:3,color:"var(--ink)",textTransform:"uppercase"}}>{monthName}</span>
        <button onClick={nextMonth} style={{background:"none",border:"none",color:"var(--rust)",cursor:"pointer",fontSize:20}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,textAlign:"center"}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:9,color:"var(--muted)",paddingBottom:4,letterSpacing:2}}>{d}</div>)}
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const dateStr=new Date(calYear,calMonth,d).toDateString();
          const hasWorkout=workoutDateMap.has(dateStr),isToday=new Date().toDateString()===dateStr,isSelected=selectedDate===dateStr;
          return(<div key={i} onClick={()=>hasWorkout&&onSelectDate(isSelected?null:dateStr)} style={{borderRadius:0,padding:"6px 2px",cursor:hasWorkout?"pointer":"default",background:isSelected?"rgba(196,82,42,0.18)":hasWorkout?"rgba(184,125,46,0.12)":isToday?"rgba(184,125,46,0.06)":"transparent",border:isSelected?"1px solid var(--rust)":isToday?"1px solid rgba(184,125,46,0.4)":"1px solid transparent",fontFamily:"'Josefin Sans',sans-serif",fontSize:12,color:isSelected?"var(--rust)":hasWorkout?"var(--gold)":isToday?"var(--ink)":"var(--muted)",fontWeight:hasWorkout?"700":"400",position:"relative"}}>
            {d}{hasWorkout&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:0,background:"var(--gold)"}}/>}
          </div>);
        })}
      </div>
    </div>
  );
}

  const deleteWorkoutRecord=async(w)=>{if(authUser&&w._id)await fbDeleteWorkout(authUser.uid,w._id);setWorkouts(prev=>prev.filter(x=>x._id!==w._id&&x.date!==w.date));};

  const updateCustomExRecord=async(ex)=>{if(authUser&&ex._fid)await fbUpdateCustomEx(authUser.uid,ex._fid,ex);setCustomExs(prev=>prev.map(x=>x._fid===ex._fid?ex:x));};
  const doAddCustomEx=async(ex)=>{if(authUser){const fid=await fbAddCustomEx(authUser.uid,ex);ex={...ex,_fid:fid};}setCustomExs(prev=>[...prev,ex]);return ex;};
  const doAddLiftGoal=async(g)=>{if(authUser){const id=await fbAddLiftGoal(authUser.uid,g);g={...g,_id:id};}setLiftGoals(prev=>[...prev,g]);};
  const doDelLiftGoal=async(id)=>{if(authUser)await fbDelLiftGoal(authUser.uid,id);setLiftGoals(prev=>prev.filter(g=>g._id!==id));};
  const doSave1RM=async(exId,weight)=>{

  };

    for(let i=workouts.length-1;i>=0;i--){const ex=workouts[i].exercises?.find(e=>e.id===exId);if(ex)return{workout:workouts[i],exercise:ex};}
    return null;
  };

  const daysSinceExercise=(exId)=>{const last=getLastForExercise(exId);if(!last)return null;return(Date.now()-new Date(last.workout.date))/86400000;};

  const computeWeightForEx=(exId,def,intensityModeKey)=>{
    const mode=INTENSITY_MODES[intensityModeKey]||INTENSITY_MODES["building"];
    const goal=profile?.goal||"hypertrophy";
    if(mode&&mode.pct!==null&&mode.pct!==undefined){
      const orm=getEffective1RM(oneRepMaxes,workouts,exId);
      if(orm){const scaled=roundToNearest2_5(orm.value*mode.pct);return roundWeightForEquipment(Math.max(scaled,5),def.equipmentType);}
    }
    const last=getLastForExercise(exId);
    if(last){
      const days=(Date.now()-new Date(last.workout.date))/86400000,weeks=Math.max(1,Math.round(days/7));
      if(def.equipmentType==="assisted"){const progressed=safeProgressWeight(last.exercise.weight,goal,weeks,def.unit);const delta=progressed-last.exercise.weight;return Math.max(0,last.exercise.weight-Math.abs(delta));}
      return roundWeightForEquipment(safeProgressWeight(last.exercise.weight,goal,weeks,def.unit),def.equipmentType);
    }
    return roundWeightForEquipment(def.defaultWeight,def.equipmentType);
  };

  const buildExerciseList=(exIdList,sets,reps,intensityModeKey="building")=>{
    return exIdList.map(exId=>{
      const def=allExercises.find(e=>e.id===exId);if(!def)return null;
      const weight=computeWeightForEx(exId,def,intensityModeKey),bigInc=getBigIncrement(def);

    }).filter(Boolean);
  };

  const buildSetReps=(sets,reps,scheme)=>{
    if(scheme==="dropset") return Array.from({length:sets},(_,i)=>Math.max(1,reps-i*2));
    if(scheme==="pyramid"){const half=Math.floor(sets/2);return Array.from({length:sets},(_,i)=>i<=half?reps+i*2:reps+(sets-1-i)*2);}

    setCurrentExIdx(0);setCompletedSets({});setPerSetData({});setNoteFor({});setSummaryData(null);setMidWorkoutAddedExIds([]);setDeferredExIds([]);setCancelConfirm(false);setScreen("workout");
  };

  // FIX 6: addExToActiveWorkout — use functional updater to get live exercise list
  // for navigation, preventing stale closure index after multiple adds.
  const addExToActiveWorkout=(exId)=>{
    const def=allExercises.find(e=>e.id===exId);
    if(!def) return;
    // Guard using current render-time activeWorkout for immediate duplicate check
    if(activeWorkout&&activeWorkout.exercises.some(e=>e.id===exId)) return;
    const iMode=activeWorkout.intensityMode||"building";
    const weight=computeWeightForEx(exId,def,iMode);
    const bigInc=getBigIncrement(def);
    const refEx=activeWorkout.exercises[0];
    const sets=refEx?.sets||3,reps=refEx?.reps||10;

  const finishWorkoutWithState=async(completedSetsState)=>{

    const cs=completedSetsState||completedSets;
    const exercisesWithSetData=activeWorkout.exercises.map(ex=>{
      const setRepsArr=activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
      const setData=Array.from({length:ex.sets},(_,i)=>{const key=`${ex.id}_${i}`;return{weight:perSetData[key]?.weight??ex.weight,reps:perSetData[key]?.reps??setRepsArr[i]};});
      return{...ex,setData,note:noteFor[ex.id]||""};
    });
    const w={...activeWorkout,exercises:exercisesWithSetData,completed:true};
    await addWorkoutRecord(w);
    const capturedMidWorkoutAdds=[...midWorkoutAddedExIds];

        const completed=doneSets.filter(Boolean).length;

        let improved=false;

          improved=ex.equipmentType==="assisted"
            ?ex.weight<last.exercise.weight
            :ex.weight>last.exercise.weight;
        }
        const matchedGoals=liftGoals.filter(g=>g.exId===ex.id&&ex.weight>=g.targetWeight);

    setActiveWorkout(null);setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setExRepSchemes({});setPreviewOrder(null);

  const adjustWeightGlobal=(exId,delta)=>{

        if(!snappedCompleted[key]){
          const current=p[key]?.weight??snappedEx.weight;

      {newEx.equipmentType==="barbell"&&<div><span style={s.label}>Barbell Weight (lbs)</span><input style={s.input} type="number" placeholder="45" value={newEx.barbellWeight||45} onChange={e=>setNewEx(p=>({...p,barbellWeight:Number(e.target.value)||45}))}/></div>}

        <div><span style={s.label}>Unit</span><select style={s.select} value={newEx.unit} onChange={e=>setNewEx(p=>({...p,unit:e.target.value}))}><option value="lbs">lbs</option><option value="kg">kg</option><option value="reps">Bodyweight</option></select></div>
        <div><span style={s.label}>Starting Weight</span><input style={s.input} type="number" value={newEx.defaultWeight} onChange={e=>setNewEx(p=>({...p,defaultWeight:e.target.value}))} disabled={newEx.unit==="reps"}/></div>
      </div>
      <div><span style={s.label}>Increment Per Session</span><input style={s.input} type="number" value={newEx.increment} onChange={e=>setNewEx(p=>({...p,increment:e.target.value}))}/></div>
    </div>
  );

  const IntensityModePicker=({value,onChange,sets,onSetsChange,reps,onRepsChange})=>(
    <div style={{...s.card,marginBottom:14}}>
      <span style={s.label}>Intensity Mode</span>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        {Object.entries(INTENSITY_MODES).map(([key,mode])=>{
          const active=value===key;
          return(<button key={key} onClick={()=>{onChange(key);if(key!=="custom"&&mode.sets){onSetsChange(mode.sets);onRepsChange(mode.reps);}}} style={{padding:"10px 6px",borderRadius:0,cursor:"pointer",textAlign:"center",background:active?mode.colorDim:"var(--surface2)",border:active?`1px solid ${mode.colorBorder}`:"1px solid var(--border)",transition:"all 0.15s"}}>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,fontWeight:active?600:400,color:active?mode.color:"var(--muted)",letterSpacing:0.5}}>{mode.label}</div>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:8,color:active?mode.color:"var(--muted)",marginTop:3,letterSpacing:0.5,opacity:0.8}}>{mode.description}</div>
          </button>);
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-around",paddingTop:8,borderTop:"1px solid var(--border)"}}>
        <Stepper value={sets} onChange={onSetsChange} min={1} label="Sets"/>
        <div style={{width:1,background:"var(--border)"}}/>
        <Stepper value={reps} onChange={onRepsChange} min={1} label="Reps"/>
      </div>
    </div>
  );

  const renderModal=()=>{
    if(modal==="browseAdd"||modal==="browseAddWorkout"){
      const activeIds=activeTmpl?[...activeTmpl.exercises,...extraExIds].filter(id=>!removedExIds.includes(id)):customExIds;
      const available=allExercises.filter(ex=>!activeIds.includes(ex.id));
      const suggested=BUILTIN_EXERCISES.filter(ex=>{if(activeIds.includes(ex.id))return false;const days=daysSinceExercise(ex.id);return days!==null&&days>=7;}).slice(0,6);
      return(
        <Modal onClose={()=>setModal(null)}>
          <span style={{...s.label,fontSize:12,marginBottom:16}}>Add Exercise</span>
          {suggested.length>0&&<div style={{marginBottom:18}}><span style={{...s.label,fontSize:9,color:"var(--gold)",marginBottom:8}}>💡 Not done in 7+ days</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{suggested.map(ex=><button key={ex.id} onClick={()=>{if(activeTmpl)setExtraExIds(p=>[...p,ex.id]);else setCustomExIds(p=>[...p,ex.id]);setModal(null);showToast(ex.name+" added!");}} style={{background:"rgba(184,125,46,0.12)",border:"1px solid rgba(184,125,46,0.4)",borderRadius:0,padding:"7px 11px",color:"var(--gold2)",fontSize:13,cursor:"pointer"}}>{ex.name}</button>)}</div></div>}
          <div style={{maxHeight:"50vh",overflowY:"auto",marginBottom:12}}>
            {CATEGORIES.map(cat=>{const ces=available.filter(e=>e.category===cat);if(!ces.length)return null;return(<div key={cat} style={{marginBottom:14}}><span style={{...s.label,fontSize:9}}>{cat}</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ces.map(ex=><button key={ex.id} onClick={()=>{if(activeTmpl)setExtraExIds(p=>[...p,ex.id]);else setCustomExIds(p=>[...p,ex.id]);setModal(null);showToast(ex.name+" added!");}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,padding:"7px 11px",color:"var(--muted)",fontSize:13,cursor:"pointer"}}>{ex.name}{ex.custom?" ★":""}</button>)}</div></div>);})}
          </div>
          <button style={{...s.btnOutline,width:"100%",fontSize:11}} onClick={()=>setModal("createAndAdd")}>+ Create New Exercise</button>
        </Modal>
      );
    }

    if(modal==="createAndAdd") return <ModalStrict onClose={()=>setModal(null)}><span style={{...s.label,fontSize:12,marginBottom:16}}>Create & Add Exercise</span><ExerciseFormFields/><button style={{...s.btn,marginTop:12}} onClick={()=>saveNewExercise(true)}>Create & Add</button></ModalStrict>;
    if(modal==="addExercise") return <ModalStrict onClose={()=>setModal(null)}><span style={{...s.label,fontSize:12,marginBottom:16}}>Add Custom Exercise</span><ExerciseFormFields/><button style={{...s.btn,marginTop:12}} onClick={()=>saveNewExercise(false)}>Add Exercise</button></ModalStrict>;

    if(modal==="addLiftGoal") return(
      <Modal onClose={()=>setModal(null)}>
        <span style={{...s.label,fontSize:12,marginBottom:4}}>Set a Lift Goal</span>
        <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Choose an exercise and a target weight. IRONFORM will chart your progress and project when you'll get there.</p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><span style={s.label}>Exercise</span><select style={s.select} value={newLiftGoal.exId} onChange={e=>setNewLiftGoal(p=>({...p,exId:e.target.value}))}><option value="">Select exercise...</option>{CATEGORIES.map(cat=>{const ces=allExercises.filter(e=>e.category===cat);if(!ces.length)return null;return(<optgroup key={cat} label={cat}>{ces.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}</optgroup>);})}</select></div>
          <div><span style={s.label}>Target Weight (lbs)</span><input style={s.input} type="number" placeholder="e.g. 135" value={newLiftGoal.targetWeight} onChange={e=>setNewLiftGoal(p=>({...p,targetWeight:e.target.value}))}/></div>
        </div>
        <button style={{...s.btn,marginTop:16}} onClick={saveNewLiftGoal}>Set Goal</button>
      </Modal>
    );

    if(modal==="logPastWorkout") return(
      <ModalStrict onClose={()=>setModal(null)}>
        <span style={{...s.label,fontSize:12,marginBottom:4}}>Log Past Workout</span>
        <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Enter a previous session to calibrate your weight projections.</p>
        <div style={{marginBottom:16}}><span style={s.label}>Date</span><input style={{...s.input,maxWidth:"100%",boxSizing:"border-box"}} type="date" value={pastDate} onChange={e=>setPastDate(e.target.value)}/></div>
        <div style={{maxHeight:"50vh",overflowY:"auto"}}>
          {pastRows.map((row,rowIdx)=>(
            <div key={rowIdx} style={{...s.card,padding:14,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{...s.label,marginBottom:0}}>Exercise {rowIdx+1}</span>
                {pastRows.length>1&&<button style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:18}} onClick={()=>setPastRows(p=>p.filter((_,i)=>i!==rowIdx))}>×</button>}
              </div>
              <select style={{...s.select,marginBottom:10}} value={row.exId} onChange={e=>setPastRows(p=>p.map((r,i)=>i===rowIdx?{...r,exId:e.target.value}:r))}><option value="">Select exercise...</option>{CATEGORIES.map(cat=>{const ces=allExercises.filter(e=>e.category===cat);if(!ces.length)return null;return(<optgroup key={cat} label={cat}>{ces.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}</optgroup>);})}</select>
              <span style={{...s.label,fontSize:9,marginBottom:6}}>Sets</span>
              {row.sets.map((setItem,setIdx)=>(
                <div key={setIdx} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr auto",gap:6,alignItems:"center",marginBottom:6}}>
                  <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"var(--muted)",minWidth:20}}>S{setIdx+1}</span>
                  <div><span style={{...s.label,fontSize:8,marginBottom:2}}>Weight</span><input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" placeholder="135" value={setItem.weight} onChange={e=>updatePastRowSet(rowIdx,setIdx,"weight",e.target.value)}/></div>
                  <div><span style={{...s.label,fontSize:8,marginBottom:2}}>Reps</span><input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" placeholder="10" value={setItem.reps} onChange={e=>updatePastRowSet(rowIdx,setIdx,"reps",e.target.value)}/></div>
                  {row.sets.length>1&&<button onClick={()=>removePastSetFromRow(rowIdx,setIdx)} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:16,paddingTop:16,alignSelf:"flex-end",paddingBottom:4}}>×</button>}
                </div>
              ))}
              <button style={{...s.btnSm,marginTop:4,fontSize:9}} onClick={()=>addSetToPastRow(rowIdx)}>+ Add Set</button>
            </div>
          ))}
          <div ref={pastRowsEndRef}/>
        </div>
        <button style={{...s.btnOutline,width:"100%",marginBottom:10,marginTop:8,fontSize:11}} onClick={addPastRow}>+ Add Another Exercise</button>
        <button style={s.btn} onClick={savePastWorkout}>Save Past Workout</button>
      </ModalStrict>
    );

    if(modal==="editWorkout"&&editingWorkout){
      const ew=editingWorkout;
      return(
        <ModalStrict onClose={()=>{setModal(null);setEditingWorkout(null);}}>
          <span style={{...s.label,fontSize:12,marginBottom:4}}>Edit Workout</span>
          <p style={{color:"var(--muted)",fontSize:12,marginBottom:14,fontFamily:"'Josefin Sans',sans-serif",letterSpacing:0.5}}>
            {new Date(ew.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
          </p>
          <div style={{maxHeight:"55vh",overflowY:"auto"}}>
            {ew.exercises.map((ex,ei)=>(
              <div key={ei} style={{...s.card,padding:12,marginBottom:8}}>
                <div style={{marginBottom:6}}>
                  <span style={{...s.label,fontSize:9,display:"block",marginBottom:2}}>Exercise Name</span>
                  <input style={{...s.input,padding:"7px 10px",fontSize:13}} value={ex.name} onChange={e=>{const v=e.target.value;setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi===ei?{...x,name:v}:x)}));}}/>
                </div>
                {(ex.setData&&ex.setData.length>0)?(
                  <div>
                    <span style={{...s.label,fontSize:9,marginBottom:6}}>Sets</span>
                    {ex.setData.map((sd,si)=>(
                      <div key={si} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:8,marginBottom:6,alignItems:"center"}}>
                        <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"var(--muted)",minWidth:20}}>S{si+1}</span>
                        <div><span style={{...s.label,fontSize:8,marginBottom:2}}>Weight</span><input style={{...s.input,padding:"7px 10px",fontSize:13}} type="number" value={sd.weight||""} onChange={e=>{const val=Number(e.target.value)||0;setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,weight:val})})}));}}/></div>
                        <div><span style={{...s.label,fontSize:8,marginBottom:2}}>Reps</span><input style={{...s.input,padding:"7px 10px",fontSize:13}} type="number" value={sd.reps||""} onChange={e=>{const val=Number(e.target.value)||0;setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,reps:val})})}));}}/></div>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {[["Weight","weight"],["Reps","reps"],["Sets","sets"]].map(([lbl,key])=>(
                      <div key={key}><span style={{...s.label,fontSize:9}}>{lbl}</span><input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" value={ex[key]||""} onChange={e=>{const val=e.target.value;setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi===ei?{...x,[key]:val}:x)}));}}/></div>
                    ))}
                  </div>
                )}
              </div>
            ))}

            {/* FIX 5: Add exercise to history workout */}
            <div style={{...s.card,padding:12,marginBottom:8,background:"rgba(30,48,80,0.05)",border:"1px solid rgba(30,48,80,0.25)"}}>
              <span style={{...s.label,fontSize:9,color:"var(--navy)",marginBottom:10}}>+ Add Exercise to This Workout</span>
              <div style={{maxHeight:200,overflowY:"auto"}}>
                {CATEGORIES.map(cat=>{
                  const existingIds=ew.exercises.map(e=>e.id||"");
                  const ces=allExercises.filter(e=>e.category===cat&&!existingIds.includes(e.id));
                  if(!ces.length) return null;
                  return(
                    <div key={cat} style={{marginBottom:10}}>
                      <span style={{...s.label,fontSize:8,marginBottom:4}}>{cat}</span>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {ces.map(ex=>(
                          <button key={ex.id} onClick={()=>{
                            const dw=ex.defaultWeight||0;
                            const newEntry={id:ex.id,name:ex.name,category:ex.category,weight:dw,unit:ex.unit||"lbs",sets:3,reps:10,setData:[{weight:dw,reps:10},{weight:dw,reps:10},{weight:dw,reps:10}]};
                            setEditingWorkout(prev=>({...prev,exercises:[...prev.exercises,newEntry]}));
                            showToast(ex.name+" added");
                          }} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,padding:"5px 9px",color:"var(--muted)",fontSize:12,cursor:"pointer"}}>
                            {ex.name}{ex.custom?" ★":""}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <button style={{...s.btn,marginTop:12}} onClick={async()=>{
            const updated={...ew,exercises:ew.exercises.map(ex=>({...ex,weight:ex.setData?Number(ex.setData[0]?.weight)||0:Number(ex.weight)||0,reps:ex.setData?Number(ex.setData[0]?.reps)||0:Number(ex.reps)||0,sets:ex.setData?ex.setData.length:Number(ex.sets)||1}))};
            await updateWorkoutRecord(updated);setModal(null);setEditingWorkout(null);showToast("Workout updated!");
          }}>Save Changes</button>
        </ModalStrict>
      );
    }

    if(modal==="versionHistory") return(
      <Modal onClose={()=>setModal(null)}>
        <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:20,color:"var(--gold)",marginBottom:4}}>Release History</div>
        {RELEASE_HISTORY.map(r=>(
          <div key={r.version} style={{...s.card,marginBottom:10,marginTop:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:13,color:"var(--gold)",fontWeight:600}}>v{r.version}</span>
              <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"var(--muted)"}}>{r.date}</span>
            </div>
            {r.features.map((f,i)=><div key={i} style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,color:"var(--muted)",padding:"4px 0",borderBottom:"1px solid var(--border)",lineHeight:1.5}}>· {f}</div>)}
          </div>
        ))}
      </Modal>
    );

    if(modal==="addToTemplate"&&summaryData){
      const tmplId=summaryData.templateId,tmpl=WORKOUT_TEMPLATES.find(t=>t.id===tmplId);
      const addedExs=summaryData.midWorkoutAddedExIds.map(id=>allExercises.find(e=>e.id===id)).filter(Boolean);
      if(!addedExs.length||!tmpl) return null;
      return(
        <ModalStrict onClose={()=>setModal(null)}>
          <div style={{fontSize:30,textAlign:"center",marginBottom:8}}>🗂️</div>
          <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:20,color:"var(--gold)",textAlign:"center",marginBottom:6}}>Keep These?</div>
          <p style={{color:"var(--muted)",fontSize:13,marginBottom:18,lineHeight:1.5,textAlign:"center"}}>You added {addedExs.length} exercise{addedExs.length>1?"s":""} during this workout. Add {addedExs.length>1?"them":"it"} to your default <strong style={{color:"var(--ink)"}}>{tmpl.label}</strong> template?</p>
          {addedExs.map(ex=><div key={ex.id} style={{...s.card,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{ex.name}</div><div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"var(--muted)",marginTop:2}}>{ex.category} · {ex.equipmentType||"machine"}</div></div><span style={{...s.tag,fontSize:8}}>New</span></div>)}
          <button style={{...s.btn,marginTop:12}} onClick={()=>{
            const extras=profile?.templateExtras||{},existing=extras[tmplId]||[];
            const newIds=[...new Set([...existing,...summaryData.midWorkoutAddedExIds])];
            saveProfile({...profile,templateExtras:{...extras,[tmplId]:newIds}});
            setModal(null);showToast("Added to "+tmpl.label+"!");
          }}>Yes, Add to {tmpl.label}</button>
          <button style={{...s.btnOutline,width:"100%",marginTop:8,textAlign:"center"}} onClick={()=>setModal(null)}>No, Just This Once</button>
        </ModalStrict>
      );
    }

    return null;
  };

  if(authUser===undefined||dataLoading) return(
    <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--navy)"}}>
      <div style={{textAlign:"center",position:"relative",zIndex:2}}>
        <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:28,color:"#f5f0e8",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}><span>IRON</span><span style={{color:"var(--gold2)"}}>FORM</span></div>
        <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"rgba(245,240,232,0.4)",letterSpacing:4,textTransform:"uppercase"}}>LOADING...</div>
      </div>
    </div>
  );

  if(!authUser) return(
    <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--navy)"}}>
      <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:400,padding:"0 28px",textAlign:"center"}}>
        <div style={{display:"inline-block",border:"2px solid var(--gold)",borderRadius:0,width:100,height:100,lineHeight:"96px",fontSize:36,marginBottom:24,color:"var(--gold)",background:"rgba(245,240,232,0.05)"}}>🏋️</div>
        <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:38,color:"#f5f0e8",letterSpacing:3,textTransform:"uppercase",marginBottom:4}}><span>IRON</span><span style={{color:"var(--gold2)"}}>FORM</span></div>
        <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,letterSpacing:4,color:"rgba(245,240,232,0.45)",marginBottom:32,textTransform:"uppercase"}}>Personal Strength Journal</div>
        <div style={{width:60,height:1,background:"var(--rust)",margin:"0 auto 32px"}}/>
        <button onClick={handleSignIn} disabled={signingIn} style={{background:"#f5f0e8",color:"var(--navy)",border:"none",borderBottom:"3px solid rgba(30,48,80,0.3)",borderRadius:0,padding:"15px 20px",fontFamily:"'Josefin Sans',sans-serif",fontWeight:700,fontSize:11,letterSpacing:3,cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:signingIn?0.7:1,textTransform:"uppercase"}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          {signingIn?"Signing in...":"Sign in with Google"}
        </button>
        {signInErr&&<div style={{marginTop:14,color:"var(--rust2)",fontSize:13,fontFamily:"'Josefin Sans',sans-serif"}}>{signInErr}</div>}
      </div>
    </div>
  );

  if(screen==="preset_preview"&&activeTmpl){
    const tmpl=activeTmpl,profileExtras=profile?.templateExtras?.[tmpl.id]||[];
    const baseIds=[...new Set([...tmpl.exercises,...profileExtras,...extraExIds])].filter(id=>!removedExIds.includes(id));
    const orderedIds=previewOrder||baseIds,allIds=orderedIds.filter(id=>baseIds.includes(id));
    const moveEx=(idx,dir)=>{const arr=[...allIds],ni=idx+dir;if(ni<0||ni>=arr.length)return;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];setPreviewOrder(arr);};
    return(
      <div style={s.app}>{renderModal()}{Toast}
        <div style={{...s.content,...s.contentPt,...s.contentBody}}>
          <div style={s.header}><div style={s.logo}><span style={{color:"#f5f0e8"}}>IRON</span><span style={{color:"var(--gold2)"}}>FORM</span></div><span style={{...s.tag,background:tmpl.accentDim,border:`1px solid ${tmpl.accentBorder}`,color:tmpl.accent}}>{tmpl.emoji} {tmpl.label}</span></div>
          <BackBtn onClick={()=>{setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setExRepSchemes({});setPreviewOrder(null);setScreen("home");}}/>
          <h2 style={{fontFamily:"'Alfa Slab One',serif",fontSize:26,color:"var(--ink)",marginBottom:16}}>{tmpl.label}</h2>
          <IntensityModePicker value={intensityMode} onChange={setIntensityMode} sets={previewSets} onSetsChange={setPreviewSets} reps={previewReps} onRepsChange={setPreviewReps}/>
          <span style={s.label}>Exercises ({allIds.length})</span>
          {allIds.map((exId,idx)=>{
            const def=allExercises.find(e=>e.id===exId);if(!def)return null;
            const weight=computeWeightForEx(exId,def,intensityMode),isExtra=extraExIds.includes(exId)||(profile?.templateExtras?.[tmpl.id]||[]).includes(exId),exScheme=exRepSchemes[exId]||"standard";
            return(
              <div key={exId} style={{...s.card,marginBottom:8,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:15,color:"var(--ink)",display:"flex",alignItems:"center",gap:8}}>{def.name}{isExtra&&<span style={{...s.tag,fontSize:8,padding:"2px 6px",color:"var(--navy)",background:"rgba(30,48,80,0.08)",border:"1px solid rgba(30,48,80,0.3)"}}>Added</span>}</div>
                    <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,color:"var(--muted)",marginTop:3}}>{def.unit==="reps"?"Bodyweight":`${weight} ${def.unit}`}{intensityMode!=="custom"&&INTENSITY_MODES[intensityMode].pct&&getEffective1RM(oneRepMaxes,workouts,exId)&&<span style={{color:"var(--gold2)",marginLeft:4}}>· {Math.round(INTENSITY_MODES[intensityMode].pct*100)}% 1RM</span>}</div>
                  </div>
                  <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0,marginLeft:8}}>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <button onClick={()=>moveEx(idx,-1)} disabled={idx===0} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,width:22,height:18,fontSize:9,cursor:idx===0?"default":"pointer",color:idx===0?"var(--border)":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▲</button>
                      <button onClick={()=>moveEx(idx,1)} disabled={idx===allIds.length-1} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,width:22,height:18,fontSize:9,cursor:idx===allIds.length-1?"default":"pointer",color:idx===allIds.length-1?"var(--border)":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▼</button>
                    </div>
                    <button onClick={()=>{if(extraExIds.includes(exId))setExtraExIds(p=>p.filter(id=>id!==exId));else setRemovedExIds(p=>[...p,exId]);if(previewOrder)setPreviewOrder(p=>p.filter(id=>id!==exId));}} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:20,flexShrink:0}}>×</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:4,marginTop:8}}>
                  {[["standard","Standard"],["dropset","Drop Set"],["pyramid","Pyramid"]].map(([key,lbl])=>{const active=exScheme===key;return(<button key={key} onClick={()=>setExRepSchemes(p=>({...p,[exId]:key}))} style={{flex:1,padding:"6px 4px",borderRadius:0,fontSize:10,fontFamily:"'Josefin Sans',sans-serif",letterSpacing:0.5,cursor:"pointer",textTransform:"uppercase",background:active?"rgba(184,125,46,0.18)":"var(--surface2)",border:active?"1px solid rgba(184,125,46,0.5)":"1px solid var(--border)",color:active?"var(--gold)":"var(--muted)"}}>{lbl}</button>);})}
                </div>
                {exScheme!=="standard"&&<div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:9,color:"var(--muted)",marginTop:5,letterSpacing:0.5}}>{buildSetReps(previewSets,previewReps,exScheme).join(" → ")} reps</div>}
              </div>
            );
          })}
          <button style={{...s.btnOutline,width:"100%",marginBottom:10,marginTop:6}} onClick={()=>setModal("browseAdd")}>+ Add Exercise Today</button>
          <button style={s.btn} onClick={()=>launchWorkout(tmpl,extraExIds,removedExIds,previewSets,previewReps,exRepSchemes,allIds,intensityMode)}>Begin {tmpl.label}</button>
        </div>
      </div>
    );
  }

  if(screen==="custom_builder") return(
    <div style={s.app}>{renderModal()}{Toast}
      <div style={{...s.content,...s.contentPt,...s.contentBody}}>
        <div style={s.header}><div style={s.logo}><span style={{color:"#f5f0e8"}}>IRON</span><span style={{color:"var(--gold2)"}}>FORM</span></div><span style={s.tag}>Custom</span></div>
        <BackBtn onClick={()=>{setCustomExIds([]);setCustomGoal("hypertrophy");setScreen("home");}}/>
        <h2 style={{fontFamily:"'Alfa Slab One',serif",fontSize:26,color:"var(--ink)",marginBottom:6}}>Build Your Workout</h2>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:18,lineHeight:1.5}}>Pick your exercises, then go.</p>
        <IntensityModePicker value={intensityMode} onChange={setIntensityMode} sets={previewSets} onSetsChange={setPreviewSets} reps={previewReps} onRepsChange={setPreviewReps}/>
        {customExIds.length>0&&(
          <div style={{...s.card,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={s.label}>{customExIds.length} Selected</span>
              <button style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontFamily:"'Josefin Sans',sans-serif",fontSize:9,letterSpacing:2,textTransform:"uppercase"}} onClick={()=>setCustomExIds([])}>Clear All</button>
            </div>
            {customExIds.map(exId=>{const def=allExercises.find(e=>e.id===exId);if(!def)return null;return(<div key={exId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}><span style={{fontSize:14,color:"var(--ink)"}}>{def.name}</span><button onClick={()=>setCustomExIds(p=>p.filter(id=>id!==exId))} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:18}}>×</button></div>);})}
          </div>
        )}
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={s.label}>Browse Exercises</span><button style={s.btnSm} onClick={()=>{setActiveTmpl(null);setModal("browseAdd");}}>+ Add</button></div>
          {CATEGORIES.map(cat=>{const ces=allExercises.filter(e=>e.category===cat&&!customExIds.includes(e.id));if(!ces.length)return null;return(<div key={cat} style={{marginBottom:13}}><span style={{...s.label,fontSize:9}}>{cat}</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ces.map(ex=><button key={ex.id} onClick={()=>setCustomExIds(p=>[...p,ex.id])} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,padding:"7px 11px",color:"var(--muted)",fontSize:13,cursor:"pointer"}}>{ex.name}{ex.custom?" ★":""}</button>)}</div></div>);})}
        </div>
        <button style={{...s.btn,opacity:customExIds.length<1?0.4:1}} onClick={()=>customExIds.length>=1&&launchCustomWorkout()}>Begin Workout ({customExIds.length} exercise{customExIds.length!==1?"s":""})</button>
      </div>
    </div>
  );

  if(screen==="workout"&&activeWorkout){
    const exercises=activeWorkout.exercises,ex=exercises[currentExIdx],done=setsForEx(ex),allDone=done.every(Boolean);
    const remainingDeferred=deferredExIds.filter(id=>id!==ex.id);
    const hasMoreAhead=exercises.slice(currentExIdx+1).some(e=>!deferredExIds.includes(e.id));
    const isLast=!hasMoreAhead&&remainingDeferred.length===0;
    const progress=totalSets>0?totalDone/totalSets:0;
    const setRepsArr=activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
    const bigInc=ex.bigIncrement||getBigIncrement(ex),isBarbell=ex.equipmentType==="barbell",barbellW=ex.barbellWeight||45;
    const hasGoal=liftGoals.some(g=>g.exId===ex.id),orm=hasGoal?getEffective1RM(oneRepMaxes,workouts,ex.id):null;
    const historyForEx=(()=>{
      let lastSession=null,personalBest=null,pbWeight=0;
      workouts.forEach(w=>{const e=w.exercises?.find(x=>x.id===ex.id);if(!e)return;const w1=e.setData&&e.setData.length>0?Math.max(...e.setData.map(s=>s.weight||0)):e.weight||0;if(w1>pbWeight){pbWeight=w1;personalBest={date:w.date,weight:w1,reps:e.reps||0,setData:e.setData};}lastSession={date:w.date,weight:e.weight,reps:e.reps,setData:e.setData};});
      return{lastSession,personalBest};
    })();

    const CancelConfirmOverlay=cancelConfirm?(
      <div style={{position:"fixed",inset:0,background:"rgba(30,48,80,0.82)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
        <div style={{background:"var(--bg)",border:"1px solid var(--rule)",borderTop:"4px solid var(--rust)",borderRadius:0,width:"100%",maxWidth:360,padding:"32px 24px",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>🛑</div>
          <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:22,color:"var(--ink)",marginBottom:8}}>Quit Workout?</div>
          <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,color:"var(--muted)",letterSpacing:1,lineHeight:1.6,marginBottom:28}}>{totalDone>0?`You've completed ${totalDone} set${totalDone!==1?"s":""} so far. Your progress will not be saved.`:"Your progress will not be saved."}</div>
          <button onClick={confirmCancelWorkout} style={{background:"rgba(196,82,42,0.08)",color:"var(--rust2)",border:"1px solid rgba(196,82,42,0.5)",borderRadius:0,padding:"14px",fontFamily:"'Josefin Sans',sans-serif",fontSize:11,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Yes, Quit</button>
          <button onClick={()=>setCancelConfirm(false)} style={{background:"var(--rust)",color:"#f5f0e8",border:"none",borderBottom:"3px solid var(--brown)",borderRadius:0,padding:"14px",fontFamily:"'Josefin Sans',sans-serif",fontSize:11,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:700}}>Keep Going 💪</button>
        </div>
      </div>
    ):null;

    return(
      <div style={s.app}>
        {Toast}{RestModal}{CancelConfirmOverlay}

        {/* FIX 4: Stable named component — no keyboard dismissal on search input */}
        {workoutAddModal&&<MidWorkoutAddModal allExercises={allExercises} activeWorkout={activeWorkout} onAdd={addExToActiveWorkout} onClose={()=>setWorkoutAddModal(false)}/>}

        <div style={{...s.content,...s.contentPt,...s.contentBody}}>
          <div style={s.header}>
            <div style={s.logo}><span style={{color:"#f5f0e8"}}>IRON</span><span style={{color:"var(--gold2)"}}>FORM</span></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={()=>setWorkoutAddModal(true)} style={{background:"rgba(184,125,46,0.12)",border:"1px solid rgba(184,125,46,0.35)",borderRadius:0,padding:"7px 10px",color:"var(--gold2)",cursor:"pointer",fontFamily:"'Josefin Sans',sans-serif",fontSize:11,letterSpacing:1}}>+ Ex</button>
              <button style={s.btnDanger} onClick={requestCancelWorkout}>Cancel</button>
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{...s.label,marginBottom:0}}>{activeWorkout.templateLabel} · {currentExIdx+1} of {exercises.length}</span>
              <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:11,color:"var(--gold)"}}>{totalDone}/{totalSets} sets</span>
            </div>
            <div style={{height:3,background:"var(--surface2)",borderRadius:0,overflow:"hidden"}}><div style={{height:"100%",width:`${progress*100}%`,background:"var(--gold)",borderRadius:0,transition:"width 0.4s ease"}}/></div>
            <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
              {exercises.map((e,i)=>{const exDone=setsForEx(e).every(Boolean),isCurrent=i===currentExIdx,isDeferred=deferredExIds.includes(e.id);return(<button key={i} onClick={()=>setCurrentExIdx(i)} style={{width:isCurrent?24:8,height:8,borderRadius:0,border:"none",cursor:"pointer",background:isCurrent?"var(--rust)":exDone?"var(--gold)":isDeferred?"rgba(196,82,42,0.5)":"var(--surface2)",transition:"all 0.2s",padding:0,flexShrink:0}}/>);})}
              {deferredExIds.length>0&&<span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:8,color:"var(--brick2)",letterSpacing:1,textTransform:"uppercase",alignSelf:"center",marginLeft:2}}>{deferredExIds.length} to revisit</span>}
            </div>
          </div>

          <div style={{...s.card,padding:16,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Alfa Slab One',serif",fontWeight:700,fontSize:22,lineHeight:1.2,color:"var(--ink)"}}>{ex.name}</div>
                <div style={{fontFamily:"'Josefin Sans',sans-serif",color:"var(--muted)",fontSize:10,marginTop:2,letterSpacing:0.5,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span>{ex.sets} sets · {activeWorkout.perExSchemes?.[ex.id]||"standard"}</span>
                  <button onClick={()=>{setDraftEquip({equipmentType:ex.equipmentType||"machine",barbellWeight:ex.barbellWeight||45});setEquipModal(ex.id);}} style={{background:"rgba(184,125,46,0.1)",border:"1px solid rgba(184,125,46,0.25)",borderRadius:0,padding:"1px 6px",fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"var(--gold2)",cursor:"pointer",fontFamily:"'Josefin Sans',sans-serif"}}>{ex.equipmentType||"machine"}{isBarbell&&` · ${barbellW}lb bar`}{" ✎"}</button>
                  {orm&&<span style={{color:"var(--gold2)",fontSize:9}}>1RM: {orm.value} lbs</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,marginLeft:8}}>
                <button onClick={()=>setSwapModal(ex.id)} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,padding:"5px 8px",color:"var(--muted)",cursor:"pointer",fontSize:11,fontFamily:"'Josefin Sans',sans-serif",letterSpacing:1}}>⇄</button>
                <button onClick={()=>{setInlineGoal(ex.id);setInlineGoalVal("");}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:0,padding:"5px 8px",color:"var(--muted)",cursor:"pointer",fontSize:11,fontFamily:"'Josefin Sans',sans-serif",letterSpacing:1}}>🎯</button>
                {allDone&&<div style={{color:"var(--green2)",fontSize:22}}>✓</div>}
              </div>
            </div>

            {inlineGoal===ex.id&&(
              <div style={{background:"rgba(45,90,61,0.08)",border:"1px solid rgba(45,90,61,0.28)",borderRadius:0,padding:"10px 12px",marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:9,color:"var(--green2)",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>Goal (lbs)</span>
                <input style={{...s.input,flex:1,padding:"7px 10px",fontSize:13}} type="number" placeholder={`e.g. ${Math.round(ex.weight*1.2/5)*5}`} value={inlineGoalVal} onChange={e=>setInlineGoalVal(e.target.value)} autoFocus/>
                <button onClick={async()=>{if(!inlineGoalVal||isNaN(Number(inlineGoalVal)))return;await doAddLiftGoal({exId:ex.id,targetWeight:Number(inlineGoalVal),created:new Date().toISOString()});setInlineGoal(null);setInlineGoalVal("");showToast("Goal set!");}} style={{background:"var(--green2)",border:"none",borderRadius:0,padding:"7px 12px",color:"#f5f0e8",fontFamily:"'Josefin Sans',sans-serif",fontSize:10,letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap"}}>Set ✓</button>
                <button onClick={()=>setInlineGoal(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
              </div>
            )}

            {(historyForEx.lastSession||historyForEx.personalBest)&&(
              <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:10,color:"var(--muted)",marginBottom:10,background:"var(--surface2)",borderRadius:0,padding:"7px 10px",display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
                {historyForEx.lastSession&&<div><span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)"}}>Last  </span><span style={{color:"var(--muted)"}}>{historyForEx.lastSession.setData&&historyForEx.lastSession.setData.length>0?historyForEx.lastSession.setData.map((sd,si)=>`S${si+1}:${sd.weight}×${sd.reps}`).join(" "):`${historyForEx.lastSession.weight}×${historyForEx.lastSession.reps}`}</span><span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.lastSession.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>}
                {historyForEx.personalBest&&historyForEx.personalBest.weight>0&&<div><span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)"}}>PB  </span><span style={{color:"var(--gold2)",fontWeight:600}}>{historyForEx.personalBest.weight}{ex.unit!=="reps"?ex.unit:""}</span><span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.personalBest.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>}
              </div>
            )}

            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,justifyContent:"center"}}>
              <button style={{width:46,height:46,borderRadius:0,border:"1px solid var(--rule)",background:"var(--navy)",color:"#f5f0e8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>adjustWeightGlobal(ex.id,-bigInc)}>−{bigInc}</button>
              <div style={{textAlign:"center",minWidth:80,background:"var(--navy)",padding:"8px 12px",borderTop:"3px solid var(--rust)"}}>
                <div style={{fontFamily:"'Alfa Slab One',serif",fontSize:44,color:"var(--gold2)",lineHeight:1}}>{ex.weight}</div>
                <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:9,color:"rgba(245,240,232,0.5)",letterSpacing:2,marginTop:1}}>{ex.unit==="reps"?"BODYWEIGHT":ex.unit.toUpperCase()}</div>
                {isBarbell&&ex.weight>barbellW&&<div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:9,color:"var(--gold2)",marginTop:2}}>+{((ex.weight-barbellW)/2).toFixed(2).replace(/\.?0+$/,"")} ea side</div>}
              </div>
              <button style={{width:46,height:46,borderRadius:0,border:"1px solid var(--rule)",background:"var(--navy)",color:"#f5f0e8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>adjustWeightGlobal(ex.id,bigInc)}>+{bigInc}</button>
            </div>
            <div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:8,color:"var(--muted)",letterSpacing:2,textAlign:"center",marginBottom:10,textTransform:"uppercase"}}>Base weight · won't change completed sets</div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{...s.label,marginBottom:0,fontSize:9}}>Sets — tap to complete</span>
              <button onClick={()=>{setActiveWorkout(p=>{const updEx=p.exercises.map(e=>e.id===ex.id?{...e,sets:e.sets+1}:e);const lastReps=p.setRepsMap?.[ex.id]?.[ex.sets-1]||ex.reps||10;return{...p,exercises:updEx,setRepsMap:{...p.setRepsMap,[ex.id]:[...(p.setRepsMap[ex.id]||[]),lastReps]}};});}} style={{background:"rgba(184,125,46,0.1)",border:"1px solid rgba(184,125,46,0.3)",borderRadius:0,padding:"4px 10px",color:"var(--gold2)",fontFamily:"'Josefin Sans',sans-serif",fontSize:9,letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}}>+ Set</button>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
              {done.map((d,i)=>{
                const setKey=`${ex.id}_${i}`,setWeight=perSetData[setKey]?.weight??ex.weight,setReps=perSetData[setKey]?.reps??setRepsArr[i];
                const perSideWeight=isBarbell&&setWeight>barbellW?((setWeight-barbellW)/2):null;
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",borderRadius:0,background:d?"rgba(45,90,61,0.1)":"var(--surface2)",border:d?"1px solid rgba(45,90,61,0.35)":"1px solid var(--border)"}}>
                    <button style={{...s.setDot(d),width:34,height:34,fontSize:11}} onClick={()=>toggleSet(ex.id,i)}>{d?"✓":`S${i+1}`}</button>
                    <div style={{display:"flex",flexDirection:"column",flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:2}}>
                        <button onClick={()=>adjustSetWeight(ex.id,i,-0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:0,width:22,height:30,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>-.25</button>
                        <button onClick={()=>adjustSetWeight(ex.id,i,-bigInc)} style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:0,width:26,height:30,color:"var(--gold)",cursor:"pointer",fontSize:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                        <div style={{textAlign:"center",minWidth:38,flex:1}}><div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:13,color:"var(--gold)",fontWeight:500}}>{setWeight}</div><div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:7,color:"var(--muted)"}}>{ex.unit!=="reps"?ex.unit:"bw"}</div></div>
                        <button onClick={()=>adjustSetWeight(ex.id,i,bigInc)} style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:0,width:26,height:30,color:"var(--gold)",cursor:"pointer",fontSize:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                        <button onClick={()=>adjustSetWeight(ex.id,i,0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:0,width:22,height:30,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>.25</button>
                      </div>
                      {isBarbell&&perSideWeight!==null&&<div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:8,color:"var(--gold2)",marginTop:1,textAlign:"center"}}>+{perSideWeight.toFixed(2).replace(/\.?0+$/,"")} lbs/side</div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      <button onClick={()=>adjustSetReps(ex.id,i,-1)} style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:0,width:24,height:30,color:"var(--muted)",cursor:"pointer",fontSize:13,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <div style={{textAlign:"center",minWidth:28}}><div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:13,color:"var(--ink)",fontWeight:500}}>{setReps}</div><div style={{fontFamily:"'Josefin Sans',sans-serif",fontSize:7,color:"var(--muted)"}}>reps</div></div>
                      <button onClick={()=>adjustSetReps(ex.id,i,1)} style={{background:"var(--surface)",border:"1px solid var(--rule)",borderRadius:0,width:24,height:30,color:"var(--muted)",cursor:"pointer",fontSize:13,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>

      </div>
      <NavBar active="home"/>
    </div>
