      {id:"db_bicep_curl",    name:"Seated Dumbbell Bicep Curls",      category:"Arms",      unit:"lbs", defaultWeight:15,     increment:5,   equipmentType:"dumbbell"},

      {id:"tricep_pushdown",  name:"Tricep Push Down",                 category:"Arms",      unit:"lbs", defaultWeight:32.5,   increment:5,   equipmentType:"cable"},
      {id:"tricep_rope",      name:"Tricep Rope Push Down",            category:"Arms",      unit:"lbs", defaultWeight:27.5,   increment:5,   equipmentType:"cable"},
      {id:"one_arm_tricep",   name:"One Arm Cable Tricep",             category:"Arms",      unit:"lbs", defaultWeight:12.5,   increment:5,   equipmentType:"cable"},
      {id:"cable_ab_twist",   name:"Cable Ab Twist",                   category:"Core",      unit:"lbs", defaultWeight:12.5,   increment:5,   equipmentType:"cable"},
      {id:"hanging_leg_lift", name:"Hanging Leg Lifts",                category:"Core",      unit:"reps",defaultWeight:0,      increment:1,   equipmentType:"bodyweight"},
    ];

    const CATEGORIES = ["Chest","Back","Legs","Shoulders","Arms","Core","Cardio","Other"];

    const GOALS = {
      strength:    {label:"Strength",     increment:1.05},
      hypertrophy: {label:"Muscle Growth",increment:1.025},
      endurance:   {label:"Endurance",    increment:1.015},
      maintain:    {label:"Maintain",     increment:1.0},
    };
    const GOAL_SETS = {
      strength:{sets:3,reps:5}, hypertrophy:{sets:3,reps:10}, endurance:{sets:3,reps:15}, maintain:{sets:3,reps:8},

    const INTENSITY_MODES = {
      recovery:{ label:"Recovery", pct:0.65, sets:4, reps:5,  color:"var(--blue2)",  colorDim:"rgba(74,108,140,0.15)",  colorBorder:"rgba(74,108,140,0.4)",  description:"65% · 4×5" },

    const WORKOUT_TEMPLATES = [
      {id:"push",label:"Push Day",emoji:"💪",accent:"#4a6c8c",accentDim:"rgba(74,108,140,0.15)",accentBorder:"rgba(74,108,140,0.45)",exercises:["bench","incline_db_press","cable_fly","lateral_raise","oh_db_press","tricep_rope","assisted_dip"]},
      {id:"pull",label:"Pull Day",emoji:"🏋️",accent:"#4a6c8c",accentDim:"rgba(74,108,140,0.15)",accentBorder:"rgba(74,108,140,0.45)",exercises:["lat_pulldown","seated_cable_row","single_arm_row","preacher_curl","rope_hammer_curl"]},
      {id:"legs",label:"Leg Day",emoji:"🦵",accent:"#4a6c8c",accentDim:"rgba(74,108,140,0.15)",accentBorder:"rgba(74,108,140,0.45)",exercises:["squat","rdl","leg_press","calf_raise","glute_drive","hip_adduction","leg_curl"]},
    ];

    // Utility functions
    const roundTo2_5 = (v) => Math.round(v/2.5)*2.5;
    const roundForEquip = (w,eq) => ((eq==="machine"||eq==="dumbbell")&&(w%5)===2.5) ? w+2.5 : w;
    const getBigInc = (ex) => ({barbell:2.5,dumbbell:5,cable:5,assisted:2.5}[ex.equipmentType]||ex.increment||5);

    function safeProgressWeight(current, goal, weeksSince, unit) {
      if (goal==="maintain") return current;
      const factor = Math.pow(GOALS[goal].increment, weeksSince||1);
      const proposed = Math.round((current*factor)/2.5)*2.5;
      const maxInc = ({lbs:10,reps:2}[unit]||5)*(weeksSince||1);
      return Math.min(proposed, current+maxInc);
    }

    function calcEpley1RM(workoutsArr, exId) {
      for (let i=workoutsArr.length-1; i>=0; i--) {
        const ex = workoutsArr[i].exercises?.find(e=>e.id===exId);
        if (!ex) continue;
        const candidates = (ex.setData?.length>0 ? ex.setData : [{weight:ex.weight,reps:ex.reps}]).filter(s=>s.reps>=1&&s.weight>0);
        if (candidates.length>0) {
          const best = candidates.reduce((a,b)=>{
            const v = s => s.reps===1 ? s.weight : s.weight*(1+s.reps/30);
            return v(b)>v(a)?b:a;
          });
          return best.reps===1 ? best.weight : Math.round(best.weight*(1+best.reps/30)*10)/10;
        }
      }
      return null;
    }

    function getEffective1RM(oneRepMaxes, workoutsArr, exId) {
      const stored = oneRepMaxes.find(r=>r.exId===exId);
      if (stored) { const d=(Date.now()-new Date(stored.updatedAt))/86400000; if(d<=15) return {value:stored.weight,source:"stored"}; }
      const calc = calcEpley1RM(workoutsArr, exId);
      if (calc) return {value:calc,source:"calculated"};
      if (stored) return {value:stored.weight,source:"stored_expired"};
      return null;
    }

    // ── Shared UI Components ──────────────────────────────────────────────────

    function Confetti() {
      const canvasRef = useRef(null);
      useEffect(()=>{
        const canvas=canvasRef.current; if(!canvas) return;
        const ctx=canvas.getContext("2d");
        canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        const colors=["#c8922a","#e8b84b","#f0e6cc","#4a7c59","#6aa87a","#4a6c8c","#6a90b8","#c44b2b"];
        const particles=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*100,w:8+Math.random()*8,h:4+Math.random()*6,color:colors[Math.floor(Math.random()*colors.length)],rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*8,vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,alpha:1}));
        let raf;
        const draw=()=>{
          ctx.clearRect(0,0,canvas.width,canvas.height); let alive=false;
          particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;if(p.y>canvas.height*0.7)p.alpha=Math.max(0,p.alpha-0.02);if(p.alpha>0)alive=true;ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
          if(alive) raf=requestAnimationFrame(draw);
        };
        draw(); return()=>cancelAnimationFrame(raf);
      },[]);
      return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:998}}/>;
    }

    function MiniChart({history, targetWeight, width=300, height=120}) {
      if (history.length<1) return <div style={{color:"var(--muted)",fontSize:12,textAlign:"center",padding:20}}>No data yet</div>;
      const t0=new Date(history[0].date).getTime(), tEnd=Date.now()+30*86400000;
      const allW=[...history.map(h=>h.weight),targetWeight];
      const minW=Math.min(...allW)*0.95, maxW=Math.max(...allW)*1.02;
      const tx=t=>(t-t0)/(tEnd-t0)*width, ty=w=>height-(w-minW)/(maxW-minW)*height;
      const pts=history.map(h=>`${tx(new Date(h.date).getTime())},${ty(h.weight)}`).join(" ");
      return (
        <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height,overflow:"visible"}}>
          <line x1="0" y1={ty(targetWeight)} x2={width} y2={ty(targetWeight)} stroke="var(--green2)" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>
          <text x={width-2} y={ty(targetWeight)-4} textAnchor="end" fontSize="9" fill="var(--green2)" fontFamily="DM Mono,monospace">{targetWeight} lbs</text>
          {history.length>1&&<polyline points={pts} fill="none" stroke="var(--gold)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
          <line x1={tx(Date.now())} y1="0" x2={tx(Date.now())} y2={height} stroke="var(--cream2)" strokeWidth="0.5" opacity="0.3"/>
          {history.map((h,i)=>{ const cx=tx(new Date(h.date).getTime()),cy=ty(h.weight); return <circle key={i} cx={cx} cy={cy} r="3.5" fill="var(--gold)" stroke="var(--bg2)" strokeWidth="1.5"/>; })}
        </svg>
      );
    }

    function CalendarView({workouts, onSelectDate, selectedDate, calYear, calMonth, setCalYear, setCalMonth}) {
      const workoutDateMap = new Map();
      workouts.forEach(w=>{ const ds=new Date(w.date).toDateString(); if(!workoutDateMap.has(ds))workoutDateMap.set(ds,[]); workoutDateMap.get(ds).push(w); });
      const firstDay=new Date(calYear,calMonth,1).getDay(), daysInMonth=new Date(calYear,calMonth+1,0).getDate();
      const monthName=new Date(calYear,calMonth).toLocaleDateString("en-US",{month:"long",year:"numeric"});
      const cells=[]; for(let i=0;i<firstDay;i++)cells.push(null); for(let d=1;d<=daysInMonth;d++)cells.push(d);
      const prevMonth=()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); };
      const nextMonth=()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); };
      return (
        <div style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={prevMonth} className="btn-ghost" style={{color:"var(--gold)",fontSize:20}}>‹</button>
            <span className="mono" style={{fontSize:11,letterSpacing:2,color:"var(--cream)",textTransform:"uppercase"}}>{monthName}</span>
            <button onClick={nextMonth} className="btn-ghost" style={{color:"var(--gold)",fontSize:20}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,textAlign:"center"}}>
            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="mono" style={{fontSize:9,color:"var(--muted)",paddingBottom:4,letterSpacing:1}}>{d}</div>)}
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const dateStr=new Date(calYear,calMonth,d).toDateString();
              const hasWorkout=workoutDateMap.has(dateStr), isToday=new Date().toDateString()===dateStr, isSelected=selectedDate===dateStr;
              return (
                <div key={i} onClick={()=>hasWorkout&&onSelectDate(isSelected?null:dateStr)} style={{borderRadius:6,padding:"6px 2px",cursor:hasWorkout?"pointer":"default",background:isSelected?"rgba(200,146,42,0.45)":hasWorkout?"rgba(200,146,42,0.25)":isToday?"rgba(200,146,42,0.06)":"transparent",border:isSelected?"1px solid var(--gold)":isToday?"1px solid rgba(200,146,42,0.4)":"1px solid transparent",fontFamily:"'DM Mono',monospace",fontSize:12,color:isSelected?"var(--gold)":hasWorkout?"var(--gold)":isToday?"var(--cream2)":"var(--muted)",fontWeight:hasWorkout?"600":"400",position:"relative"}}>
                  {d}{hasWorkout&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:2,background:"var(--gold)"}}/>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

          setWorkouts(wkts); setCustomExs(cexs); setLiftGoals(lgs); setOneRepMaxes(orms||[]);
        } catch(e) { console.error(e); }
        setDataLoading(false);

      useEffect(()=>{
        if (authUser&&!dataLoading&&profile===null) {
          const p = {goal:"hypertrophy",exercises:[],created:new Date().toISOString(),uid:authUser.uid};
          saveProfile(p);
        }
      },[authUser,dataLoading,profile]);

      const handleSignIn = async () => {
        setSignInErr(null); setSigningIn(true);
        try { await auth.signInWithPopup(gProvider); }
        catch(e) { setSigningIn(false); if(e.code!=="auth/popup-closed-by-user"&&e.code!=="auth/cancelled-popup-request") setSignInErr("Sign-in failed: "+(e.message||e.code)); }
      };

      const handleSignOut = async () => {
        await auth.signOut();
        setProfileS(null); setWorkouts([]); setCustomExs([]); setLiftGoals([]); setOneRepMaxes([]); setScreen("home");
      };

      const showToast = (msg) => { setToast(msg); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(null),3000); };

      const saveProfile = async (p) => { setProfileS(p); if(authUser) await fb.setProfile(authUser.uid,p); };

      const addWorkoutRecord = async (w) => {
        if (authUser) { const id=await fb.addWorkout(authUser.uid,w); w={...w,_id:id}; }
        setWorkouts(prev=>[...prev,w].sort((a,b)=>new Date(a.date)-new Date(b.date)));
      };
      const updateWorkoutRecord = async (w) => { if(authUser&&w._id) await fb.updateWorkout(authUser.uid,w._id,w); setWorkouts(prev=>prev.map(x=>x._id===w._id?w:x)); };
      const deleteWorkoutRecord = async (w) => { if(authUser&&w._id) await fb.deleteWorkout(authUser.uid,w._id); setWorkouts(prev=>prev.filter(x=>x._id!==w._id&&x.date!==w.date)); };

      const doAddCustomEx = async (ex) => { if(authUser){const fid=await fb.addCustomEx(authUser.uid,ex);ex={...ex,_fid:fid};} setCustomExs(prev=>[...prev,ex]); return ex; };
      const updateCustomExRecord = async (ex) => { if(authUser&&ex._fid) await fb.updateCustomEx(authUser.uid,ex._fid,ex); setCustomExs(prev=>prev.map(x=>x._fid===ex._fid?ex:x)); };
      const deleteCustomExRecord = async (ex) => { if(authUser&&ex._fid) await fb.deleteCustomEx(authUser.uid,ex._fid); setCustomExs(prev=>prev.filter(x=>x._fid!==ex._fid)); };

      const doAddLiftGoal = async (g) => { if(authUser){const id=await fb.addLiftGoal(authUser.uid,g);g={...g,_id:id};} setLiftGoals(prev=>[...prev,g]); };
      const doDelLiftGoal = async (id) => { if(authUser) await fb.delLiftGoal(authUser.uid,id); setLiftGoals(prev=>prev.filter(g=>g._id!==id)); };

      const doSave1RM = async (exId,weight) => {
        if(authUser) await fb.set1RM(authUser.uid,exId,weight);
        setOneRepMaxes(prev=>[...prev.filter(r=>r.exId!==exId),{exId,weight,updatedAt:new Date().toISOString()}]);
      };
      const doDel1RM = async (exId) => { if(authUser) await fb.del1RM(authUser.uid,exId); setOneRepMaxes(prev=>prev.filter(r=>r.exId!==exId)); };

      const getLastForExercise = (exId) => {
        for (let i=workouts.length-1; i>=0; i--) { const ex=workouts[i].exercises?.find(e=>e.id===exId); if(ex) return {workout:workouts[i],exercise:ex}; }
        return null;
      };

      const daysSinceExercise = (exId) => { const last=getLastForExercise(exId); if(!last) return null; return (Date.now()-new Date(last.workout.date))/86400000; };

      const computeWeightForEx = (exId, def, iModeKey) => {
        const mode = INTENSITY_MODES[iModeKey]||INTENSITY_MODES["building"];
        if (mode?.pct) {
          const orm = getEffective1RM(oneRepMaxes,workouts,exId);
          if (orm) { const scaled=roundTo2_5(orm.value*mode.pct); return roundForEquip(Math.max(scaled,5),def.equipmentType); }
        }
        const last = getLastForExercise(exId);
        const goal = profile?.goal||"hypertrophy";
        if (last) {
          const weeks = Math.max(1,Math.round((Date.now()-new Date(last.workout.date))/(7*86400000)));
          if (def.equipmentType==="assisted") {
            const prog = safeProgressWeight(last.exercise.weight,goal,weeks,def.unit);
            return Math.max(0,last.exercise.weight-Math.abs(prog-last.exercise.weight));
          }
          return roundForEquip(safeProgressWeight(last.exercise.weight,goal,weeks,def.unit),def.equipmentType);
        }
        return roundForEquip(def.defaultWeight,def.equipmentType);
      };

      const buildExerciseList = (exIdList, sets, reps, iModeKey="building") =>
        exIdList.map(exId=>{
          const def = allExercises.find(e=>e.id===exId); if(!def) return null;
          const weight = computeWeightForEx(exId,def,iModeKey);
          return {id:exId,name:def.name,category:def.category,weight,unit:def.unit,sets,reps,increment:def.increment,bigIncrement:getBigInc(def),equipmentType:def.equipmentType||"machine",barbellWeight:def.barbellWeight||null};
        }).filter(Boolean);

      const launchWorkout = (tmpl, extras, removed, sets, reps, orderedIds, iMode) => {
        isFinishingRef.current = false;
        const baseIds = orderedIds||[...tmpl.exercises,...extras].filter(id=>!removed.includes(id));
        const exercises = buildExerciseList(baseIds,sets,reps,iMode||"building");
        const setRepsMap = {}; exercises.forEach(ex=>{ setRepsMap[ex.id]=Array(sets).fill(reps); });
        setActiveWorkout({date:new Date().toISOString(),exercises,completed:false,templateLabel:tmpl.label,templateId:tmpl.id,setRepsMap,intensityMode:iMode||"building"});
        setCurrentExIdx(0); setCompletedSets({}); setPerSetData({}); setNoteFor({}); setSummaryData(null);
        setMidWorkoutAddedExIds([]); setDeferredExIds([]); setCancelConfirm(false); setScreen("workout");
      };

      const launchCustomWorkout = () => {
        isFinishingRef.current = false;
        const mode=INTENSITY_MODES[intensityMode], sets=mode.sets||GOAL_SETS[customGoal].sets, reps=mode.reps||GOAL_SETS[customGoal].reps;
        const exercises = buildExerciseList(customExIds,sets,reps,intensityMode);
        const setRepsMap = {}; exercises.forEach(ex=>{ setRepsMap[ex.id]=Array(sets).fill(reps); });
        setActiveWorkout({date:new Date().toISOString(),exercises,completed:false,templateLabel:"Custom",templateId:"custom",setRepsMap,intensityMode});
        setCurrentExIdx(0); setCompletedSets({}); setPerSetData({}); setNoteFor({}); setSummaryData(null);
        setMidWorkoutAddedExIds([]); setDeferredExIds([]); setCancelConfirm(false); setScreen("workout");
      };

      const addExToActiveWorkout = (exId) => {
        const def = allExercises.find(e=>e.id===exId); if(!def) return;
        if (activeWorkout?.exercises.some(e=>e.id===exId)) return;
        const iMode = activeWorkout.intensityMode||"building";
        const weight = computeWeightForEx(exId,def,iMode);
        const refEx = activeWorkout.exercises[0];
        const sets=refEx?.sets||3, reps=refEx?.reps||10;
        const newExObj = {id:exId,name:def.name,category:def.category,weight,unit:def.unit,sets,reps,increment:def.increment,bigIncrement:getBigInc(def),equipmentType:def.equipmentType||"machine",barbellWeight:def.barbellWeight||null};
        setActiveWorkout(p=>{
          if (p.exercises.some(e=>e.id===exId)) return p;
          return {...p,exercises:[...p.exercises,newExObj],setRepsMap:{...p.setRepsMap,[exId]:Array(sets).fill(reps)}};
        });
        setMidWorkoutAddedExIds(p=>[...p,exId]);
        setWorkoutAddModal(false);
        showToast(def.name+" added!");
        setActiveWorkout(p=>{ const idx=p.exercises.findIndex(e=>e.id===exId); if(idx>=0) setTimeout(()=>setCurrentExIdx(idx),100); return p; });
      };

      const finishWorkoutWithState = async (csState) => {
        if (isFinishingRef.current) return;
        isFinishingRef.current = true;
        const cs = csState||completedSets;
        const exercisesWithSetData = activeWorkout.exercises.map(ex=>{
          const setRepsArr = activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
          const setData = Array.from({length:ex.sets},(_,i)=>{ const k=`${ex.id}_${i}`; return {weight:perSetData[k]?.weight??ex.weight,reps:perSetData[k]?.reps??setRepsArr[i]}; });
          return {...ex,setData,note:noteFor[ex.id]||""};
        });
        const w = {...activeWorkout,exercises:exercisesWithSetData,completed:true};
        await addWorkoutRecord(w);
        const capturedAdds = [...midWorkoutAddedExIds];
        const summary = {
          templateLabel:w.templateLabel,templateId:w.templateId,date:w.date,
          midWorkoutAddedExIds:capturedAdds,
          exercises:exercisesWithSetData.map(ex=>{
            const doneSets = Array.from({length:ex.sets},(_,i)=>!!cs[`${ex.id}_${i}`]);
            const last = getLastForExercise(ex.id);
            const improved = last ? (ex.equipmentType==="assisted" ? ex.weight<last.exercise.weight : ex.weight>last.exercise.weight) : false;
            return {...ex,completedSets:doneSets.filter(Boolean).length,totalSets:ex.sets,improved,matchedGoals:liftGoals.filter(g=>g.exId===ex.id&&ex.weight>=g.targetWeight)};
          }),
        };
        setSummaryData(summary);
        clearInterval(restIntervalRef.current); setRestTimer(null);
        setActiveWorkout(null); setActiveTmpl(null); setExtraExIds([]); setRemovedExIds([]); setPreviewOrder(null);
        setMidWorkoutAddedExIds([]); setDeferredExIds([]); setCancelConfirm(false);
        setScreen("summary");
      };

      const confirmCancelWorkout = () => {
        isFinishingRef.current = false;
        clearInterval(restIntervalRef.current); setRestTimer(null);
        setActiveWorkout(null); setActiveTmpl(null); setExtraExIds([]); setRemovedExIds([]); setPreviewOrder(null);
        setMidWorkoutAddedExIds([]); setDeferredExIds([]); setCancelConfirm(false); setScreen("home");
      };

      const startRestTimer = () => {
        clearInterval(restIntervalRef.current); setRestTimer(60);
        restIntervalRef.current = setInterval(()=>{
          setRestTimer(prev=>{ if(prev===null){clearInterval(restIntervalRef.current);return null;} if(prev<=1){clearInterval(restIntervalRef.current);return 0;} return prev-1; });
        },1000);
      };

      const toggleSet = (exId, i) => {
        setCompletedSets(p=>{
          const key=`${exId}_${i}`, wasCompleted=!!p[key], newState={...p,[key]:!wasCompleted};
          if (!wasCompleted) {
            const allSets = activeWorkout.exercises.flatMap(ex=>Array.from({length:ex.sets},(_,si)=>({exId:ex.id,key:`${ex.id}_${si}`})));
            if (allSets.every(s=>newState[s.key])) { clearInterval(restIntervalRef.current); setRestTimer(null); setTimeout(()=>finishWorkoutWithState(newState),100); }
            else {
              const currEx = activeWorkout.exercises[currentExIdx];
              const currAllDone = Array.from({length:currEx.sets},(_,si)=>newState[`${currEx.id}_${si}`]).every(Boolean);
              const doneEx = activeWorkout.exercises.find(e=>e.id===exId);
              const doneExAllDone = Array.from({length:doneEx?.sets||0},(_,si)=>newState[`${exId}_${si}`]).every(Boolean);
              setTimeout(()=>{ setDeferredExIds(prev=>{ if(prev.includes(exId)&&doneExAllDone) return prev.filter(id=>id!==exId); return prev; }); },0);
              if (currAllDone&&exId===currEx.id) { clearInterval(restIntervalRef.current); setRestTimer(null); const ni=currentExIdx+1; if(ni<activeWorkout.exercises.length) setTimeout(()=>setCurrentExIdx(ni),150); }
              else startRestTimer();
            }
          }
          return newState;
        });
      };

      const adjustWeightGlobal = (exId, delta) => {
        setActiveWorkout(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,weight:Math.max(0,+(e.weight+delta).toFixed(2))}:e)}));
        const snappedEx = activeWorkout?.exercises.find(e=>e.id===exId);
        const snappedCompleted = completedSets;
        if (!snappedEx) return;
        setPerSetData(p=>{
          const n = {...p};
          Array.from({length:snappedEx.sets},(_,i)=>{ const k=`${exId}_${i}`; if(!snappedCompleted[k]){ n[k]={...p[k],weight:Math.max(0,+((p[k]?.weight??snappedEx.weight)+delta).toFixed(2))}; } });
          return n;
        });
      };

      const adjustSetWeight = (exId, si, delta) => {
        const k = `${exId}_${si}`;
        setPerSetData(p=>{ const ex=activeWorkout.exercises.find(e=>e.id===exId); return {...p,[k]:{...p[k],weight:Math.max(0,+((p[k]?.weight??ex.weight)+delta).toFixed(2))}}; });
      };

      const adjustSetReps = (exId, si, delta) => {
        const k = `${exId}_${si}`;
        setPerSetData(p=>{ const cur=p[k]?.reps??(activeWorkout.setRepsMap?.[exId]?.[si]??activeWorkout.exercises.find(e=>e.id===exId)?.reps??10); return {...p,[k]:{...p[k],reps:Math.max(1,cur+delta)}}; });
      };

      const setsForEx = (ex) => Array.from({length:ex.sets},(_,i)=>!!completedSets[`${ex.id}_${i}`]);

      const swapExercise = (oldExId, newExId) => {
        const newDef = allExercises.find(e=>e.id===newExId); if(!newDef) return;
        const oldEx = activeWorkout.exercises.find(e=>e.id===oldExId);
        const iMode = activeWorkout.intensityMode||"building";
        const newExObj = {id:newExId,name:newDef.name,category:newDef.category,weight:computeWeightForEx(newExId,newDef,iMode),unit:newDef.unit,sets:oldEx.sets,reps:oldEx.reps,increment:newDef.increment,bigIncrement:getBigInc(newDef),equipmentType:newDef.equipmentType||"machine",barbellWeight:newDef.barbellWeight||null};
        setActiveWorkout(p=>({...p,exercises:p.exercises.map(e=>e.id===oldExId?newExObj:e),setRepsMap:{...p.setRepsMap,[newExId]:p.setRepsMap[oldExId]||Array(oldEx.sets).fill(oldEx.reps)}}));
        setCompletedSets(p=>{ const n={...p}; Array.from({length:oldEx.sets},(_,i)=>{ if(n[`${oldExId}_${i}`]) n[`${newExId}_${i}`]=true; delete n[`${oldExId}_${i}`]; }); return n; });
        setPerSetData(p=>{ const n={...p}; Array.from({length:oldEx.sets},(_,i)=>{ if(n[`${oldExId}_${i}`]) n[`${newExId}_${i}`]=n[`${oldExId}_${i}`]; delete n[`${oldExId}_${i}`]; }); return n; });
        const idx = activeWorkout.exercises.findIndex(e=>e.id===oldExId); if(idx>=0) setCurrentExIdx(idx);
        setSwapModal(null); showToast(newDef.name+" swapped in!");
      };

      const applyEquipChange = (exId) => {
        setActiveWorkout(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,equipmentType:draftEquip.equipmentType||e.equipmentType,barbellWeight:draftEquip.barbellWeight!=null?Number(draftEquip.barbellWeight):e.barbellWeight,bigIncrement:getBigInc({...e,equipmentType:draftEquip.equipmentType||e.equipmentType})}:e)}));
        setEquipModal(null); showToast("Equipment updated!");
      };

      const saveNewExercise = async (addToWorkout=false) => {
        if (!newEx.name.trim()) return;
        const ex = {id:"custom_"+Date.now(),name:newEx.name.trim(),category:newEx.category,unit:newEx.unit,defaultWeight:Number(newEx.defaultWeight)||0,increment:Number(newEx.increment)||5,equipmentType:newEx.equipmentType||"machine",barbellWeight:newEx.equipmentType==="barbell"?(Number(newEx.barbellWeight)||45):null,custom:true};
        const saved = await doAddCustomEx(ex);
        if (addToWorkout) { if(activeTmpl) setExtraExIds(p=>[...p,saved.id]); else setCustomExIds(p=>[...p,saved.id]); }
        setNewEx({name:"",category:"Chest",unit:"lbs",defaultWeight:45,increment:5,equipmentType:"machine",barbellWeight:45});
        setModal(null); showToast(ex.name+" added!");
      };

      const saveNewLiftGoal = async () => {
        if (!newLiftGoal.exId||!newLiftGoal.targetWeight) return;
        await doAddLiftGoal({exId:newLiftGoal.exId,targetWeight:Number(newLiftGoal.targetWeight),created:new Date().toISOString()});
        setNewLiftGoal({exId:"",targetWeight:""}); setModal(null); showToast("Goal set!");
      };

      const savePastWorkout = async () => {
        if (!pastDate) return;
        const exercises = pastRows.filter(r=>r.exId&&r.sets.some(s=>s.weight!==""&&s.reps!=="")).map(r=>{
          const def = allExercises.find(e=>e.id===r.exId);
          const validSets = r.sets.filter(s=>s.weight!==""&&s.reps!=="");
          return {id:r.exId,name:def?.name||r.exId,category:def?.category||"Other",weight:Number(validSets[0]?.weight)||0,unit:def?.unit||"lbs",sets:validSets.length,reps:Number(validSets[0]?.reps)||0,increment:def?.increment||5,setData:validSets.map(s=>({weight:Number(s.weight)||0,reps:Number(s.reps)||0}))};
        });
        if (!exercises.length) return;
        await addWorkoutRecord({date:new Date(pastDate+"T12:00:00").toISOString(),exercises,completed:true,imported:true});
        setPastDate(""); setPastRows([{exId:"",sets:[{weight:"",reps:""}]}]); setModal(null); showToast("Past workout imported!");
      };

      const getLiftHistory = (exId) =>
        workouts.flatMap(w=>{ const ex=w.exercises?.find(e=>e.id===exId); return ex?[{date:w.date,weight:ex.weight}]:[]; })
          .sort((a,b)=>new Date(a.date)-new Date(b.date));

      const totalSets = activeWorkout ? activeWorkout.exercises.reduce((a,e)=>a+e.sets,0) : 0;
      const totalDone = activeWorkout ? activeWorkout.exercises.reduce((a,ex)=>{ setsForEx(ex).forEach(d=>{if(d)a++;}); return a; },0) : 0;

      // ── Toast ──
      const Toast = toast ? (
        <div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",background:"var(--gold)",color:"var(--bg)",padding:"11px 22px",borderRadius:6,fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,fontWeight:500,zIndex:600,boxShadow:"0 6px 24px rgba(200,146,42,0.4)",whiteSpace:"nowrap",textTransform:"uppercase"}}>{toast}</div>
      ) : null;

      // ── Rest Modal ──
      const RestModal = (()=>{
        if (restTimer===null) return null;
        let upNextLabel="", upNextDetail="";
        if (activeWorkout) {
          outer: for (let ei=currentExIdx; ei<activeWorkout.exercises.length; ei++) {
            const e=activeWorkout.exercises[ei], sr=activeWorkout.setRepsMap?.[e.id]||Array(e.sets).fill(e.reps);
            for (let si=0; si<e.sets; si++) {
              if (!completedSets[`${e.id}_${si}`]) {
                upNextLabel = ei===currentExIdx ? `S${si+1} of ${e.name}` : e.name;
                upNextDetail = `${perSetData[`${e.id}_${si}`]?.weight??e.weight} ${e.unit!=="reps"?e.unit:""}× ${perSetData[`${e.id}_${si}`]?.reps??sr[si]} reps`;
                break outer;
              }
            }
          }
        }
        const timerDone = restTimer===0;
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
            <div style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:20,padding:"36px 44px",textAlign:"center",maxWidth:340,width:"100%"}}>
              {timerDone ? (
                <>
                  <div style={{fontSize:40,marginBottom:8}}>💪</div>
                  <div className="display" style={{fontSize:22,fontWeight:900,color:"var(--gold)",marginBottom:6}}>Rest Over!</div>
                  <div className="mono" style={{fontSize:12,color:"var(--cream2)",letterSpacing:1,marginBottom:20,lineHeight:1.5}}>Do your next lift</div>
                  {upNextLabel&&<div style={{background:"rgba(200,146,42,0.1)",border:"1px solid rgba(200,146,42,0.3)",borderRadius:10,padding:"12px 16px",marginBottom:20}}><div className="mono" style={{fontSize:9,color:"var(--muted)",letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Up Next</div><div style={{fontWeight:600,fontSize:15,color:"var(--cream)",marginBottom:2}}>{upNextLabel}</div><div className="mono" style={{fontSize:12,color:"var(--gold2)"}}>{upNextDetail}</div></div>}
                  <button onClick={()=>{clearInterval(restIntervalRef.current);setRestTimer(null);}} style={{background:"var(--gold)",border:"none",borderRadius:10,padding:"14px 32px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,cursor:"pointer",textTransform:"uppercase",fontWeight:600,width:"100%"}}>Got It ✓</button>
                </>
              ) : (
                <>
                  <div className="mono" style={{fontSize:10,letterSpacing:5,color:"var(--muted)",textTransform:"uppercase",marginBottom:14}}>Rest</div>
                  <div className="display" style={{fontSize:84,fontWeight:900,lineHeight:1,color:restTimer<=10?"var(--brick2)":restTimer<=30?"var(--gold2)":"var(--gold)",transition:"color 0.5s"}}>{restTimer}</div>
                  <div className="mono" style={{fontSize:10,color:"var(--muted)",letterSpacing:3,marginTop:10,textTransform:"uppercase"}}>seconds</div>
                  <div style={{height:3,background:"var(--surface2)",borderRadius:2,overflow:"hidden",width:120,margin:"14px auto 16px"}}><div style={{height:"100%",width:`${(restTimer/60)*100}%`,background:"var(--gold)",borderRadius:2,transition:"width 1s linear"}}/></div>
                  {upNextLabel&&<div style={{background:"rgba(200,146,42,0.06)",border:"1px solid rgba(200,146,42,0.18)",borderRadius:8,padding:"10px 14px",marginBottom:14,textAlign:"left"}}><div className="mono" style={{fontSize:8,color:"var(--muted)",letterSpacing:3,textTransform:"uppercase",marginBottom:3}}>Up Next</div><div style={{fontWeight:600,fontSize:13,color:"var(--cream)",marginBottom:1}}>{upNextLabel}</div><div className="mono" style={{fontSize:11,color:"var(--gold2)"}}>{upNextDetail}</div></div>}
                  <button onClick={()=>{clearInterval(restIntervalRef.current);setRestTimer(null);}} style={{background:"none",border:"1px solid var(--border2)",borderRadius:8,padding:"10px 28px",color:"var(--muted)",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,cursor:"pointer",textTransform:"uppercase"}}>Skip</button>
                </>
              )}
            </div>
          </div>
        );
      })();

      // ── Modals ──
      const renderModal = () => {
        const exSelectOptions = (
          <>
            <option value="">Select exercise...</option>
            {CATEGORIES.map(cat=>{ const ces=allExercises.filter(e=>e.category===cat); if(!ces.length) return null; return <optgroup key={cat} label={cat}>{ces.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}</optgroup>; })}
          </>
        );

        if (modal==="browseAdd"||modal==="browseAddWorkout") {
          const activeIds = activeTmpl ? [...activeTmpl.exercises,...extraExIds].filter(id=>!removedExIds.includes(id)) : customExIds;
          const available = allExercises.filter(ex=>!activeIds.includes(ex.id));
          const suggested = BUILTIN_EXERCISES.filter(ex=>{ if(activeIds.includes(ex.id)) return false; const d=daysSinceExercise(ex.id); return d!==null&&d>=7; }).slice(0,6);
          const addEx = (id) => { if(activeTmpl) setExtraExIds(p=>[...p,id]); else setCustomExIds(p=>[...p,id]); setModal(null); showToast(allExercises.find(e=>e.id===id)?.name+" added!"); };
          return (
            <ModalSheet onClose={()=>setModal(null)}>
              <span className="label" style={{fontSize:12,marginBottom:16}}>Add Exercise</span>
              {suggested.length>0&&<div style={{marginBottom:18}}><span className="label" style={{fontSize:9,color:"var(--gold)",marginBottom:8}}>💡 Not done in 7+ days</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{suggested.map(ex=><button key={ex.id} onClick={()=>addEx(ex.id)} style={{background:"rgba(200,146,42,0.12)",border:"1px solid rgba(200,146,42,0.4)",borderRadius:6,padding:"7px 11px",color:"var(--gold2)",fontSize:13,cursor:"pointer"}}>{ex.name}</button>)}</div></div>}
              <div style={{maxHeight:"50vh",overflowY:"auto",marginBottom:12}}>
                {CATEGORIES.map(cat=>{ const ces=available.filter(e=>e.category===cat); if(!ces.length) return null; return <div key={cat} style={{marginBottom:14}}><span className="label" style={{fontSize:9}}>{cat}</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ces.map(ex=><button key={ex.id} onClick={()=>addEx(ex.id)} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 11px",color:"var(--cream2)",fontSize:13,cursor:"pointer"}}>{ex.name}{ex.custom?" ★":""}</button>)}</div></div>; })}
              </div>
              <button className="btn-outline" style={{width:"100%",fontSize:11}} onClick={()=>setModal("createAndAdd")}>+ Create New Exercise</button>
            </ModalSheet>
          );
        }

        if (modal==="createAndAdd") return <ModalBox onClose={()=>setModal(null)}><span className="label" style={{fontSize:12,marginBottom:16}}>Create & Add Exercise</span><ExerciseFormFields ex={newEx} onChange={setNewEx}/><button className="btn" style={{marginTop:12}} onClick={()=>saveNewExercise(true)}>Create & Add</button></ModalBox>;
        if (modal==="addExercise") return <ModalBox onClose={()=>setModal(null)}><span className="label" style={{fontSize:12,marginBottom:16}}>Add Custom Exercise</span><ExerciseFormFields ex={newEx} onChange={setNewEx}/><button className="btn" style={{marginTop:12}} onClick={()=>saveNewExercise(false)}>Add Exercise</button></ModalBox>;

        if (modal==="addLiftGoal") return (
          <ModalSheet onClose={()=>setModal(null)}>
            <span className="label" style={{fontSize:12,marginBottom:4}}>Set a Lift Goal</span>
            <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Choose an exercise and a target weight. IRONFORM will chart your progress.</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><span className="label">Exercise</span><select className="select" value={newLiftGoal.exId} onChange={e=>setNewLiftGoal(p=>({...p,exId:e.target.value}))}>{exSelectOptions}</select></div>
              <div><span className="label">Target Weight (lbs)</span><input className="input" type="number" placeholder="e.g. 135" value={newLiftGoal.targetWeight} onChange={e=>setNewLiftGoal(p=>({...p,targetWeight:e.target.value}))}/></div>
            </div>
            <button className="btn" style={{marginTop:16}} onClick={saveNewLiftGoal}>Set Goal</button>
          </ModalSheet>
        );

        if (modal==="logPastWorkout") return (
          <ModalBox onClose={()=>setModal(null)}>
            <span className="label" style={{fontSize:12,marginBottom:4}}>Log Past Workout</span>
            <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Enter a previous session to calibrate weight projections.</p>
            <div style={{marginBottom:16}}><span className="label">Date</span><input className="input" type="date" value={pastDate} onChange={e=>setPastDate(e.target.value)}/></div>
            <div style={{maxHeight:"50vh",overflowY:"auto"}}>
              {pastRows.map((row,rowIdx)=>(
                <div key={rowIdx} className="card" style={{padding:14,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span className="label" style={{marginBottom:0}}>Exercise {rowIdx+1}</span>
                    {pastRows.length>1&&<button className="btn-ghost" style={{color:"var(--brick2)",fontSize:18}} onClick={()=>setPastRows(p=>p.filter((_,i)=>i!==rowIdx))}>×</button>}
                  </div>
                  <select className="select" style={{marginBottom:10}} value={row.exId} onChange={e=>setPastRows(p=>p.map((r,i)=>i===rowIdx?{...r,exId:e.target.value}:r))}>{exSelectOptions}</select>
                  <span className="label" style={{fontSize:9,marginBottom:6}}>Sets</span>
                  {row.sets.map((setItem,setIdx)=>(
                    <div key={setIdx} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr auto",gap:6,alignItems:"center",marginBottom:6}}>
                      <span className="mono" style={{fontSize:10,color:"var(--muted)",minWidth:20}}>S{setIdx+1}</span>
                      <div><span className="label" style={{fontSize:8,marginBottom:2}}>Weight</span><input className="input" style={{padding:"8px 10px",fontSize:13}} type="number" placeholder="135" value={setItem.weight} onChange={e=>setPastRows(p=>p.map((r,i)=>i!==rowIdx?r:{...r,sets:r.sets.map((s,si)=>si!==setIdx?s:{...s,weight:e.target.value})}))}/></div>
                      <div><span className="label" style={{fontSize:8,marginBottom:2}}>Reps</span><input className="input" style={{padding:"8px 10px",fontSize:13}} type="number" placeholder="10" value={setItem.reps} onChange={e=>setPastRows(p=>p.map((r,i)=>i!==rowIdx?r:{...r,sets:r.sets.map((s,si)=>si!==setIdx?s:{...s,reps:e.target.value})}))}/></div>
                      {row.sets.length>1&&<button onClick={()=>setPastRows(p=>p.map((r,i)=>i!==rowIdx?r:{...r,sets:r.sets.filter((_,si)=>si!==setIdx)}))} className="btn-ghost" style={{color:"var(--brick2)",fontSize:16,paddingTop:16,alignSelf:"flex-end",paddingBottom:4}}>×</button>}
                    </div>
                  ))}
                  <button className="btn-sm" style={{marginTop:4,fontSize:9}} onClick={()=>setPastRows(p=>p.map((r,i)=>i===rowIdx?{...r,sets:[...r.sets,{weight:"",reps:""}]}:r))}>+ Add Set</button>
                </div>
              ))}
              <div ref={pastRowsEndRef}/>
            </div>
            <button className="btn-outline" style={{width:"100%",marginBottom:10,marginTop:8,fontSize:11}} onClick={()=>{ setPastRows(p=>[...p,{exId:"",sets:[{weight:"",reps:""}]}]); setTimeout(()=>pastRowsEndRef.current?.scrollIntoView({behavior:"smooth"}),50); }}>+ Add Another Exercise</button>
            <button className="btn" onClick={savePastWorkout}>Save Past Workout</button>
          </ModalBox>
        );

        if (modal==="editWorkout"&&editingWorkout) {
          const ew = editingWorkout;
          return (
            <ModalBox onClose={()=>{setModal(null);setEditingWorkout(null);}}>
              <span className="label" style={{fontSize:12,marginBottom:4}}>Edit Workout</span>
              <p className="mono" style={{color:"var(--muted)",fontSize:12,marginBottom:14,letterSpacing:0.5}}>
                {new Date(ew.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
              </p>
              <div style={{maxHeight:"55vh",overflowY:"auto"}}>
                {ew.exercises.map((ex,ei)=>(
                  <div key={ei} className="card" style={{padding:12,marginBottom:8}}>
                    <div style={{marginBottom:6}}>
                      <span className="label" style={{fontSize:9,display:"block",marginBottom:2}}>Exercise Name</span>
                      <input className="input" style={{padding:"7px 10px",fontSize:13}} value={ex.name} onChange={e=>{ const v=e.target.value; setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi===ei?{...x,name:v}:x)})); }}/>
                    </div>
                    {ex.setData?.length>0 ? (
                      <div>
                        <span className="label" style={{fontSize:9,marginBottom:6}}>Sets</span>
                        {ex.setData.map((sd,si)=>(
                          <div key={si} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:8,marginBottom:6,alignItems:"center"}}>
                            <span className="mono" style={{fontSize:10,color:"var(--muted)",minWidth:20}}>S{si+1}</span>
                            <div><span className="label" style={{fontSize:8,marginBottom:2}}>Weight</span><input className="input" style={{padding:"7px 10px",fontSize:13}} type="number" value={sd.weight||""} onChange={e=>{ const val=Number(e.target.value)||0; setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,weight:val})})})); }}/></div>
                            <div><span className="label" style={{fontSize:8,marginBottom:2}}>Reps</span><input className="input" style={{padding:"7px 10px",fontSize:13}} type="number" value={sd.reps||""} onChange={e=>{ const val=Number(e.target.value)||0; setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,reps:val})})})); }}/></div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                        {[["Weight","weight"],["Reps","reps"],["Sets","sets"]].map(([lbl,key])=>(
                          <div key={key}><span className="label" style={{fontSize:9}}>{lbl}</span><input className="input" style={{padding:"8px 10px",fontSize:13}} type="number" value={ex[key]||""} onChange={e=>{ const val=e.target.value; setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi===ei?{...x,[key]:val}:x)})); }}/></div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
                <div className="card" style={{padding:12,marginBottom:8,background:"rgba(74,108,140,0.08)",border:"1px solid rgba(74,108,140,0.3)"}}>
                  <span className="label" style={{fontSize:9,color:"var(--blue2)",marginBottom:10}}>+ Add Exercise to This Workout</span>
                  <div style={{maxHeight:200,overflowY:"auto"}}>
                    {CATEGORIES.map(cat=>{
                      const existingIds = ew.exercises.map(e=>e.id||"");
                      const ces = allExercises.filter(e=>e.category===cat&&!existingIds.includes(e.id));
                      if (!ces.length) return null;
                      return (
                        <div key={cat} style={{marginBottom:10}}>
                          <span className="label" style={{fontSize:8,marginBottom:4}}>{cat}</span>
                          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                            {ces.map(ex=>(
                              <button key={ex.id} onClick={()=>{ const dw=ex.defaultWeight||0; setEditingWorkout(prev=>({...prev,exercises:[...prev.exercises,{id:ex.id,name:ex.name,category:ex.category,weight:dw,unit:ex.unit||"lbs",sets:3,reps:10,setData:[{weight:dw,reps:10},{weight:dw,reps:10},{weight:dw,reps:10}]}]})); showToast(ex.name+" added"); }} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:5,padding:"5px 9px",color:"var(--cream2)",fontSize:12,cursor:"pointer"}}>
                                {ex.name}{ex.custom?" ★":""}
                              </button>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
              <button className="btn" style={{marginTop:12}} onClick={async()=>{
                const updated = {...ew,exercises:ew.exercises.map(ex=>({...ex,weight:ex.setData?Number(ex.setData[0]?.weight)||0:Number(ex.weight)||0,reps:ex.setData?Number(ex.setData[0]?.reps)||0:Number(ex.reps)||0,sets:ex.setData?ex.setData.length:Number(ex.sets)||1}))};
                await updateWorkoutRecord(updated); setModal(null); setEditingWorkout(null); showToast("Workout updated!");
              }}>Save Changes</button>
            </ModalBox>
          );
        }

        if (modal==="addToTemplate"&&summaryData) {
          const tmpl = WORKOUT_TEMPLATES.find(t=>t.id===summaryData.templateId);
          const addedExs = summaryData.midWorkoutAddedExIds.map(id=>allExercises.find(e=>e.id===id)).filter(Boolean);
          if (!addedExs.length||!tmpl) return null;
          return (
            <ModalBox onClose={()=>setModal(null)}>
              <div style={{fontSize:30,textAlign:"center",marginBottom:8}}>🗂️</div>
              <div className="display" style={{fontSize:20,color:"var(--gold)",textAlign:"center",marginBottom:6}}>Keep These?</div>
              <p style={{color:"var(--muted)",fontSize:13,marginBottom:18,lineHeight:1.5,textAlign:"center"}}>Add {addedExs.length} exercise{addedExs.length>1?"s":""} to your <strong style={{color:"var(--cream)"}}>{tmpl.label}</strong> template?</p>
              {addedExs.map(ex=><div key={ex.id} className="card" style={{padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:600,color:"var(--cream)"}}>{ex.name}</div><div className="mono" style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{ex.category} · {ex.equipmentType||"machine"}</div></div><span className="tag" style={{fontSize:8}}>New</span></div>)}
              <button className="btn" style={{marginTop:12}} onClick={()=>{ const extras=profile?.templateExtras||{},existing=extras[tmpl.id]||[]; saveProfile({...profile,templateExtras:{...extras,[tmpl.id]:[...new Set([...existing,...summaryData.midWorkoutAddedExIds])]}}); setModal(null); showToast("Added to "+tmpl.label+"!"); }}>Yes, Add to {tmpl.label}</button>
              <button className="btn-outline" style={{width:"100%",marginTop:8,textAlign:"center"}} onClick={()=>setModal(null)}>No, Just This Once</button>
            </ModalBox>
          );
        }

        return null;
      };

      // ── Loading / Sign-in screens ──
      if (authUser===undefined||dataLoading) return (
        <div className="app" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",position:"relative",zIndex:2}}>
            <div className="display" style={{fontSize:28,color:"var(--gold)",letterSpacing:2,marginBottom:10}}>IRONFORM</div>
            <div className="mono" style={{fontSize:10,color:"var(--muted)",letterSpacing:4}}>LOADING...</div>
          </div>
        </div>
      );

      if (!authUser) return (
        <div className="app" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:400,padding:"0 28px",textAlign:"center"}}>
            <div style={{display:"inline-block",border:"2px solid var(--gold)",borderRadius:"50%",width:100,height:100,lineHeight:"96px",fontSize:36,marginBottom:24,color:"var(--gold)",background:"var(--surface)"}}>🏋️</div>
            <div className="display" style={{fontSize:38,fontWeight:900,color:"var(--gold)",letterSpacing:2,marginBottom:4}}>IRONFORM</div>
            <div className="mono" style={{fontSize:10,letterSpacing:4,color:"var(--muted)",marginBottom:32,textTransform:"uppercase"}}>Personal Strength Journal</div>
            <div style={{width:60,height:1,background:"var(--border2)",margin:"0 auto 32px"}}/>
            <button onClick={handleSignIn} disabled={signingIn} style={{background:"var(--cream)",color:"var(--bg)",border:"none",borderRadius:8,padding:"15px 20px",fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:signingIn?0.7:1,textTransform:"uppercase"}}>
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              {signingIn?"Signing in...":"Sign in with Google"}
            </button>
            {signInErr&&<div style={{marginTop:14,color:"var(--brick2)",fontSize:13,fontFamily:"'DM Mono',monospace"}}>{signInErr}</div>}
          </div>
        </div>
      );

      // ── Preset Preview ──
      if (screen==="preset_preview"&&activeTmpl) {
        const tmpl=activeTmpl, profileExtras=profile?.templateExtras?.[tmpl.id]||[];
        const baseIds=[...new Set([...tmpl.exercises,...profileExtras,...extraExIds])].filter(id=>!removedExIds.includes(id));
        const allIds=(previewOrder||baseIds).filter(id=>baseIds.includes(id));
        const moveEx=(idx,dir)=>{ const arr=[...allIds],ni=idx+dir; if(ni<0||ni>=arr.length)return; [arr[idx],arr[ni]]=[arr[ni],arr[idx]]; setPreviewOrder(arr); };
        return (
          <div className="app">{renderModal()}{Toast}
            <div className="content">
              <div className="header"><div className="logo">IRONFORM</div><span className="tag" style={{background:tmpl.accentDim,border:`1px solid ${tmpl.accentBorder}`,color:tmpl.accent}}>{tmpl.emoji} {tmpl.label}</span></div>
              <BackBtn onClick={()=>{setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setPreviewOrder(null);setScreen("home");}}/>
              <h2 className="display" style={{fontSize:26,color:"var(--cream)",marginBottom:16}}>{tmpl.label}</h2>
              <IntensityModePicker value={intensityMode} onChange={setIntensityMode} sets={previewSets} onSetsChange={setPreviewSets} reps={previewReps} onRepsChange={setPreviewReps}/>
              <span className="label">Exercises ({allIds.length})</span>
              {allIds.map((exId,idx)=>{
                const def=allExercises.find(e=>e.id===exId); if(!def) return null;
                const weight=computeWeightForEx(exId,def,intensityMode);
                const isExtra=extraExIds.includes(exId)||(profile?.templateExtras?.[tmpl.id]||[]).includes(exId);
                return (
                  <div key={exId} className="card" style={{marginBottom:8,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:15,color:"var(--cream)",display:"flex",alignItems:"center",gap:8}}>
                          {def.name}
                          {isExtra&&<span className="tag" style={{fontSize:8,padding:"2px 6px",color:"var(--blue2)",background:"rgba(74,108,140,0.15)",border:"1px solid rgba(74,108,140,0.35)"}}>Added</span>}
                        </div>
                        <div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:3}}>
                          {def.unit==="reps"?"Bodyweight":`${weight} ${def.unit}`}
                          {intensityMode!=="custom"&&INTENSITY_MODES[intensityMode].pct&&getEffective1RM(oneRepMaxes,workouts,exId)&&<span style={{color:"var(--gold2)",marginLeft:4}}>· {Math.round(INTENSITY_MODES[intensityMode].pct*100)}% 1RM</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0,marginLeft:8}}>
                        <div style={{display:"flex",flexDirection:"column",gap:2}}>
                          <button onClick={()=>moveEx(idx,-1)} disabled={idx===0} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:4,width:22,height:18,fontSize:9,cursor:idx===0?"default":"pointer",color:idx===0?"var(--border)":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▲</button>
                          <button onClick={()=>moveEx(idx,1)} disabled={idx===allIds.length-1} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:4,width:22,height:18,fontSize:9,cursor:idx===allIds.length-1?"default":"pointer",color:idx===allIds.length-1?"var(--border)":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▼</button>
                        </div>
                        <button onClick={()=>{ if(extraExIds.includes(exId)) setExtraExIds(p=>p.filter(id=>id!==exId)); else setRemovedExIds(p=>[...p,exId]); if(previewOrder) setPreviewOrder(p=>p.filter(id=>id!==exId)); }} className="btn-ghost" style={{color:"var(--brick2)",fontSize:20}}>×</button>
                      </div>
                    </div>
                  </div>
                );
              })}
              <button className="btn-outline" style={{width:"100%",marginBottom:10,marginTop:6}} onClick={()=>setModal("browseAdd")}>+ Add Exercise Today</button>
              <button className="btn" onClick={()=>launchWorkout(tmpl,extraExIds,removedExIds,previewSets,previewReps,allIds,intensityMode)}>Begin {tmpl.label}</button>
            </div>
          </div>
        );
      }

      // ── Custom Builder ──
      if (screen==="custom_builder") return (
        <div className="app">{renderModal()}{Toast}
          <div className="content">
            <div className="header"><div className="logo">IRONFORM</div><span className="tag">Custom</span></div>
            <BackBtn onClick={()=>{setCustomExIds([]);setCustomGoal("hypertrophy");setScreen("home");}}/>
            <h2 className="display" style={{fontSize:26,color:"var(--cream)",marginBottom:6}}>Build Your Workout</h2>
            <p style={{color:"var(--muted)",fontSize:14,marginBottom:18,lineHeight:1.5}}>Pick your exercises, then go.</p>
            <IntensityModePicker value={intensityMode} onChange={setIntensityMode} sets={previewSets} onSetsChange={setPreviewSets} reps={previewReps} onRepsChange={setPreviewReps}/>
            {customExIds.length>0&&(
              <div className="card" style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span className="label">{customExIds.length} Selected</span>
                  <button className="btn-ghost" style={{color:"var(--brick2)",fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,textTransform:"uppercase"}} onClick={()=>setCustomExIds([])}>Clear All</button>
                </div>
                {customExIds.map(exId=>{ const def=allExercises.find(e=>e.id===exId); if(!def) return null; return <div key={exId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}><span style={{fontSize:14,color:"var(--cream)"}}>{def.name}</span><button onClick={()=>setCustomExIds(p=>p.filter(id=>id!==exId))} className="btn-ghost" style={{color:"var(--brick2)",fontSize:18}}>×</button></div>; })}
              </div>
            )}
            <div className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span className="label">Browse Exercises</span><button className="btn-sm" onClick={()=>{setActiveTmpl(null);setModal("browseAdd");}}>+ Add</button></div>
              {CATEGORIES.map(cat=>{ const ces=allExercises.filter(e=>e.category===cat&&!customExIds.includes(e.id)); if(!ces.length) return null; return <div key={cat} style={{marginBottom:13}}><span className="label" style={{fontSize:9}}>{cat}</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ces.map(ex=><button key={ex.id} onClick={()=>setCustomExIds(p=>[...p,ex.id])} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 11px",color:"var(--cream2)",fontSize:13,cursor:"pointer"}}>{ex.name}{ex.custom?" ★":""}</button>)}</div></div>; })}
            </div>
            <button className="btn" style={{opacity:customExIds.length<1?0.4:1}} onClick={()=>customExIds.length>=1&&launchCustomWorkout()}>Begin Workout ({customExIds.length} exercise{customExIds.length!==1?"s":""})</button>
          </div>
        </div>
      );

      // ── Active Workout ──
      if (screen==="workout"&&activeWorkout) {
        const exercises=activeWorkout.exercises, ex=exercises[currentExIdx];
        const done=setsForEx(ex), allDone=done.every(Boolean);
        const remainingDeferred=deferredExIds.filter(id=>id!==ex.id);
        const hasMoreAhead=exercises.slice(currentExIdx+1).some(e=>!deferredExIds.includes(e.id));
        const isLast=!hasMoreAhead&&remainingDeferred.length===0;
        const progress=totalSets>0?totalDone/totalSets:0;
        const setRepsArr=activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
        const bigInc=ex.bigIncrement||getBigInc(ex);
        const isBarbell=ex.equipmentType==="barbell", barbellW=ex.barbellWeight||45;
        const orm=getEffective1RM(oneRepMaxes,workouts,ex.id);
        const historyForEx=(()=>{
          let lastSession=null, personalBest=null, pbWeight=0;
          workouts.forEach(w=>{ const e=w.exercises?.find(x=>x.id===ex.id); if(!e) return; const w1=e.setData?.length>0?Math.max(...e.setData.map(s=>s.weight||0)):e.weight||0; if(w1>pbWeight){pbWeight=w1;personalBest={date:w.date,weight:w1,reps:e.reps||0,setData:e.setData};} lastSession={date:w.date,weight:e.weight,reps:e.reps,setData:e.setData}; });
          return {lastSession,personalBest};
        })();

        const deferCurrentEx = () => {
          const newDeferred = deferredExIds.includes(ex.id) ? deferredExIds : [...deferredExIds,ex.id];
          setDeferredExIds(newDeferred);
          let nextIdx=-1; for(let i=currentExIdx+1;i<exercises.length;i++){if(!newDeferred.includes(exercises[i].id)){nextIdx=i;break;}}
          if (nextIdx>=0) setCurrentExIdx(nextIdx);
        };
        const circleBackToDeferred = () => { if(!remainingDeferred.length) return; const firstId=remainingDeferred[0],idx=exercises.findIndex(e=>e.id===firstId); setDeferredExIds(p=>p.filter(id=>id!==firstId)); if(idx>=0) setCurrentExIdx(idx); };
        const skipToNext = () => { const ni=currentExIdx+1; if(ni<exercises.length) setCurrentExIdx(ni); else if(remainingDeferred.length>0) circleBackToDeferred(); };

        return (
          <div className="app">
            {Toast}{RestModal}
            {cancelConfirm&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
                <div style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:16,width:"100%",maxWidth:360,padding:"32px 24px",textAlign:"center"}}>
                  <div style={{fontSize:36,marginBottom:12}}>🛑</div>
                  <div className="display" style={{fontSize:22,fontWeight:900,color:"var(--cream)",marginBottom:8}}>Quit Workout?</div>
                  <div className="mono" style={{fontSize:11,color:"var(--muted)",letterSpacing:1,lineHeight:1.6,marginBottom:28}}>{totalDone>0?`You've completed ${totalDone} set${totalDone!==1?"s":""} so far. Your progress will not be saved.`:"Your progress will not be saved."}</div>
                  <button onClick={confirmCancelWorkout} style={{background:"rgba(196,75,43,0.15)",color:"var(--brick2)",border:"1px solid rgba(196,75,43,0.5)",borderRadius:8,padding:"14px",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:600,marginBottom:10}}>Yes, Quit</button>
                  <button onClick={()=>setCancelConfirm(false)} style={{background:"var(--gold)",color:"var(--bg)",border:"none",borderRadius:8,padding:"14px",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:600}}>Keep Going 💪</button>
                </div>
              </div>
            )}
            {workoutAddModal&&<MidWorkoutAddModal allExercises={allExercises} activeWorkout={activeWorkout} onAdd={addExToActiveWorkout} onClose={()=>setWorkoutAddModal(false)}/>}
            <div className="content">
              <div className="header">
                <div className="logo">IRONFORM</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={()=>setWorkoutAddModal(true)} style={{background:"rgba(200,146,42,0.12)",border:"1px solid rgba(200,146,42,0.35)",borderRadius:6,padding:"7px 10px",color:"var(--gold2)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1}}>+ Ex</button>
                  <button className="btn-danger" onClick={()=>setCancelConfirm(true)}>Cancel</button>
                </div>
              </div>

              <div style={{marginBottom:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span className="label" style={{marginBottom:0}}>{activeWorkout.templateLabel} · {currentExIdx+1} of {exercises.length}</span>
                  <span className="mono" style={{fontSize:11,color:"var(--gold)"}}>{totalDone}/{totalSets} sets</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${progress*100}%`}}/></div>
                <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
                  {exercises.map((e,i)=>{ const exDone=setsForEx(e).every(Boolean),isCurrent=i===currentExIdx,isDeferred=deferredExIds.includes(e.id); return <button key={i} onClick={()=>setCurrentExIdx(i)} style={{width:isCurrent?24:8,height:8,borderRadius:4,border:"none",cursor:"pointer",background:isCurrent?"var(--gold)":exDone?"rgba(200,146,42,0.5)":isDeferred?"rgba(196,75,43,0.6)":"var(--surface2)",transition:"all 0.2s",padding:0,flexShrink:0}}/>; })}
                  {deferredExIds.length>0&&<span className="mono" style={{fontSize:8,color:"var(--brick2)",letterSpacing:1,textTransform:"uppercase",alignSelf:"center",marginLeft:2}}>{deferredExIds.length} to revisit</span>}
                </div>
              </div>

              <div className="card" style={{padding:16,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="display" style={{fontWeight:700,fontSize:22,lineHeight:1.2,color:"var(--cream)"}}>{ex.name}</div>
                    <div className="mono" style={{color:"var(--muted)",fontSize:10,marginTop:2,letterSpacing:0.5,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      <span>{ex.sets} sets</span>

                {inlineGoal===ex.id&&(

                    <button onClick={async()=>{ if(!inlineGoalVal||isNaN(Number(inlineGoalVal))) return; await doAddLiftGoal({exId:ex.id,targetWeight:Number(inlineGoalVal),created:new Date().toISOString()}); setInlineGoal(null); setInlineGoalVal(""); showToast("Goal set!"); }} style={{background:"var(--green2)",border:"none",borderRadius:6,padding:"7px 12px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap"}}>Set ✓</button>
                    <button onClick={()=>setInlineGoal(null)} className="btn-ghost" style={{fontSize:18,lineHeight:1}}>×</button>
                  </div>
