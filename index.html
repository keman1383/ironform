    function safeProgressWeight(current, goal, weeksSince, unit) {
      if (goal==="maintain") return current;
      const factor=Math.pow(GOALS[goal].increment, weeksSince||1);
      const proposed=Math.round((current*factor)/2.5)*2.5;
      const maxInc=({lbs:10,reps:2}[unit]||5)*(weeksSince||1);
      return Math.min(proposed, current+maxInc);
    }

    function projectGoalDate(history, targetWeight) {
      if (history.length < 2) return null;
      const t0 = new Date(history[0].date).getTime();
      const xs = history.map(h=>(new Date(h.date).getTime()-t0)/86400000);
      const ys = history.map(h=>h.weight);
      const n  = xs.length;
      const sx = xs.reduce((a,x)=>a+x,0);
      const sy = ys.reduce((a,y)=>a+y,0);
      const sxy= xs.reduce((a,x,i)=>a+x*ys[i],0);
      const sxx= xs.reduce((a,x)=>a+x*x,0);
      const denom = n*sxx - sx*sx;
      if (Math.abs(denom)<0.001) return null;
      const slope = (n*sxy - sx*sy)/denom;
      if (slope<=0) return null;
      const intercept = (sy - slope*sx)/n;
      const daysNeeded = (targetWeight - intercept)/slope;
      const targetDate = new Date(t0 + daysNeeded*86400000);
      if (targetDate < new Date()) return "already achieved!";
      return targetDate;
    }

    // ── 1RM HELPERS ───────────────────────────────────────────────
    // Epley formula: weight * (1 + reps/30), using most recent set with 6+ reps
    function calcEpley1RM(workoutsArr, exId) {
      for(let i=workoutsArr.length-1;i>=0;i--) {
        const ex=workoutsArr[i].exercises?.find(e=>e.id===exId);
        if(!ex) continue;
        // Check setData first
        if(ex.setData&&ex.setData.length>0) {
          const valid=ex.setData.filter(s=>s.reps>=6&&s.weight>0);
          if(valid.length>0) {
            const best=valid.reduce((a,b)=>b.weight>a.weight?b:a);
            return Math.round(best.weight*(1+best.reps/30)*10)/10;
          }
        } else if(ex.reps>=6&&ex.weight>0) {
          return Math.round(ex.weight*(1+ex.reps/30)*10)/10;
        }
      }
      return null;
    }

    // Returns effective 1RM: stored if within 15 days, else calculated
    function getEffective1RM(oneRepMaxes, workoutsArr, exId) {
      const stored=oneRepMaxes.find(r=>r.exId===exId);
      if(stored) {
        const daysSince=(Date.now()-new Date(stored.updatedAt))/86400000;
        if(daysSince<=15) return {value:stored.weight,source:"stored"};
      }
      const calc=calcEpley1RM(workoutsArr, exId);
      if(calc) return {value:calc,source:"calculated"};
      return null;
    }

    // ── AUDIO + HAPTIC ALERTS ─────────────────────────────────────
    // ── AUDIO ALERTS ─────────────────────────────────────────────
    // iOS Safari requires AudioContext to be created AND sound scheduled
    // in the same synchronous user-gesture call stack. We cannot play tones
    // from setInterval. Instead we pre-schedule tones at workout start and
    // use a silent unlocking tap to arm the context.
    //
    // Strategy:
    //   1. On first user tap in the workout, create + unlock the AudioContext
    //      and schedule a silent buffer (0.001s) to fully activate it on iOS.
    //   2. playAlertTone() creates a fresh context each call — iOS allows this
    //      as long as it happens within a gesture OR the context was previously
    //      unlocked in this page session.
    //   3. navigator.vibrate is NOT supported on iOS Safari — omitted.

    let _sharedAudioCtx = null;

    function unlockAudio() {
      // Call this from any user tap to prime audio for the session.
      try {
        if (!_sharedAudioCtx) {
          _sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (_sharedAudioCtx.state === "suspended") {
          _sharedAudioCtx.resume();
        }
        // Play a silent buffer — required by iOS to fully unlock the context
        const buf = _sharedAudioCtx.createBuffer(1, 1, 22050);
        const src = _sharedAudioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_sharedAudioCtx.destination);
        src.start(0);
      } catch(e) {}
    }

    function resumeAudioCtx() { unlockAudio(); } // alias used elsewhere

    function playAlertTone(type) {
      try {
        // Use the shared context if available and running, else create new
        let ctx = _sharedAudioCtx;
        if (!ctx || ctx.state === "closed") {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          _sharedAudioCtx = ctx;
        }
        if (ctx.state === "suspended") ctx.resume();
        const now = ctx.currentTime;

        function beep(freq, startOffset, duration, volume) {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.frequency.setValueAtTime(freq, now + startOffset);
          g.gain.setValueAtTime(volume, now + startOffset);
          g.gain.exponentialRampToValueAtTime(0.001, now + startOffset + duration);
          o.start(now + startOffset);
          o.stop(now + startOffset + duration + 0.05);
        }

        if (type === "soft") {
          beep(660, 0,    0.22, 0.3);
          beep(660, 0.32, 0.22, 0.3);
        } else {
          beep(520, 0,    0.20, 0.45);
          beep(660, 0.25, 0.20, 0.45);
          beep(800, 0.50, 0.25, 0.55);
        }
      } catch(e) { console.warn("playAlertTone error:", e); }
    }

    // Confetti component
    function Confetti() {
      const canvasRef=useRef(null);
      useEffect(()=>{
        const canvas=canvasRef.current;
        if(!canvas) return;
        const ctx=canvas.getContext("2d");
        canvas.width=window.innerWidth;
        canvas.height=window.innerHeight;
        const colors=["#c8922a","#e8b84b","#f0e6cc","#4a7c59","#6aa87a","#4a6c8c","#6a90b8","#c44b2b"];
        const particles=Array.from({length:120},()=>({
          x:Math.random()*canvas.width,
          y:-20-Math.random()*100,
          w:8+Math.random()*8,
          h:4+Math.random()*6,
          color:colors[Math.floor(Math.random()*colors.length)],
          rotation:Math.random()*360,
          rotSpeed:(Math.random()-0.5)*8,
          vx:(Math.random()-0.5)*4,
          vy:2+Math.random()*4,
          alpha:1,
        }));
        let raf;
        const draw=()=>{
          ctx.clearRect(0,0,canvas.width,canvas.height);
          let alive=false;
          particles.forEach(p=>{
            p.x+=p.vx; p.y+=p.vy; p.rotation+=p.rotSpeed;
            if(p.y>canvas.height*0.7) p.alpha=Math.max(0,p.alpha-0.02);
            if(p.alpha>0) alive=true;
            ctx.save();
            ctx.globalAlpha=p.alpha;
            ctx.translate(p.x,p.y);
            ctx.rotate(p.rotation*Math.PI/180);
            ctx.fillStyle=p.color;
            ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
          });
          if(alive) raf=requestAnimationFrame(draw);
        };
        draw();
        return()=>cancelAnimationFrame(raf);
      },[]);
      return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:998}}/>;
    }

    // ── INTERACTIVE MINI CHART ─────────────────────────────────────
    function MiniChart({history, targetWeight, width=300, height=120}) {
      const [tooltip, setTooltip] = useState(null);
      if (history.length<1) return <div style={{color:"var(--muted)",fontSize:12,textAlign:"center",padding:20}}>No data yet</div>;
      const t0=new Date(history[0].date).getTime();
      const tNow=Date.now();
      const projDate=history.length>=2?projectGoalDate(history,targetWeight):null;
      const tEnd=projDate&&projDate instanceof Date?Math.max(projDate.getTime(),tNow+7*86400000):tNow+30*86400000;
      const allW=[...history.map(h=>h.weight),targetWeight];
      const minW=Math.min(...allW)*0.95, maxW=Math.max(...allW)*1.02;
      const tx=t=>(t-t0)/(tEnd-t0)*width;
      const ty=w=>height-(w-minW)/(maxW-minW)*height;
      const pts=history.map(h=>`${tx(new Date(h.date).getTime())},${ty(h.weight)}`).join(" ");
      const lastH=history[history.length-1];
      const projLine=projDate&&projDate instanceof Date?
        `M${tx(new Date(lastH.date).getTime())},${ty(lastH.weight)} L${tx(projDate.getTime())},${ty(targetWeight)}`:null;
      return (
        <div style={{position:"relative"}}>
          <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height:height,overflow:"visible"}}>
            <line x1="0" y1={ty(targetWeight)} x2={width} y2={ty(targetWeight)} stroke="var(--green2)" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>
            <text x={width-2} y={ty(targetWeight)-4} textAnchor="end" fontSize="9" fill="var(--green2)" fontFamily="DM Mono,monospace">{targetWeight} lbs</text>
            {history.length>1&&<polyline points={pts} fill="none" stroke="var(--gold)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
            {projLine&&<path d={projLine} fill="none" stroke="var(--gold2)" strokeWidth="1.5" strokeDasharray="5,4" opacity="0.7"/>}
            {history.map((h,i)=>{
              const cx=tx(new Date(h.date).getTime());
              const cy=ty(h.weight);
              return(
                <g key={i} style={{cursor:"pointer"}} onClick={()=>setTooltip(tooltip&&tooltip.i===i?null:{i,date:h.date,weight:h.weight,cx,cy})}>
                  <circle cx={cx} cy={cy} r="8" fill="transparent"/>
                  <circle cx={cx} cy={cy} r={tooltip&&tooltip.i===i?"5":"3.5"} fill={tooltip&&tooltip.i===i?"var(--gold2)":"var(--gold)"} stroke="var(--bg2)" strokeWidth="1.5"/>
                </g>
              );
            })}
            <line x1={tx(tNow)} y1="0" x2={tx(tNow)} y2={height} stroke="var(--cream2)" strokeWidth="0.5" opacity="0.3"/>
          </svg>
          {tooltip&&(
            <div style={{position:"absolute",top:Math.max(0,tooltip.cy-50),left:Math.min(width*0.7,tooltip.cx),background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,padding:"6px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--cream)",zIndex:10,pointerEvents:"none",whiteSpace:"nowrap"}}>
              <div style={{color:"var(--gold)"}}>{tooltip.weight} lbs</div>
              <div style={{color:"var(--muted)"}}>{new Date(tooltip.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
            </div>
          )}
        </div>
      );
    }

    // ── CALENDAR VIEW ─────────────────────────────────────────────
    // calYear/calMonth live in App so month survives re-renders
    function CalendarView({workouts, onSelectDate, selectedDate, calYear, calMonth, setCalYear, setCalMonth}) {
      const workoutDateMap=new Map();
      workouts.forEach(w=>{
        const ds=new Date(w.date).toDateString();
        if(!workoutDateMap.has(ds)) workoutDateMap.set(ds,[]);
        workoutDateMap.get(ds).push(w);
      });
      const firstDay=new Date(calYear,calMonth,1).getDay();
      const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
      const monthName=new Date(calYear,calMonth).toLocaleDateString("en-US",{month:"long",year:"numeric"});
      const cells=[];
      for(let i=0;i<firstDay;i++) cells.push(null);
      for(let d=1;d<=daysInMonth;d++) cells.push(d);
      const prevMonth=()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); };
      const nextMonth=()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); };
      return(
        <div style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={prevMonth} style={{background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:20}}>‹</button>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:2,color:"var(--cream)",textTransform:"uppercase"}}>{monthName}</span>
            <button onClick={nextMonth} style={{background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:20}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,textAlign:"center"}}>
            {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
              <div key={d} style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",paddingBottom:4,letterSpacing:1}}>{d}</div>
            ))}
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const dateStr=new Date(calYear,calMonth,d).toDateString();
              const hasWorkout=workoutDateMap.has(dateStr);
              const isToday=new Date().toDateString()===dateStr;
              const isSelected=selectedDate===dateStr;
              return(
                <div key={i} onClick={()=>hasWorkout&&onSelectDate(isSelected?null:dateStr)} style={{
                  borderRadius:6,padding:"6px 2px",cursor:hasWorkout?"pointer":"default",
                  background:isSelected?"rgba(200,146,42,0.45)":hasWorkout?"rgba(200,146,42,0.25)":isToday?"rgba(200,146,42,0.06)":"transparent",
                  border:isSelected?"1px solid var(--gold)":isToday?"1px solid rgba(200,146,42,0.4)":"1px solid transparent",
                  fontFamily:"'DM Mono',monospace",fontSize:12,
                  color:isSelected?"var(--gold)":hasWorkout?"var(--gold)":isToday?"var(--cream2)":"var(--muted)",
                  fontWeight:hasWorkout?"600":"400",
                  position:"relative",
                }}>
                  {d}
                  {hasWorkout&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:2,background:"var(--gold)"}}/>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

      const [swapModal,     setSwapModal]     = useState(null);  // exId being swapped
      const [equipModal,    setEquipModal]    = useState(null);  // exId being edited
      const [draftEquip,    setDraftEquip]    = useState({});    // {equipmentType, barbellWeight}

          setWorkouts(wkts); setCustomExs(cexs); setLiftGoals(lgs); setOneRepMaxes(orms||[]);
        } catch(e){console.error(e);}
        setDataLoading(false);
      };

      useEffect(()=>{
        if(authUser&&!dataLoading&&profile===null){
          const p={goal:"hypertrophy",exercises:[],created:new Date().toISOString(),uid:authUser.uid};
          saveProfile(p);
        }
      },[authUser,dataLoading,profile]);

      const handleSignIn = async () => {
        setSignInErr(null); setSigningIn(true);
        try{await auth.signInWithPopup(gProvider);}
        catch(e){
          setSigningIn(false);
          if(e.code!=="auth/popup-closed-by-user"&&e.code!=="auth/cancelled-popup-request")
            setSignInErr("Sign-in failed: "+(e.message||e.code));
        }
      };

      const handleSignOut = async () => { await auth.signOut(); setProfileS(null);setWorkouts([]);setCustomExs([]);setLiftGoals([]);setOneRepMaxes([]);setScreen("home"); };

      const showToast=(msg)=>{setToast(msg);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(null),3000);};

      const saveProfile = async(p)=>{setProfileS(p);if(authUser)await fbSetProfile(authUser.uid,p);};
      const addWorkoutRecord = async(w)=>{if(authUser){const id=await fbAddWorkout(authUser.uid,w);w={...w,_id:id};}setWorkouts(prev=>[...prev,w].sort((a,b)=>new Date(a.date)-new Date(b.date)));};
      const updateWorkoutRecord = async(w)=>{if(authUser&&w._id)await fbUpdateWorkout(authUser.uid,w._id,w);setWorkouts(prev=>prev.map(x=>x._id===w._id?w:x));};
      const doAddCustomEx = async(ex)=>{if(authUser){const fid=await fbAddCustomEx(authUser.uid,ex);ex={...ex,_fid:fid};}setCustomExs(prev=>[...prev,ex]);return ex;};
      const doUpdateCustomEx = async(fid,data)=>{if(authUser&&fid)await fbUpdateCustomEx(authUser.uid,fid,data);setCustomExs(prev=>prev.map(e=>e._fid===fid?{...e,...data}:e));};
      const doAddLiftGoal = async(g)=>{if(authUser){const id=await fbAddLiftGoal(authUser.uid,g);g={...g,_id:id};}setLiftGoals(prev=>[...prev,g]);};
      const doDelLiftGoal = async(id)=>{if(authUser)await fbDelLiftGoal(authUser.uid,id);setLiftGoals(prev=>prev.filter(g=>g._id!==id));};
      const doSave1RM = async(exId,weight)=>{
        if(authUser) await fbSet1RM(authUser.uid,exId,weight);
        setOneRepMaxes(prev=>{
          const filtered=prev.filter(r=>r.exId!==exId);
          return [...filtered,{exId,weight,updatedAt:new Date().toISOString()}];
        });
      };
      const doDel1RM = async(exId)=>{
        if(authUser) await fbDel1RM(authUser.uid,exId);
        setOneRepMaxes(prev=>prev.filter(r=>r.exId!==exId));
      };

      // ── WORKOUT LOGIC ────────────────────────────────────────
      const getLastForExercise=(exId)=>{
        for(let i=workouts.length-1;i>=0;i--){
          const ex=workouts[i].exercises?.find(e=>e.id===exId);
          if(ex) return{workout:workouts[i],exercise:ex};
        }
        return null;
      };

      // Returns days since an exercise was last done, or null if never
      const daysSinceExercise=(exId)=>{
        const last=getLastForExercise(exId);
        if(!last) return null;
        return (Date.now()-new Date(last.workout.date))/86400000;
      };

      const buildExerciseList=(exIdList,sets,reps)=>{
        const goal=profile?.goal||"hypertrophy";
        return exIdList.map(exId=>{
          const def=allExercises.find(e=>e.id===exId);
          if(!def) return null;
          const last=getLastForExercise(exId);
          let weight=def.defaultWeight;
          if(last){
            const days=(Date.now()-new Date(last.workout.date))/86400000;
            const weeks=Math.max(1,Math.round(days/7));
            if(def.equipmentType==="assisted"){
              // Assisted: decreasing weight = more assistance = easier. Progress = decrease weight.
              const progressed=safeProgressWeight(last.exercise.weight,goal,weeks,def.unit);
              // For assisted, lower weight = harder (less assistance). So we INCREASE weight (more assistance) when going down.
              // Actually user wants: "reverse next weight calc to decrease weight rather than add weight"
              // Meaning: normally we'd suggest increasing weight. For assisted, suggest decreasing instead.
              const delta=progressed-last.exercise.weight;
              weight=Math.max(0,last.exercise.weight-Math.abs(delta));
            } else {
              weight=safeProgressWeight(last.exercise.weight,goal,weeks,def.unit);
            }
          }
          const bigInc=getBigIncrement(def);
          return{id:exId,name:def.name,category:def.category,weight,unit:def.unit,sets,reps,increment:def.increment,bigIncrement:bigInc,equipmentType:def.equipmentType||"machine",barbellWeight:def.barbellWeight||null};
        }).filter(Boolean);
      };

      const buildSetReps=(sets,reps,scheme)=>{
        if(scheme==="dropset") return Array.from({length:sets},(_,i)=>Math.max(1,reps-i*2));
        if(scheme==="pyramid"){
          const half=Math.floor(sets/2);
          return Array.from({length:sets},(_,i)=>i<=half?reps+i*2:reps+(sets-1-i)*2);
        }
        return Array.from({length:sets},()=>reps);
      };

      const launchWorkout=(tmpl,extras,removed,sets,reps,perExSchemes)=>{
        const allIds=[...tmpl.exercises,...extras].filter(id=>!removed.includes(id));
        const exercises=buildExerciseList(allIds,sets,reps);
        const setRepsMap={};
        exercises.forEach(ex=>{
          const scheme=perExSchemes?.[ex.id]||"standard";
          setRepsMap[ex.id]=buildSetReps(sets,reps,scheme);
        });
        setActiveWorkout({date:new Date().toISOString(),exercises,completed:false,templateLabel:tmpl.label,setRepsMap,perExSchemes:perExSchemes||{}});
        setCurrentExIdx(0);setCompletedSets({});setPerSetData({});setNoteFor({});setSummaryData(null);
        setScreen("workout");
      };

      const launchCustomWorkout=()=>{
        const sr=GOAL_SETS[customGoal];
        const exercises=buildExerciseList(customExIds,sr.sets,sr.reps);
        const setRepsMap={};
        exercises.forEach(ex=>{ setRepsMap[ex.id]=buildSetReps(sr.sets,sr.reps,"standard"); });
        setActiveWorkout({date:new Date().toISOString(),exercises,completed:false,templateLabel:"Custom",setRepsMap,perExSchemes:{}});
        setCurrentExIdx(0);setCompletedSets({});setPerSetData({});setNoteFor({});setSummaryData(null);
        setScreen("workout");
      };

      // ── FINISH WORKOUT — saves per-set data to each exercise ──
      const finishWorkoutWithState=async(completedSetsState)=>{
        const cs=completedSetsState||completedSets;
        const exercisesWithSetData=activeWorkout.exercises.map(ex=>{
          const setRepsArr=activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
          const setData=Array.from({length:ex.sets},(_,i)=>{
            const key=`${ex.id}_${i}`;
            return{
              weight: perSetData[key]?.weight ?? ex.weight,
              reps:   perSetData[key]?.reps   ?? setRepsArr[i],
            };
          });
          return{...ex, setData, note:noteFor[ex.id]||""};
        });

        const w={...activeWorkout, exercises:exercisesWithSetData, completed:true};
        await addWorkoutRecord(w);

        const summary={
          templateLabel:w.templateLabel,
          date:w.date,
          exercises:exercisesWithSetData.map(ex=>{
            const doneSets=Array.from({length:ex.sets},(_,i)=>!!cs[`${ex.id}_${i}`]);
            const completed=doneSets.filter(Boolean).length;
            const last=getLastForExercise(ex.id);
            const improved=last&&ex.weight>last.exercise.weight;
            const matchedGoals=liftGoals.filter(g=>g.exId===ex.id&&ex.weight>=g.targetWeight);
            return{...ex,completedSets:completed,totalSets:ex.sets,improved,matchedGoals};
          }),
        };
        setSummaryData(summary);
        clearInterval(restIntervalRef.current);
        setRestTimer(null);
        setActiveWorkout(null);setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setExRepSchemes({});
        setScreen("summary");
      };

      const finishWorkout=async()=>finishWorkoutWithState(completedSets);

      const cancelWorkout=()=>{
        clearInterval(restIntervalRef.current);
        setRestTimer(null);
        setActiveWorkout(null);setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setExRepSchemes({});
        setScreen("home");
      };

      // ── REST TIMER ────────────────────────────────────────────
      const startRestTimer=()=>{
        // Unlock + prime AudioContext from within the user gesture call stack.
        // Then pre-schedule both tones on the AudioContext clock so iOS will
        // play them without needing another gesture when the interval fires.
        unlockAudio();
        try {
          const ctx = _sharedAudioCtx;
          if (ctx && ctx.state !== "closed") {
            const now = ctx.currentTime;
            function schedBeep(freq, offset, duration, volume) {
              const o = ctx.createOscillator();
              const g = ctx.createGain();
              o.connect(g); g.connect(ctx.destination);
              o.frequency.setValueAtTime(freq, now + offset);
              g.gain.setValueAtTime(volume, now + offset);
              g.gain.exponentialRampToValueAtTime(0.001, now + offset + duration);
              o.start(now + offset);
              o.stop(now + offset + duration + 0.05);
            }
            // 30s warning tone (fires at t+30s)
            schedBeep(660, 30,     0.22, 0.3);
            schedBeep(660, 30.32,  0.22, 0.3);
            // End tone (fires at t+60s)
            schedBeep(520, 60,     0.20, 0.45);
            schedBeep(660, 60.25,  0.20, 0.45);
            schedBeep(800, 60.50,  0.25, 0.55);
          }
        } catch(e) { console.warn("schedBeep error:", e); }

        clearInterval(restIntervalRef.current);
        setRestTimer(60);
        restIntervalRef.current=setInterval(()=>{
          setRestTimer(prev=>{
            if(prev===null){clearInterval(restIntervalRef.current);return null;}
            if(prev<=1){clearInterval(restIntervalRef.current);return 0;}
            return prev-1;
          });
        },1000);
      };

      const toggleSet=(exId,i)=>{
        setCompletedSets(p=>{
          const key=`${exId}_${i}`;
          const wasCompleted=!!p[key];
          const newState={...p,[key]:!wasCompleted};
          if(!wasCompleted){
            resumeAudioCtx(); // keep context warm on every set tap

              Array.from({length:ex.sets},(_,si)=>({exId:ex.id,setIdx:si,key:`${ex.id}_${si}`}))
            );
            const remaining=allSets.filter(s=>!newState[s.key]);
            if(remaining.length===0){
              // Last set of entire workout — skip timer, finish
              clearInterval(restIntervalRef.current);
              setRestTimer(null);
              setTimeout(()=>finishWorkoutWithState(newState),100);
            } else {
              // Check if all sets of the CURRENT exercise are now done
              const currentEx=activeWorkout.exercises[currentExIdx];
              const currentExSets=Array.from({length:currentEx.sets},(_,si)=>newState[`${currentEx.id}_${si}`]);
              const currentExAllDone=currentExSets.every(Boolean);
              if(currentExAllDone && exId===currentEx.id){

                clearInterval(restIntervalRef.current);

                const nextIdx=currentExIdx+1;
                if(nextIdx<activeWorkout.exercises.length){

              } else {

            }
          }
          return newState;
        });

      const adjustWeight=(exId,delta)=>setActiveWorkout(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,weight:Math.max(0,+(e.weight+delta).toFixed(2))}:e)}));

        const key=`${exId}_${setIdx}`;
        setPerSetData(p=>{
          const ex=activeWorkout.exercises.find(e=>e.id===exId);
          const current=p[key]?.weight ?? ex.weight;
          return {...p,[key]:{...p[key],weight:Math.max(0,+(current+delta).toFixed(2))}};
        });

      // Global weight adjuster — only affect sets not yet completed
      const adjustWeightGlobal=(exId,delta)=>{

          const suggested=BUILTIN_EXERCISES.filter(ex=>{
            if(activeIds.includes(ex.id)) return false;
            const days=daysSinceExercise(ex.id);
            return days!==null && days>=7;
          }).slice(0,6);

          return(
            <Modal onClose={()=>setModal(null)}>
              <span style={{...s.label,fontSize:12,marginBottom:16}}>Add Exercise</span>

              {/* Suggestions section */}
              {suggested.length>0&&(
                <div style={{marginBottom:18}}>
                  <span style={{...s.label,fontSize:9,color:"var(--gold)",marginBottom:8}}>💡 Not done in 7+ days</span>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {suggested.map(ex=>(
                      <button key={ex.id} onClick={()=>{
                        if(activeTmpl) setExtraExIds(p=>[...p,ex.id]);
                        else setCustomExIds(p=>[...p,ex.id]);
                        setModal(null);showToast(ex.name+" added!");
                      }} style={{background:"rgba(200,146,42,0.12)",border:"1px solid rgba(200,146,42,0.4)",borderRadius:6,padding:"7px 11px",color:"var(--gold2)",fontSize:13,cursor:"pointer"}}>
                        {ex.name}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div style={{maxHeight:"50vh",overflowY:"auto",marginBottom:12}}>
                {CATEGORIES.map(cat=>{
                  const ces=available.filter(e=>e.category===cat);
                  if(!ces.length) return null;
                  return(
                    <div key={cat} style={{marginBottom:14}}>
                      <span style={{...s.label,fontSize:9}}>{cat}</span>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {ces.map(ex=>(
                          <button key={ex.id} onClick={()=>{
                            if(activeTmpl) setExtraExIds(p=>[...p,ex.id]);
                            else setCustomExIds(p=>[...p,ex.id]);
                            setModal(null);showToast(ex.name+" added!");
                          }} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 11px",color:"var(--cream2)",fontSize:13,cursor:"pointer"}}>
                            {ex.name}{ex.custom?" ★":""}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
              <button style={{...s.btnOutline,width:"100%",fontSize:11}} onClick={()=>setModal("createAndAdd")}>+ Create New Exercise</button>
            </Modal>
          );
        }

        if(modal==="createAndAdd") return(
          <ModalStrict onClose={()=>setModal(null)}>
            <span style={{...s.label,fontSize:12,marginBottom:16}}>Create & Add Exercise</span>
            <ExerciseFormFields/>
            <button style={{...s.btn,marginTop:12}} onClick={()=>saveNewExercise(true)}>Create & Add</button>
          </ModalStrict>
        );
        if(modal==="addExercise") return(
          <ModalStrict onClose={()=>setModal(null)}>
            <span style={{...s.label,fontSize:12,marginBottom:16}}>Add Custom Exercise</span>
            <ExerciseFormFields/>
            <button style={{...s.btn,marginTop:12}} onClick={()=>saveNewExercise(false)}>Add Exercise</button>
          </ModalStrict>
        );
        if(modal==="addLiftGoal") return(
          <Modal onClose={()=>setModal(null)}>
            <span style={{...s.label,fontSize:12,marginBottom:4}}>Set a Lift Goal</span>
            <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Choose an exercise and a target weight. IRONFORM will chart your progress and project when you'll get there.</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <span style={s.label}>Exercise</span>
                <select style={s.select} value={newLiftGoal.exId} onChange={e=>setNewLiftGoal(p=>({...p,exId:e.target.value}))}>
                  <option value="">Select exercise...</option>
                  {CATEGORIES.map(cat=>{const ces=allExercises.filter(e=>e.category===cat);if(!ces.length)return null;return(<optgroup key={cat} label={cat}>{ces.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}</optgroup>);})}
                </select>
              </div>
              <div>
                <span style={s.label}>Target Weight (lbs)</span>
                <input style={s.input} type="number" placeholder="e.g. 135" value={newLiftGoal.targetWeight} onChange={e=>setNewLiftGoal(p=>({...p,targetWeight:e.target.value}))}/>
              </div>
            </div>
            <button style={{...s.btn,marginTop:16}} onClick={saveNewLiftGoal}>Set Goal</button>
          </Modal>
        );

        if(modal==="logPastWorkout") return(
          <ModalStrict onClose={()=>setModal(null)}>
            <span style={{...s.label,fontSize:12,marginBottom:4}}>Log Past Workout</span>
            <p style={{color:"var(--muted)",fontSize:13,marginBottom:16,lineHeight:1.5}}>Enter a previous session to calibrate your weight projections.</p>
            <div style={{marginBottom:16}}>
              <span style={s.label}>Date</span>
              <input style={{...s.input,maxWidth:"100%",boxSizing:"border-box"}} type="date" value={pastDate} onChange={e=>setPastDate(e.target.value)}/>
            </div>
            <div style={{maxHeight:"50vh",overflowY:"auto"}}>
              {pastRows.map((row,rowIdx)=>(
                <div key={rowIdx} style={{...s.card,padding:14,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{...s.label,marginBottom:0}}>Exercise {rowIdx+1}</span>
                    {pastRows.length>1&&<button style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:18}} onClick={()=>setPastRows(p=>p.filter((_,i)=>i!==rowIdx))}>×</button>}
                  </div>
                  <select style={{...s.select,marginBottom:10}} value={row.exId} onChange={e=>setPastRows(p=>p.map((r,i)=>i===rowIdx?{...r,exId:e.target.value}:r))}>
                    <option value="">Select exercise...</option>
                    {CATEGORIES.map(cat=>{const ces=allExercises.filter(e=>e.category===cat);if(!ces.length)return null;return(<optgroup key={cat} label={cat}>{ces.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}</optgroup>);})}
                  </select>
                  <span style={{...s.label,fontSize:9,marginBottom:6}}>Sets</span>
                  {row.sets.map((setItem,setIdx)=>(
                    <div key={setIdx} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr auto",gap:6,alignItems:"center",marginBottom:6}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",minWidth:20}}>S{setIdx+1}</span>
                      <div>
                        <span style={{...s.label,fontSize:8,marginBottom:2}}>Weight</span>
                        <input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" placeholder="135" value={setItem.weight} onChange={e=>updatePastRowSet(rowIdx,setIdx,"weight",e.target.value)}/>
                      </div>
                      <div>
                        <span style={{...s.label,fontSize:8,marginBottom:2}}>Reps</span>
                        <input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" placeholder="10" value={setItem.reps} onChange={e=>updatePastRowSet(rowIdx,setIdx,"reps",e.target.value)}/>
                      </div>
                      {row.sets.length>1&&(
                        <button onClick={()=>removePastSetFromRow(rowIdx,setIdx)} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:16,paddingTop:16,alignSelf:"flex-end",paddingBottom:4}}>×</button>
                      )}
                    </div>
                  ))}
                  <button style={{...s.btnSm,marginTop:4,fontSize:9}} onClick={()=>addSetToPastRow(rowIdx)}>+ Add Set</button>
                </div>
              ))}
              <div ref={pastRowsEndRef}/>
            </div>
            <button style={{...s.btnOutline,width:"100%",marginBottom:10,marginTop:8,fontSize:11}} onClick={addPastRow}>+ Add Another Exercise</button>
            <button style={s.btn} onClick={savePastWorkout}>Save Past Workout</button>
          </ModalStrict>
        );

        if(modal==="editWorkout"&&editingWorkout){
          const ew=editingWorkout;
          return(
            <ModalStrict onClose={()=>{setModal(null);setEditingWorkout(null);}}>
              <span style={{...s.label,fontSize:12,marginBottom:4}}>Edit Workout</span>
              <p style={{color:"var(--muted)",fontSize:12,marginBottom:14,fontFamily:"'DM Mono',monospace",letterSpacing:0.5}}>
                {new Date(ew.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
              </p>
              <div style={{maxHeight:"55vh",overflowY:"auto"}}>
                {ew.exercises.map((ex,ei)=>(
                  <div key={ei} style={{...s.card,padding:12,marginBottom:8}}>
                    <div style={{fontWeight:600,fontSize:14,color:"var(--cream)",marginBottom:10}}>{ex.name}</div>
                    {(ex.setData&&ex.setData.length>0)?(
                      <div>
                        <span style={{...s.label,fontSize:9,marginBottom:6}}>Sets</span>
                        {ex.setData.map((sd,si)=>(
                          <div key={si} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:8,marginBottom:6,alignItems:"center"}}>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",minWidth:20}}>S{si+1}</span>
                            <div>
                              <span style={{...s.label,fontSize:8,marginBottom:2}}>Weight</span>
                              <input style={{...s.input,padding:"7px 10px",fontSize:13}} type="number" value={sd.weight||""} onChange={e=>{
                                const val=Number(e.target.value)||0;
                                setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,weight:val})})}));
                              }}/>
                            </div>
                            <div>
                              <span style={{...s.label,fontSize:8,marginBottom:2}}>Reps</span>
                              <input style={{...s.input,padding:"7px 10px",fontSize:13}} type="number" value={sd.reps||""} onChange={e=>{
                                const val=Number(e.target.value)||0;
                                setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi!==ei?x:{...x,setData:x.setData.map((s,ssi)=>ssi!==si?s:{...s,reps:val})})}));
                              }}/>
                            </div>
                          </div>
                        ))}
                      </div>
                    ):(
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                        {[["Weight","weight"],["Reps","reps"],["Sets","sets"]].map(([lbl,key])=>(
                          <div key={key}>
                            <span style={{...s.label,fontSize:9}}>{lbl}</span>
                            <input style={{...s.input,padding:"8px 10px",fontSize:13}} type="number" value={ex[key]||""} onChange={e=>{
                              const val=e.target.value;
                              setEditingWorkout(prev=>({...prev,exercises:prev.exercises.map((x,xi)=>xi===ei?{...x,[key]:val}:x)}));
                            }}/>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <button style={{...s.btn,marginTop:12}} onClick={async()=>{
                const updated={
                  ...ew,
                  exercises:ew.exercises.map(ex=>({
                    ...ex,
                    weight:ex.setData?Number(ex.setData[0]?.weight)||0:Number(ex.weight)||0,
                    reps:ex.setData?Number(ex.setData[0]?.reps)||0:Number(ex.reps)||0,
                    sets:ex.setData?ex.setData.length:Number(ex.sets)||1,
                  }))
                };
                await updateWorkoutRecord(updated);
                setModal(null);setEditingWorkout(null);showToast("Workout updated!");
              }}>Save Changes</button>
            </ModalStrict>
          );
        }

        if(modal==="versionHistory") return(
          <Modal onClose={()=>setModal(null)}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--gold)",marginBottom:4}}>Release History</div>
            {RELEASE_HISTORY.map(r=>(
              <div key={r.version} style={{...s.card,marginBottom:10,marginTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:"var(--gold)",fontWeight:600}}>v{r.version}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)"}}>{r.date}</span>
                </div>
                {r.features.map((f,i)=>(
                  <div key={i} style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--cream2)",padding:"4px 0",borderBottom:"1px solid var(--border)",lineHeight:1.5}}>· {f}</div>
                ))}
              </div>
            ))}
          </Modal>
        );
        return null;
      };

      // ═══════════════════════════════════════════════════════════
      // SCREENS
      // ═══════════════════════════════════════════════════════════

      if(authUser===undefined||dataLoading) return(
        <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",position:"relative",zIndex:2}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"var(--gold)",letterSpacing:2,marginBottom:10}}>IRONFORM</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",letterSpacing:4}}>LOADING...</div>
          </div>
        </div>
      );

      if(!authUser) return(
        <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:400,padding:"0 28px",textAlign:"center"}}>
            <div style={{display:"inline-block",border:"2px solid var(--gold)",borderRadius:"50%",width:100,height:100,lineHeight:"96px",fontSize:36,marginBottom:24,color:"var(--gold)",background:"var(--surface)"}}>🏋️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:38,fontWeight:900,color:"var(--gold)",letterSpacing:2,marginBottom:4}}>IRONFORM</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:4,color:"var(--muted)",marginBottom:32,textTransform:"uppercase"}}>Personal Strength Journal</div>
            <div style={{width:60,height:1,background:"var(--border2)",margin:"0 auto 32px"}}/>
            <button onClick={handleSignIn} disabled={signingIn} style={{background:"var(--cream)",color:"var(--bg)",border:"none",borderRadius:8,padding:"15px 20px",fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,opacity:signingIn?0.7:1,textTransform:"uppercase"}}>
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              {signingIn?"Signing in...":"Sign in with Google"}
            </button>
            {signInErr&&<div style={{marginTop:14,color:"var(--brick2)",fontSize:13,fontFamily:"'DM Mono',monospace"}}>{signInErr}</div>}
          </div>
        </div>
      );

      // ── PRESET PREVIEW ──────────────────────────────────────
      if(screen==="preset_preview"&&activeTmpl){
        const tmpl=activeTmpl;
        const goal=profile?.goal||"hypertrophy";
        const allIds=[...tmpl.exercises,...extraExIds].filter(id=>!removedExIds.includes(id));
        return(
          <div style={s.app}>
            {renderModal()}{Toast}
            <div style={{...s.content,...s.contentPt}}>
              <div style={s.header}>
                <div style={s.logo}>IRONFORM</div>
                <span style={{...s.tag,background:tmpl.accentDim,border:`1px solid ${tmpl.accentBorder}`,color:tmpl.accent}}>{tmpl.emoji} {tmpl.label}</span>
              </div>
              <BackBtn onClick={()=>{setActiveTmpl(null);setExtraExIds([]);setRemovedExIds([]);setExRepSchemes({});setScreen("home");}}/>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"var(--cream)",marginBottom:16}}>{tmpl.label}</h2>
              <div style={{...s.card,marginBottom:14}}>
                <span style={s.label}>Global Set & Rep Count</span>
                <div style={{display:"flex",justifyContent:"space-around",paddingTop:8}}>
                  <Stepper value={previewSets} onChange={setPreviewSets} min={1} label="Sets"/>
                  <div style={{width:1,background:"var(--border)"}}/>
                  <Stepper value={previewReps} onChange={setPreviewReps} min={1} label="Reps"/>
                </div>
              </div>
              <span style={s.label}>Exercises ({allIds.length})</span>
              {allIds.map(exId=>{
                const def=allExercises.find(e=>e.id===exId);
                if(!def) return null;
                const last=getLastForExercise(exId);
                const weight=last?safeProgressWeight(last.exercise.weight,goal,Math.max(1,Math.round((Date.now()-new Date(last.workout.date))/86400000/7)),def.unit):def.defaultWeight;
                const isExtra=extraExIds.includes(exId);
                const exScheme=exRepSchemes[exId]||"standard";
                return(
                  <div key={exId} style={{...s.card,marginBottom:8,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:15,color:"var(--cream)",display:"flex",alignItems:"center",gap:8}}>
                          {def.name}
                          {isExtra&&<span style={{...s.tag,fontSize:8,padding:"2px 6px",color:"var(--blue2)",background:"rgba(74,108,140,0.15)",border:"1px solid rgba(74,108,140,0.35)"}}>Added</span>}
                        </div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--muted)",marginTop:3}}>
                          {def.unit==="reps"?"Bodyweight":`${weight} ${def.unit}`}
                          {last?` · last ${new Date(last.workout.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}`:" · first time"}
                        </div>
                      </div>
                      <button onClick={()=>{
                        if(isExtra) setExtraExIds(p=>p.filter(id=>id!==exId));
                        else setRemovedExIds(p=>[...p,exId]);
                      }} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:20,flexShrink:0}}>×</button>
                    </div>
                    <div style={{display:"flex",gap:4,marginTop:8}}>
                      {[["standard","Standard"],["dropset","Drop Set"],["pyramid","Pyramid"]].map(([key,lbl])=>{
                        const active=exScheme===key;
                        return(
                          <button key={key} onClick={()=>setExRepSchemes(p=>({...p,[exId]:key}))} style={{
                            flex:1,padding:"6px 4px",borderRadius:5,fontSize:10,fontFamily:"'DM Mono',monospace",letterSpacing:0.5,cursor:"pointer",textTransform:"uppercase",
                            background:active?"rgba(200,146,42,0.18)":"var(--surface2)",
                            border:active?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",
                            color:active?"var(--gold)":"var(--muted)",
                          }}>{lbl}</button>
                        );
                      })}
                    </div>
                    {exScheme!=="standard"&&(
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",marginTop:5,letterSpacing:0.5}}>
                        {buildSetReps(previewSets,previewReps,exScheme).join(" → ")} reps
                      </div>
                    )}
                  </div>
                );
              })}
              <button style={{...s.btnOutline,width:"100%",marginBottom:10,marginTop:6}} onClick={()=>setModal("browseAdd")}>+ Add Exercise Today</button>
              <button style={s.btn} onClick={()=>launchWorkout(tmpl,extraExIds,removedExIds,previewSets,previewReps,exRepSchemes)}>Begin {tmpl.label}</button>
            </div>
          </div>
        );
      }

      // ── CUSTOM BUILDER ──────────────────────────────────────
      if(screen==="custom_builder") return(
        <div style={s.app}>
          {renderModal()}{Toast}
          <div style={{...s.content,...s.contentPt}}>
            <div style={s.header}><div style={s.logo}>IRONFORM</div><span style={s.tag}>Custom</span></div>
            <BackBtn onClick={()=>{setCustomExIds([]);setCustomGoal("hypertrophy");setScreen("home");}}/>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"var(--cream)",marginBottom:6}}>Build Your Workout</h2>
            <p style={{color:"var(--muted)",fontSize:14,marginBottom:18,lineHeight:1.5}}>Pick your exercises, then go.</p>
            <div style={{...s.card,marginBottom:14}}>
              <span style={s.label}>Training Goal</span>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
                {Object.entries(GOALS).map(([key,g])=>(
                  <button key={key} onClick={()=>setCustomGoal(key)} style={{background:customGoal===key?"rgba(200,146,42,0.18)":"var(--surface2)",border:customGoal===key?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",borderRadius:6,padding:"8px 13px",color:customGoal===key?"var(--gold)":"var(--muted)",fontSize:13,cursor:"pointer"}}>
                    {g.label}
                  </button>
                ))}
              </div>
            </div>
            {customExIds.length>0&&(
              <div style={{...s.card,marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={s.label}>{customExIds.length} Selected</span>
                  <button style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,textTransform:"uppercase"}} onClick={()=>setCustomExIds([])}>Clear All</button>
                </div>
                {customExIds.map(exId=>{
                  const def=allExercises.find(e=>e.id===exId);
                  if(!def) return null;
                  return(
                    <div key={exId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                      <span style={{fontSize:14,color:"var(--cream)"}}>{def.name}</span>
                      <button onClick={()=>setCustomExIds(p=>p.filter(id=>id!==exId))} style={{background:"none",border:"none",color:"var(--brick2)",cursor:"pointer",fontSize:18}}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={s.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={s.label}>Browse Exercises</span>
                <button style={s.btnSm} onClick={()=>{setActiveTmpl(null);setModal("browseAdd");}}>+ Add</button>
              </div>
              {CATEGORIES.map(cat=>{
                const ces=allExercises.filter(e=>e.category===cat&&!customExIds.includes(e.id));
                if(!ces.length) return null;
                return(
                  <div key={cat} style={{marginBottom:13}}>
                    <span style={{...s.label,fontSize:9}}>{cat}</span>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {ces.map(ex=>(
                        <button key={ex.id} onClick={()=>setCustomExIds(p=>[...p,ex.id])} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 11px",color:"var(--cream2)",fontSize:13,cursor:"pointer"}}>
                          {ex.name}{ex.custom?" ★":""}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <button style={{...s.btn,opacity:customExIds.length<1?0.4:1}} onClick={()=>customExIds.length>=1&&launchCustomWorkout()}>
              Begin Workout ({customExIds.length} exercise{customExIds.length!==1?"s":""})
            </button>
          </div>
        </div>
      );

      // ── ACTIVE WORKOUT ──────────────────────────────────────
      if(screen==="workout"&&activeWorkout){
        const exercises=activeWorkout.exercises;
        const ex=exercises[currentExIdx];
        const done=setsForEx(ex);
        const allDone=done.every(Boolean);
        const isLast=currentExIdx===exercises.length-1;
        const progress=totalSets>0?totalDone/totalSets:0;
        const setRepsArr=activeWorkout.setRepsMap?.[ex.id]||Array(ex.sets).fill(ex.reps);
        const bigInc=ex.bigIncrement||getBigIncrement(ex);
        const isBarbell=ex.equipmentType==="barbell";
        const barbellW=ex.barbellWeight||45;

        // Historical data for this exercise
        const historyForEx=(()=>{
          let lastSession=null, personalBest=null;
          let pbWeight=0;
          workouts.forEach(w=>{
            const e=w.exercises?.find(x=>x.id===ex.id);
            if(!e) return;
            const w1=e.setData&&e.setData.length>0?Math.max(...e.setData.map(s=>s.weight||0)):e.weight||0;
            if(w1>pbWeight){pbWeight=w1;personalBest={date:w.date,weight:w1,reps:e.reps||0,setData:e.setData};}
            lastSession={date:w.date,weight:e.weight,reps:e.reps,setData:e.setData};
          });
          return{lastSession,personalBest};
        })();

        return(
          <div style={s.app}>
            {Toast}{RestModal}
            <div style={{...s.content,...s.contentPt}}>
              <div style={s.header}>
                <div style={s.logo}>IRONFORM</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{unlockAudio();playAlertTone("end");}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"6px 10px",color:"var(--muted)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1}}>TEST🔔</button>
                  <button style={s.btnDanger} onClick={cancelWorkout}>Cancel</button>
                </div>
              </div>
              <div style={{marginBottom:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{...s.label,marginBottom:0}}>{activeWorkout.templateLabel} · {currentExIdx+1} of {exercises.length}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--gold)"}}>{totalDone}/{totalSets} sets</span>
                </div>
                <div style={{height:3,background:"var(--surface2)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${progress*100}%`,background:"var(--gold)",borderRadius:2,transition:"width 0.4s ease"}}/>
                </div>
                <div style={{display:"flex",gap:5,marginTop:10,flexWrap:"wrap"}}>
                  {exercises.map((e,i)=>{
                    const exDone=setsForEx(e).every(Boolean);
                    const isCurrent=i===currentExIdx;
                    return(<button key={i} onClick={()=>setCurrentExIdx(i)} style={{width:isCurrent?24:8,height:8,borderRadius:4,border:"none",cursor:"pointer",background:isCurrent?"var(--gold)":exDone?"rgba(200,146,42,0.5)":"var(--surface2)",transition:"all 0.2s",padding:0,flexShrink:0}}/>);
                  })}
                </div>
              </div>
              <div style={{...s.card,padding:16,marginBottom:10}}>
                {/* Exercise header row */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:22,lineHeight:1.2,color:"var(--cream)"}}>{ex.name}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",color:"var(--muted)",fontSize:10,marginTop:2,letterSpacing:0.5,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      <span>{ex.sets} sets · {(activeWorkout.perExSchemes?.[ex.id]||"standard")}</span>
                      {/* Equipment badge — tappable to edit */}
                      <button onClick={()=>{setDraftEquip({equipmentType:ex.equipmentType||"machine",barbellWeight:ex.barbellWeight||45});setEquipModal(ex.id);}} style={{background:"rgba(200,146,42,0.1)",border:"1px solid rgba(200,146,42,0.25)",borderRadius:3,padding:"1px 6px",fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"var(--gold2)",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>
                        {ex.equipmentType||"machine"}
                        {isBarbell&&` · ${barbellW}lb bar`}
                        {" ✎"}
                      </button>
                    </div>
                  </div>
                  {/* Action buttons: swap + goal */}
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,marginLeft:8}}>
                    <button onClick={()=>setSwapModal(ex.id)} title="Swap exercise" style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"5px 8px",color:"var(--muted)",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:1}}>⇄</button>
                    <button onClick={()=>{setInlineGoal(ex.id);setInlineGoalVal("");}} title="Set goal" style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"5px 8px",color:"var(--muted)",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:1}}>🎯</button>
                    {allDone&&<div style={{color:"var(--green2)",fontSize:22}}>✓</div>}
                  </div>
                </div>

                {/* Inline goal setter */}
                {inlineGoal===ex.id&&(
                  <div style={{background:"rgba(74,124,89,0.1)",border:"1px solid rgba(74,124,89,0.3)",borderRadius:8,padding:"10px 12px",marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--green2)",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>Goal (lbs)</span>
                    <input style={{...s.input,flex:1,padding:"7px 10px",fontSize:13}} type="number" placeholder={`e.g. ${Math.round(ex.weight*1.2/5)*5}`} value={inlineGoalVal} onChange={e=>setInlineGoalVal(e.target.value)} autoFocus/>
                    <button onClick={async()=>{
                      if(!inlineGoalVal||isNaN(Number(inlineGoalVal))) return;
                      await doAddLiftGoal({exId:ex.id,targetWeight:Number(inlineGoalVal),created:new Date().toISOString()});
                      setInlineGoal(null);setInlineGoalVal("");showToast("Goal set!");
                    }} style={{background:"var(--green2)",border:"none",borderRadius:6,padding:"7px 12px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap"}}>Set ✓</button>
                    <button onClick={()=>setInlineGoal(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                  </div>
                )}

                {/* Historical data — compact single line */}
                {(historyForEx.lastSession||historyForEx.personalBest)&&(
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",marginBottom:10,background:"var(--surface2)",borderRadius:6,padding:"7px 10px",display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
                    {historyForEx.lastSession&&(
                      <div>
                        <span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)"}}>Last  </span>
                        <span style={{color:"var(--cream2)"}}>
                          {historyForEx.lastSession.setData&&historyForEx.lastSession.setData.length>0
                            ? historyForEx.lastSession.setData.map((sd,si)=>`S${si+1}:${sd.weight}×${sd.reps}`).join(" ")
                            : `${historyForEx.lastSession.weight}×${historyForEx.lastSession.reps}`
                          }
                        </span>
                        <span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.lastSession.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                      </div>
                    )}
                    {historyForEx.personalBest&&historyForEx.personalBest.weight>0&&(
                      <div>
                        <span style={{fontSize:8,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)"}}>PB  </span>
                        <span style={{color:"var(--gold2)",fontWeight:600}}>{historyForEx.personalBest.weight}{ex.unit!=="reps"?ex.unit:""}</span>
                        <span style={{color:"var(--muted)",fontSize:9}}>  {new Date(historyForEx.personalBest.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                      </div>
                    )}
                  </div>
                )}

                {/* Global weight adjuster */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,justifyContent:"center"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <button style={{...s.setBtn,height:40}} onClick={()=>adjustWeightGlobal(ex.id,-bigInc)}>−{bigInc}</button>
                    <button style={{...s.setBtn,fontSize:12,height:28}} onClick={()=>adjustWeightGlobal(ex.id,-0.25)}>-.25</button>
                  </div>
                  <div style={{textAlign:"center",minWidth:80}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:44,fontWeight:900,color:"var(--gold)",lineHeight:1}}>{ex.weight}</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",letterSpacing:2,marginTop:1}}>{ex.unit==="reps"?"BODYWEIGHT":ex.unit.toUpperCase()}</div>
                    {isBarbell&&ex.weight>barbellW&&(
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--gold2)",marginTop:2,background:"rgba(200,146,42,0.1)",borderRadius:4,padding:"1px 5px"}}>
                        +{((ex.weight-barbellW)/2).toFixed(2).replace(/\.?0+$/,"")} ea side
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <button style={{...s.setBtn,height:40}} onClick={()=>adjustWeightGlobal(ex.id,bigInc)}>+{bigInc}</button>
                    <button style={{...s.setBtn,fontSize:12,height:28}} onClick={()=>adjustWeightGlobal(ex.id,0.25)}>+.25</button>
                  </div>
                </div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"var(--muted)",letterSpacing:2,textAlign:"center",marginBottom:10,textTransform:"uppercase"}}>
                  Base weight · won't change completed sets
                </div>

                <span style={{...s.label,marginBottom:8,fontSize:9}}>Sets — tap to complete</span>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                  {done.map((d,i)=>{
                    const setKey=`${ex.id}_${i}`;
                    const setWeight=perSetData[setKey]?.weight ?? ex.weight;
                    const setReps=perSetData[setKey]?.reps ?? setRepsArr[i];
                    const perSideWeight=isBarbell&&setWeight>barbellW?((setWeight-barbellW)/2):null;
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:8,background:d?"rgba(200,146,42,0.12)":"var(--surface2)",border:d?"1px solid rgba(200,146,42,0.35)":"1px solid var(--border)"}}>
                        <button style={{...s.setDot(d),flexShrink:0,width:34,height:34,fontSize:11}} onClick={()=>toggleSet(ex.id,i)}>{d?"✓":`S${i+1}`}</button>
                        <div style={{display:"flex",flexDirection:"column",flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:3}}>
                            <button onClick={()=>adjustSetWeight(ex.id,i,-bigInc)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:24,color:"var(--gold)",cursor:"pointer",fontSize:11,flexShrink:0}}>−</button>
                            <div style={{textAlign:"center",minWidth:40}}>
                              <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"var(--gold)",fontWeight:500}}>{setWeight}</div>
                              <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"var(--muted)"}}>{ex.unit!=="reps"?ex.unit:"bw"}</div>
                            </div>
                            <button onClick={()=>adjustSetWeight(ex.id,i,bigInc)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:24,color:"var(--gold)",cursor:"pointer",fontSize:11,flexShrink:0}}>+</button>
                            <button onClick={()=>adjustSetWeight(ex.id,i,-0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:3,width:20,height:20,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0}}>-.25</button>
                            <button onClick={()=>adjustSetWeight(ex.id,i,0.25)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:3,width:20,height:20,color:"var(--muted)",cursor:"pointer",fontSize:9,flexShrink:0}}>+.25</button>
                          </div>
                          {isBarbell&&perSideWeight!==null&&(
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"var(--gold2)",marginTop:1,paddingLeft:2}}>
                              +{perSideWeight.toFixed(2).replace(/\.?0+$/,"")} lbs/side
                            </div>
                          )}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:3}}>
                          <button onClick={()=>adjustSetReps(ex.id,i,-1)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:24,color:"var(--cream2)",cursor:"pointer",fontSize:13,flexShrink:0}}>−</button>
                          <div style={{textAlign:"center",minWidth:28}}>
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"var(--cream)",fontWeight:500}}>{setReps}</div>
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"var(--muted)"}}>reps</div>
                          </div>
                          <button onClick={()=>adjustSetReps(ex.id,i,1)} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:4,width:24,height:24,color:"var(--cream2)",cursor:"pointer",fontSize:13,flexShrink:0}}>+</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <input style={{...s.input,fontSize:12,padding:"8px 10px"}} placeholder="Notes..." value={noteFor[ex.id]||""} onChange={e=>setNoteFor(p=>({...p,[ex.id]:e.target.value}))}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:currentExIdx>0?"1fr 1fr":"1fr",gap:10}}>
                {currentExIdx>0&&(
                  <button style={{...s.btnOutline,width:"100%",textAlign:"center"}} onClick={()=>setCurrentExIdx(i=>i-1)}>← Prev</button>
                )}
                {!isLast?(
                  <button style={s.btn} onClick={()=>setCurrentExIdx(i=>i+1)}>Next →</button>
                ):(
                  <button style={{...s.btn,background:progress>=0.3?"var(--gold)":"rgba(200,146,42,0.3)",color:progress>=0.3?"var(--bg)":"var(--muted)",marginTop:0}} onClick={progress>=0.3?finishWorkout:undefined}>
                    {progress>=1?"Finish Workout ✓":`Finish Early (${totalDone}/${totalSets})`}
                  </button>
                )}
              </div>
            </div>

            {/* ── SWAP EXERCISE MODAL ── */}
            {swapModal&&(
              <div onClick={()=>setSwapModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#2a1c0c",border:"1px solid var(--border2)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto",padding:20,paddingBottom:40}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:3,color:"var(--gold)",textTransform:"uppercase"}}>Swap Exercise</span>
                    <button onClick={()=>setSwapModal(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:22}}>×</button>
                  </div>
                  {(()=>{
                    const currEx=allExercises.find(e=>e.id===swapModal);
                    const category=currEx?.category;
                    const sameGroup=allExercises.filter(e=>e.category===category&&e.id!==swapModal);
                    return(
                      <div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>{category} exercises</div>
                        {sameGroup.map(ex=>{
                          const alreadyIn=activeWorkout.exercises.some(e=>e.id===ex.id);
                          return(
                            <button key={ex.id} disabled={alreadyIn} onClick={()=>swapExercise(swapModal,ex.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:alreadyIn?"var(--surface)":"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px",marginBottom:6,cursor:alreadyIn?"default":"pointer",opacity:alreadyIn?0.4:1,textAlign:"left"}}>
                              <div>
                                <div style={{fontSize:14,color:"var(--cream)",fontWeight:500}}>{ex.name}</div>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",marginTop:2,letterSpacing:1}}>{ex.equipmentType||"machine"}</div>
                              </div>
                              {alreadyIn&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)"}}>In workout</span>}
                            </button>
                          );
                        })}
                        {sameGroup.length===0&&<div style={{color:"var(--muted)",fontFamily:"'DM Mono',monospace",fontSize:12,textAlign:"center",padding:20}}>No other {category} exercises available</div>}
                      </div>
                    );
                  })()}
                </div>
              </div>
            )}

            {/* ── EQUIPMENT EDIT MODAL ── */}
            {equipModal&&(
              <div onClick={()=>setEquipModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                <div onClick={e=>e.stopPropagation()} style={{background:"#2a1c0c",border:"1px solid var(--border2)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,padding:20,paddingBottom:40}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:3,color:"var(--gold)",textTransform:"uppercase"}}>Equipment Type</span>
                    <button onClick={()=>setEquipModal(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:22}}>×</button>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {[["barbell","🏋️ Barbell"],["dumbbell","💪 Dumbbell"],["cable","🔗 Cable"],["assisted","🤝 Assisted"],["machine","⚙️ Machine"],["bodyweight","🧍 BW"]].map(([key,lbl])=>(
                      <button key={key} onClick={()=>setDraftEquip(p=>({...p,equipmentType:key}))} style={{padding:"8px 12px",borderRadius:6,fontSize:12,fontFamily:"'DM Mono',monospace",cursor:"pointer",background:draftEquip.equipmentType===key?"rgba(200,146,42,0.18)":"var(--surface2)",border:draftEquip.equipmentType===key?"1px solid rgba(200,146,42,0.5)":"1px solid var(--border)",color:draftEquip.equipmentType===key?"var(--gold)":"var(--muted)"}}>
                        {lbl}
                      </button>
                    ))}
                  </div>
                  {draftEquip.equipmentType==="barbell"&&(
                    <div style={{marginBottom:16}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:"var(--muted)",textTransform:"uppercase",display:"block",marginBottom:6}}>Bar Weight (lbs)</span>
                      <input style={{...s.input,maxWidth:160}} type="number" value={draftEquip.barbellWeight||45} onChange={e=>setDraftEquip(p=>({...p,barbellWeight:Number(e.target.value)||45}))}/>
                    </div>
                  )}
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",marginBottom:14,letterSpacing:0.5,lineHeight:1.6}}>
                    {draftEquip.equipmentType==="barbell"&&`Bar: ${draftEquip.barbellWeight||45} lbs · increment will change to 2.5 lbs`}
                    {draftEquip.equipmentType==="dumbbell"&&"Increment will change to 5 lbs"}
                    {draftEquip.equipmentType==="cable"&&"Increment will change to 5 lbs"}
                    {draftEquip.equipmentType==="assisted"&&"Weight progression will reverse (less assistance = harder)"}
                    {draftEquip.equipmentType==="machine"&&"Increment unchanged"}
                    {draftEquip.equipmentType==="bodyweight"&&"No weight tracking"}
                  </div>
                  <button onClick={()=>applyEquipChange(equipModal)} style={{background:"var(--gold)",border:"none",borderRadius:8,padding:"13px",color:"var(--bg)",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,cursor:"pointer",width:"100%",textTransform:"uppercase",fontWeight:600}}>Apply</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── WORKOUT SUMMARY ──────────────────────────────────────
      if(screen==="summary"&&summaryData){

        const sd=summaryData;
        const achievedGoals=sd.exercises.flatMap(ex=>ex.matchedGoals||[]);
        const prCount=sd.exercises.filter(e=>e.improved).length;
        return(
          <div style={s.app}>
            <Confetti/>
            {renderModal()}{Toast}
            <div style={{...s.content,...s.contentPt}}>
              <div style={s.header}>
                <div style={s.logo}>IRONFORM</div>
                <span style={s.tag}>{sd.templateLabel}</span>
              </div>
              <div style={{...s.cardWarm,textAlign:"center",padding:28,marginBottom:16,position:"relative",overflow:"hidden"}}>
                <div style={{fontSize:48,marginBottom:8,animation:"none"}}>{prCount>0?"🏆":"🎯"}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:30,color:"var(--gold)",marginBottom:4,fontWeight:900}}>
                  {prCount>0?"You Crushed It!":"Session Complete"}
                </div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--muted)",letterSpacing:2}}>
                  {new Date(sd.date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
                </div>
                <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:18}}>
                  {[{label:"Exercises",value:sd.exercises.length},{label:"Sets Done",value:sd.exercises.reduce((a,e)=>a+e.completedSets,0)},{label:"PRs",value:prCount}].map(stat=>(
                    <div key={stat.label} style={{textAlign:"center"}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:stat.label==="PRs"&&stat.value>0?"var(--green2)":"var(--cream)",lineHeight:1}}>{stat.value}</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",letterSpacing:2,marginTop:3,textTransform:"uppercase"}}>{stat.label}</div>
                    </div>
                  ))}
                </div>
                {/* Total volume */}
                {(()=>{
                  const vol=sd.exercises.reduce((acc,ex)=>{
                    if(ex.unit==="reps") return acc;
                    const sets=ex.setData||[];
